	<body>
		<div id="map" style="width: 100%; height: 100%"></div>
		<div id="map-context-menu" class="map-context-menu" hidden>
			<div class="map-context-menu__group" data-context-action="add-here" hidden>
				<button type="button" class="map-context-menu__item map-context-menu__item--submenu" data-context-action="add-here">Hier hinzufuegen</button>
				<div class="map-context-submenu">
					<button type="button" class="map-context-menu__item" data-context-action="create-location">Neuer Ort</button>
					<button type="button" class="map-context-menu__item" data-context-action="create-location-from-wiki" hidden>Neuer Ort aus dem Wiki</button>
					<button type="button" class="map-context-menu__item" data-context-action="create-crossing">Neue Kreuzung</button>
					<button type="button" class="map-context-menu__item" data-context-action="split-path-at-node" hidden>Neue Kreuzung und Weg teilen</button>
					<button type="button" class="map-context-menu__item" data-context-action="create-path">Neuer Weg</button>
					<button type="button" class="map-context-menu__item" data-context-action="create-label">Neues Label</button>
					<button type="button" class="map-context-menu__item" data-context-action="create-region">Neues Herrschaftsgebiet</button>
				</div>
			</div>
			<button type="button" class="map-context-menu__item" data-context-action="share-pin">Stelle markieren und teilen</button>
			<button type="button" class="map-context-menu__item" data-context-action="report-location">Hier melden...</button>
			<button type="button" class="map-context-menu__item" data-context-action="open-spotlight-search">Suchen</button>
			<button type="button" class="map-context-menu__item" data-context-action="find-nearest-location">Nächsten Ort finden</button>
			<button type="button" class="map-context-menu__item" data-context-action="start-distance-measurement">Entfernung messen</button>
			<button type="button" class="map-context-menu__item" data-context-action="clear-distance-measurement" hidden>Entfernungsmessung löschen</button>
		</div>
		<div id="region-context-menu" class="map-context-menu region-context-menu" hidden>
			<button type="button" class="map-context-menu__item" data-region-context-action="edit-geometry">Grenzen bearbeiten</button>
			<button type="button" class="map-context-menu__item" data-region-context-action="edit-properties">Eigenschaften bearbeiten</button>
			<button type="button" class="map-context-menu__item" data-region-context-action="refresh-derived-boundary">Außengrenzen erzeugen/aktualisieren</button>
			<button type="button" class="map-context-menu__item" data-region-context-action="show-info">Infobox anzeigen</button>
			<button type="button" class="map-context-menu__item" data-region-context-action="move">Verschieben</button>
			<button type="button" class="map-context-menu__item" data-region-context-action="split">Gebiet zerschneiden</button>
			<button type="button" class="map-context-menu__item" data-region-context-action="union">Mit anderem vereinigen</button>
			<button type="button" class="map-context-menu__item" data-region-context-action="difference">Von anderem ausschneiden</button>
			<button type="button" class="map-context-menu__item" data-region-context-action="difference-keep-target">Von anderem ausschneiden und anderes beibehalten</button>
			<button type="button" class="map-context-menu__item" data-region-context-action="intersection">Neues von anderem ausschneiden</button>
			<button type="button" class="map-context-menu__item" data-region-context-action="extract">Neues Gebiet herausloesen</button>
			<button type="button" class="map-context-menu__item map-context-menu__item--danger" data-region-context-action="delete">Loeschen</button>
		</div>
		<div id="political-territory-editor-overlay" class="political-territory-editor-overlay" hidden>
			<div id="political-territory-editor-dialog" class="political-territory-editor-dialog" role="dialog" aria-modal="true" aria-labelledby="political-territory-editor-title" tabindex="-1">
				<div class="political-territory-editor-dialog__header">
					<h2 id="political-territory-editor-title">Herrschaftsgebiet-Eigenschaften</h2>
					<button id="political-territory-editor-close" class="political-territory-editor-dialog__close" type="button" aria-label="Eigenschaften schliessen">x</button>
				</div>
				<iframe id="political-territory-editor-frame" class="political-territory-editor-dialog__frame" title="Herrschaftsgebiet-Eigenschaften"></iframe>
			</div>
		</div>
		<div id="spotlight-search-overlay" class="spotlight-search-overlay" hidden>
			<div id="spotlight-search-dialog" class="spotlight-search" role="dialog" aria-modal="true" aria-labelledby="spotlight-search-title">
				<h2 id="spotlight-search-title" class="spotlight-search__title">Suchen</h2>
				<input id="spotlight-search-input" class="spotlight-search__input" type="search" autocomplete="off" spellcheck="false" placeholder="Karte durchsuchen" aria-controls="spotlight-search-results" aria-autocomplete="list" />
				<div id="spotlight-search-results" class="spotlight-search__results" role="listbox" aria-label="Suchtreffer" hidden></div>
				<p id="spotlight-search-status" class="spotlight-search__status" role="status" aria-live="polite" hidden></p>
			</div>
		</div>
		<aside id="review-panel" class="review-panel" aria-labelledby="review-panel-title" hidden>
			<header class="review-panel__header">
				<h2 id="review-panel-title">Review</h2>
				<div class="review-panel__header-actions">
					<button id="review-panel-refresh" class="review-panel__icon-button" type="button" title="Neu laden">↻</button>
				</div>
			</header>
			<p id="map-data-status" class="map-data-status" role="status" aria-live="polite" hidden></p>
			<nav class="review-panel__tabs" aria-label="Editorpanel">
				<button class="review-panel__tab is-active" type="button" data-editor-panel-tab="review">Meldungen</button>
				<button class="review-panel__tab" type="button" data-editor-panel-tab="changes">Änderungen</button>
				<button class="review-panel__tab" type="button" data-editor-panel-tab="wiki-sync">WikiSync</button>
				<button class="review-panel__tab" type="button" data-editor-panel-tab="presence">Status</button>
			</nav>
			<section class="review-panel__section is-active" data-editor-panel-section="review">
				<p id="review-panel-status" class="review-panel__status" role="status" aria-live="polite">Meldungen werden geladen...</p>
				<div id="review-report-list" class="review-panel__list"></div>
			</section>
			<section class="review-panel__section" data-editor-panel-section="changes">
				<p id="change-panel-status" class="review-panel__status" role="status" aria-live="polite">Änderungen werden geladen...</p>
				<div id="change-log-list" class="review-panel__list"></div>
			</section>
			<section class="review-panel__section" data-editor-panel-section="wiki-sync">
				<nav class="wiki-sync-panel__tabs" aria-label="WikiSync-Bereiche">
					<button class="wiki-sync-panel__tab is-active" type="button" data-wiki-sync-panel-tab="locations">Siedlungen</button>
					<button class="wiki-sync-panel__tab" type="button" data-wiki-sync-panel-tab="territories">Herrschaftsgebiete</button>
				</nav>

				<div class="wiki-sync-panel__tab-panel is-active" data-wiki-sync-panel-section="locations">
					<div class="wiki-sync-panel__actions">
						<span id="wiki-sync-locations-summary" class="wiki-sync-panel__summary">Keine Daten geladen</span>
						<button id="wiki-sync-start" class="wiki-sync-panel__start" type="button">WikiSync</button>
					</div>
					<progress id="wiki-sync-progress" class="wiki-sync-progress" max="5" value="0" hidden></progress>

					<div class="wiki-sync-panel__filter">
						<input id="wiki-sync-filter" class="wiki-sync-panel__filter-input" type="search" placeholder="Suchen ..." aria-label="WikiSync-Fälle durchsuchen" />
					</div>
					<div id="wiki-sync-case-list" class="review-panel__list"></div>
				</div>

				<div class="wiki-sync-panel__tab-panel" data-wiki-sync-panel-section="territories">
					<div class="wiki-sync-panel__actions">
						<span id="wiki-sync-territories-summary" class="wiki-sync-panel__summary">Keine Daten geladen</span>
						<button id="wiki-sync-territories" class="wiki-sync-panel__start" type="button">Herrschaftsgebiete synchronisieren</button>
					</div>
					<div class="wiki-sync-panel__filter">
						<input id="wiki-sync-territories-filter" class="wiki-sync-panel__filter-input" type="search" placeholder="Herrschaftsgebiete suchen ..." aria-label="WikiSync-Herrschaftsgebiete durchsuchen" />
					</div>
					<div id="wiki-sync-territory-list" class="review-panel__list"></div>
				</div>
			</section>
		</aside>
		<div id="copy-feedback-toast" class="copy-feedback-toast" role="status" aria-live="polite" hidden></div>
		<script src="js/constants.js"></script>
		<script src="js/app/runtime-state.js"></script>
		<script src="js/utils.js"></script>
		<script src="js/map/init.js"></script>
		<script src="js/map/projection.js"></script>
		<script src="js/map/style.js"></script>
		<script src="js/map/layers.js"></script>
		<script src="js/map/context-menu.js"></script>
		<script src="js/geometry/polygon-clipping.umd.js"></script>
		<script src="js/map-features/map-features-utils.js"></script>
		<script src="js/map-features/map-features-feature-normalization.js"></script>
		<script src="js/map-features/map-features-region-feature-normalization.js"></script>
		<script src="js/map-features/map-features-rendering.js"></script>
		<script src="js/map-features/map-features-region-geometry.js"></script>
		<script src="js/map-features/map-features-region-context-menu.js"></script>
		<script src="js/map-features/map-features-region-operations.js"></script>
		<script src="js/map-features/map-features-region-visibility.js"></script>
		<script src="js/map-features/map-features-political-territory-api.js"></script>
		<script src="js/map-features/map-features-political-territory-repository.js"></script>
		<script src="js/map-features/map-features-path-geometry.js"></script>
		<script src="js/map-features/map-features-path-geometry-editing.js"></script>
		<script src="js/map-features/map-features.js"></script>
		<script src="js/routing/routing.js"></script>
		<script src="js/location/location-edit-dialog.js"></script>
		<script src="js/review/review-panels.js"></script>
		<script src="js/review/review-region-basics.js"></script>
		<script src="js/review/review-region-tabs-state.js"></script>
		<script src="js/review/review-region-tabs-payload.js"></script>
		<script src="js/review/review-region-dialog-population.js"></script>
		<script src="js/review/review-region-parent-tree.js"></script>
		<script src="js/review/review-region-assignment-ui.js"></script>
		<script src="js/review/review-region-save-flow.js"></script>
		<script src="js/review/review-region-submit-flow.js"></script>
		<script src="js/review/review-region-events.js"></script>
		<script src="js/review/review-wiki-sync-state.js"></script>
		<script src="js/review/review-wiki-sync.js"></script>
		<script src="js/review/review-change-log.js"></script>
		<script src="js/territory/territory-editor-link.js"></script>
		<script src="js/territory/territory-derived-geometry-editor.js"></script>
	</body>
