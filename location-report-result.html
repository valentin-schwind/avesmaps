<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Avesmaps Ortsmeldung</title>
</head>
<body>
	<p>Die Ortsmeldung wird bestätigt.</p>
	<script>
		(function () {
			const searchParams = new URLSearchParams(window.location.search);
			const hashParams = new URLSearchParams(window.location.hash.slice(1));
			const payloadValue = searchParams.get("payload") || hashParams.get("payload");
			if (!payloadValue) {
				return;
			}

			try {
				const payload = JSON.parse(payloadValue);
				const requestedParentOrigin = searchParams.get("parent_origin");
				const parentOrigin = requestedParentOrigin
					? new URL(requestedParentOrigin).origin
					: window.location.origin;

				if (window.parent && window.parent !== window) {
					try {
						if (typeof window.parent.handleLocationReportBridgePayload === "function") {
							const wasHandled = window.parent.handleLocationReportBridgePayload(payload);
							if (wasHandled) {
								return;
							}
						}
					} catch (error) {
						// Direct parent access can fail before same-origin navigation fully settles.
					}

					window.parent.postMessage(payload, parentOrigin);
				}
			} catch (error) {
				console.error("Die Ortsmeldung konnte nicht an Avesmaps zurückgemeldet werden.", error);
			}
		})();
	</script>
</body>
</html>
