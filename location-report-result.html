<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Avesmaps Ortsmeldung</title>
	<style>
		@font-face {
			font-family: "Faculty Glyphic";
			src: url("fonts/FacultyGlyphic-Regular.woff") format("woff");
		}

		html,
		body {
			margin: 0;
			min-height: 100%;
			background:
				radial-gradient(circle at top, rgba(255, 255, 255, 0.35), transparent 52%),
				linear-gradient(180deg, #efe1cd 0%, #e2ceb6 100%);
			color: #3f3428;
			font-family: "Faculty Glyphic", Arial, sans-serif;
		}

		body {
			display: grid;
			place-items: center;
			padding: 20px;
			box-sizing: border-box;
		}

		.location-report-popup {
			width: min(100%, 420px);
			background: rgba(255, 249, 244, 0.96);
			border: 2px solid #b08a62;
			border-radius: 16px;
			box-shadow: 0 18px 36px rgba(0, 0, 0, 0.22);
			padding: 18px;
			position: relative;
		}

		.location-report-popup::before {
			content: "";
			position: absolute;
			inset: 8px;
			border: 1px solid #d0b08d;
			border-radius: 11px;
			pointer-events: none;
		}

		.location-report-popup__eyebrow {
			margin: 0 0 8px 0;
			font-size: 13px;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: #7c654c;
		}

		.location-report-popup__title {
			margin: 0 0 10px 0;
			font-size: 28px;
			line-height: 1.1;
		}

		.location-report-popup__message,
		.location-report-popup__detail {
			margin: 0;
			font-size: 16px;
			line-height: 1.45;
		}

		.location-report-popup__detail {
			margin-top: 10px;
			color: #6a5643;
		}
	</style>
</head>
<body>
	<section class="location-report-popup" aria-live="polite">
		<p class="location-report-popup__eyebrow">Avesmaps</p>
		<h1 class="location-report-popup__title">Ortsmeldung</h1>
		<p class="location-report-popup__message">Die Meldung wird bestätigt.</p>
		<p class="location-report-popup__detail">Das Fenster schließt sich automatisch, sobald die Rückmeldung übertragen wurde.</p>
	</section>
	<script>
		(function () {
			const LOCATION_REPORT_STORAGE_KEY = "avesmaps-location-report-result";
			const searchParams = new URLSearchParams(window.location.search);
			const hashParams = new URLSearchParams(window.location.hash.slice(1));
			const payloadValue = searchParams.get("payload") || hashParams.get("payload");
			if (!payloadValue) {
				return;
			}

			try {
				const payload = JSON.parse(payloadValue);
				const requestedParentOrigin = searchParams.get("parent_origin");
				const parentOrigin = requestedParentOrigin
					? new URL(requestedParentOrigin).origin
					: window.location.origin;

				try {
					window.localStorage.setItem(LOCATION_REPORT_STORAGE_KEY, JSON.stringify({
						timestamp: Date.now(),
						payload,
					}));
				} catch (error) {
					// localStorage access can fail in restrictive browsing modes.
				}

				if (window.opener && !window.opener.closed) {
					try {
						if (typeof window.opener.handleLocationReportBridgePayload === "function") {
							const wasHandled = window.opener.handleLocationReportBridgePayload(payload);
							if (wasHandled) {
								window.close();
								return;
							}
						}
					} catch (error) {
						// Direct opener access can fail before same-origin navigation fully settles.
					}

					try {
						window.opener.postMessage(payload, parentOrigin);
						window.close();
						return;
					} catch (error) {
						// The opener fallback may still be blocked in some browsers.
					}
				}

				if (window.parent && window.parent !== window) {
					try {
						if (typeof window.parent.handleLocationReportBridgePayload === "function") {
							const wasHandled = window.parent.handleLocationReportBridgePayload(payload);
							if (wasHandled) {
								return;
							}
						}
					} catch (error) {
						// Direct parent access can fail before same-origin navigation fully settles.
					}

					window.parent.postMessage(payload, parentOrigin);
				}
			} catch (error) {
				console.error("Die Ortsmeldung konnte nicht an Avesmaps zurückgemeldet werden.", error);
			}
		})();
	</script>
</body>
</html>
