          rm -f "api/schema.pgsql.sql"
          rm -f "api/wiki-dom-playground.lock"
          rm -f "api/wiki-sync-lib.php"
          rm -f "api/wiki-sync-locations-lib-move-2.txt"
          rm -f "api/wiki-sync-locations-lib-move.txt"
          rm -f "cat"
          rm -f "css/features/route-action-icons.css"
          rm -f "css/features/route-remove-icons.css"
          rm -f "css/jquery-ui.css"
          rm -f "css/pages/wiki-dom-playground.css"
          rm -f "css/pages/wiki-dom-sync-settings.css"
          rm -f "css/political-territory-editor.css"
          rm -f "css/route-planner-waypoint-timeline.css"
          rm -f "css/styles-legacy.css"
          rm -f "html/wiki-dom-playground.html"
          rm -f "html/wiki-dom-sync-settings.html"
          rm -f "icons/BeritteneReisegruppe.png"
