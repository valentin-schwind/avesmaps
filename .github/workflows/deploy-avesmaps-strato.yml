name: Deploy Avesmaps to STRATO

on:
  push:
    branches:
      - master
    paths-ignore:
      - "tiles/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only show which files would be uploaded"
        required: true
        default: true
        type: boolean
      delete_remote_files:
        description: "Delete remote files that are no longer in the deploy package"
        required: true
        default: false
        type: boolean
      upload_tiles:
        description: "Upload the tile pyramid"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: avesmaps-strato-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SFTP
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      AVESMAPS_HOST: ${{ secrets.AVESMAPS_HOST }}
      AVESMAPS_PASSWORD: ${{ secrets.AVESMAPS_PASSWORD }}
      AVESMAPS_PORT: ${{ secrets.AVESMAPS_PORT }}
      AVESMAPS_REMOTE_PATH: ${{ secrets.AVESMAPS_REMOTE_PATH }}
      AVESMAPS_USER: ${{ secrets.AVESMAPS_USER }}
      DEPLOY_DIR: /tmp/avesmaps-deploy

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for secret_name in AVESMAPS_HOST AVESMAPS_PASSWORD AVESMAPS_PORT AVESMAPS_REMOTE_PATH AVESMAPS_USER; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "::error title=Missing secret::${secret_name} is not configured."
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Prepare deploy package
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"

          deploy_items=(
            ".htaccess"
            "index.html"
            "favicon.ico"
            "og-image.jpg"
            "llms.txt"
            "robots.txt"
            "sitemap.xml"
            "admin"
            "api"
            "assets"
            "css"
            "edit"
            "fonts"
            "icons"
            "img"
            "html"
            "js"
            "map"
            "politics"
            "scripts"
          )

          copy_item() {
            local item="$1"

            if [[ -e "$item" ]]; then
              mkdir -p "$DEPLOY_DIR/$(dirname "$item")"
              cp -a "$item" "$DEPLOY_DIR/$item"
            fi
          }

          copy_full_deploy_package() {
            local item

            for item in "${deploy_items[@]}"; do
              copy_item "$item"
            done
          }

          should_deploy_file() {
            local file="$1"
            local item

            for item in "${deploy_items[@]}"; do
              if [[ "$file" == "$item" || "$file" == "$item/"* ]]; then
                return 0
              fi
            done

            return 1
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Preparing full deploy package."

            copy_full_deploy_package

            if [[ "${{ inputs.upload_tiles }}" == "true" && -e "tiles" ]]; then
              copy_item "tiles"
            fi
          else
            echo "Preparing changed-files deploy package."

            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"

            if [[ -z "$base_sha" || "$base_sha" =~ ^0+$ ]]; then
              echo "No usable base SHA found; preparing full deploy package instead."

              copy_full_deploy_package
            else
              if ! git cat-file -e "$base_sha^{commit}" 2>/dev/null; then
                echo "Base commit $base_sha is not available locally; preparing full deploy package instead."
                copy_full_deploy_package
              else
                changed_files=$(git diff --name-only --diff-filter=ACMRT "$base_sha" "$head_sha")

                if [[ -z "$changed_files" ]]; then
                  echo "No changed deployable files found."
                  echo "SKIP_DEPLOY=true" >> "$GITHUB_ENV"
                else
                  while IFS= read -r file; do
                    if should_deploy_file "$file"; then
                      copy_item "$file"
                    fi
                  done <<< "$changed_files"
                fi
              fi
            fi
          fi

          rm -f "$DEPLOY_DIR/.env"
          rm -f "$DEPLOY_DIR/api/.env"
          rm -f "$DEPLOY_DIR/api/config.local.php"
          rm -f "$DEPLOY_DIR/map/google-sheets-credentials.json"
          rm -f "$DEPLOY_DIR/map/google-sheets-token.json"
          rm -f "$DEPLOY_DIR/map/Aventurien_routes.svg"
          rm -f "$DEPLOY_DIR/map/"*.py
          rm -f "$DEPLOY_DIR/map/requirements-"*.txt

          find "$DEPLOY_DIR" -type d -name "__pycache__" -prune -exec rm -rf {} +
          find "$DEPLOY_DIR" -type f \( -name "*.pyc" -o -name "*.pyo" -o -name "Aventurien_routes.backup-*.svg" \) -delete

          if ! find "$DEPLOY_DIR" -mindepth 1 -print -quit | grep -q .; then
            echo "Deploy package is empty."
            echo "SKIP_DEPLOY=true" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Deploy package:"
          find "$DEPLOY_DIR" -maxdepth 2 -mindepth 1 | sort

      - name: Stamp asset versions into index.html
        if: env.SKIP_DEPLOY != 'true'
        shell: bash
        run: |
          set -euo pipefail

          # index.html immer ins Paket aufnehmen und neu stempeln, damit die ?v=-Hashes
          # aktuell sind -- auch wenn nur ein referenziertes Asset (nicht index.html selbst)
          # geaendert wurde. index.html ist winzig und wird ohnehin nie hart gecacht.
          if [[ ! -f "$DEPLOY_DIR/index.html" ]]; then
            cp -a index.html "$DEPLOY_DIR/index.html"
          fi

          # Hashes aus dem vollstaendigen Checkout ($PWD) berechnen -> unveraenderte Assets
          # behalten ihren Hash und bleiben clientseitig gecacht.
          python3 .github/scripts/stamp-asset-versions.py "$DEPLOY_DIR/index.html" "$PWD"

          echo "Stamped reference sample:"
          grep -oE '(src|href)="(js|css)/[^"]+"' "$DEPLOY_DIR/index.html" | head -n 5 || true

      - name: Install SFTP client
        if: env.SKIP_DEPLOY != 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes lftp

      - name: Deploy package
        if: env.SKIP_DEPLOY != 'true'
        shell: bash
        run: |
          set -euo pipefail

          mirror_options=(
            "--reverse"
            "--verbose"
            "--parallel=4"
            "--exclude-glob=api/config.local.php"
            "--exclude-glob=api/.env"
            "--exclude-glob=.env"
          )

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            mirror_options+=("--dry-run")
          fi

          if [[ "${{ inputs.delete_remote_files }}" == "true" ]]; then
            mirror_options+=("--delete")
          fi

          lftp -u "$AVESMAPS_USER","$AVESMAPS_PASSWORD" -p "$AVESMAPS_PORT" "sftp://$AVESMAPS_HOST" <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 30
          cd "$AVESMAPS_REMOTE_PATH"
          mirror ${mirror_options[*]} "$DEPLOY_DIR" .
          bye
          EOF

      - name: Retire orphaned remote files
        if: env.SKIP_DEPLOY != 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "Dry run: skipping deletion of retired files."
            exit 0
          fi

          # Allowliste verwaister Server-Dateien (alte Pfade aus der Zeit vor der css-Umstrukturierung
          # in Unterordner). Im Repo existieren sie nicht und keine Seite referenziert sie mehr.
          # Chirurgisches, idempotentes rm -f statt eines gefaehrlichen globalen --delete.
          echo "Retiring orphaned remote files:"
          printf '  %s\n' "css/leaflet.css" "css/political-territory-wiki-tree.css"

          lftp -u "$AVESMAPS_USER","$AVESMAPS_PASSWORD" -p "$AVESMAPS_PORT" "sftp://$AVESMAPS_HOST" <<EOF || echo "Retire: some files already gone (non-fatal)."
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 30
          cd "$AVESMAPS_REMOTE_PATH"
          rm -f "css/leaflet.css"
          rm -f "css/political-territory-wiki-tree.css"
          rm -r -f "_attic"
          rm -r -f "css/legacy"
          rm -r -f "js/pages"
          rm -r -f "map"
          rm -r -f "politics"
          rm -r -f "test"
          rm -f "api/app/wiki-proxy.php"
          rm -f "api/edit/wiki/dom-filter.php"
          rm -f "api/political-territory-lib.php"
          rm -f "api/schema.future.mysql.sql"
