<!doctype html>
<html lang="de">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Avesmaps – Herrschaftsgebiete bearbeiten</title>
	<style>
		:root{--page-bg:#f4efe7;--panel:#fff9f4;--panel-soft:#fffaf5;--text:#2f251c;--muted:#6c5a49;--border:#d8c6b2;--accent:#385d72;--danger:#8a3a1b}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;font-size:10pt;background:#2f322c;color:var(--text)}.app{width:min(920px,100%);min-height:100vh;margin:0 auto;background:var(--page-bg);box-shadow:0 0 30px rgba(0,0,0,.28)}header{position:sticky;top:0;z-index:10;padding:16px 20px;background:rgba(255,249,244,.96);border-bottom:1px solid var(--border)}h1{margin:0 0 4px;font-size:21px}main{display:grid;grid-template-columns:minmax(260px,.9fr) minmax(320px,1.1fr);gap:12px;padding:12px}.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 22px rgba(0,0,0,.12);overflow:hidden}.panel h2{margin:0;padding:10px 12px;font-size:15px;border-bottom:1px solid var(--border)}.controls{display:flex;gap:8px;padding:10px;border-bottom:1px solid var(--border)}input,button{font:inherit;border:1px solid #cdb79f;border-radius:7px;padding:8px 9px}input[type=search],input[type=text],input[type=url],input[type=number]{width:100%}button{background:#565044;color:white;font-weight:700;cursor:pointer}.secondary{background:#f3ebdf;color:#513c2b}.tree{max-height:72vh;overflow:auto;padding:8px;background:white}.tree ul{list-style:none;margin:0;padding-left:16px}.tree li{margin:3px 0}.node{display:inline-flex;gap:7px;align-items:center;padding:6px 8px;border-radius:6px;font-weight:700;cursor:grab}.node:hover,.node.selected{background:#f5eadc}.node.synthetic{color:#8b5d2a}.drop{margin:0;padding:18px;border:1px dashed #b99878;border-radius:8px;background:var(--panel-soft);text-align:center;font-weight:700}.drop.drag{background:#eef5f8;border-color:var(--accent)}.breadcrumb{display:flex;flex-wrap:wrap;gap:6px;padding:10px;background:var(--panel-soft);border-bottom:1px solid var(--border)}.breadcrumb button{background:white;color:var(--text);border-color:#cdb79f}.breadcrumb button.active{background:var(--accent);color:white}.form{display:grid;gap:12px;padding:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:grid;gap:4px;font-weight:700}.wide{grid-column:1/-1}.status{background:white;color:#5a4a3b}.error{color:var(--danger)}.wiki{padding:12px;background:white;border-top:1px solid var(--border)}.wiki dl{display:grid;grid-template-columns:120px 1fr;border:1px solid var(--border);border-radius:8px;overflow:hidden}.wiki dt,.wiki dd{margin:0;padding:7px 8px;border-bottom:1px solid #eadbcb}.wiki dt{font-weight:700;background:var(--panel-soft)}.coat{width:56px;height:56px;object-fit:contain}@media(max-width:760px){main{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.wide{grid-column:auto}}
	</style>
</head>
<body>
<div class="app">
<header><h1>Avesmaps – Herrschaftsgebiete bearbeiten</h1><p>Neuauflage mit Trennung von Wiki-Herrschaftsdaten und Geometrie-Darstellung.</p></header>
<main>
	<section class="panel">
		<h2>Baum der Herrschaftsgebiete</h2>
		<div class="controls"><input id="searchInput" type="search" placeholder="Suchen …"><button id="reloadButton" type="button">Laden</button></div>
		<div id="treeView" class="tree">Lädt …</div>
	</section>
	<section class="panel">
		<h2>Geometrie-Zuweisung und Kartendarstellung</h2>
		<div id="dropZone" class="drop">Herrschaftsgebiet hierher ziehen</div>
		<div id="breadcrumb" class="breadcrumb">Kein Gebiet zugewiesen</div>
		<form id="displayForm" class="form" autocomplete="off">
			<div class="grid">
				<label class="field wide">Anzeigename<input id="displayNameInput" name="display_name" type="text"></label>
				<label class="field wide">Alternativer Wappen-Link<input id="coatInput" name="coat_of_arms_url" type="url"></label>
				<label class="field">Zoom von<input id="minZoomInput" name="min_zoom" type="number" min="0" max="6" step="1"></label>
				<label class="field">Zoom bis<input id="maxZoomInput" name="max_zoom" type="number" min="0" max="6" step="1"></label>
				<label class="field">Farbe<input id="colorInput" name="color" type="color" value="#385d72"></label>
				<label class="field">Transparenz <output id="opacityOutput">33%</output><input id="opacityInput" name="opacity" type="range" min="0" max="100" step="1" value="33"></label>
				<label class="field">Anfang BF<input id="validFromInput" name="valid_from_bf" type="number" step="1"></label>
				<label class="field">Ende BF<input id="validToInput" name="valid_to_bf" type="number" step="1"></label>
				<label class="field wide"><span><input id="validOpenInput" name="valid_to_open" type="checkbox" checked> existiert bis heute</span></label>
			</div>
			<div class="grid"><button id="saveButton" type="button">Speichern</button><button id="cancelButton" class="secondary" type="button">Zurücksetzen</button></div>
			<input id="statusInput" class="status" type="text" readonly value="Noch nicht gespeichert">
		</form>
		<div id="wikiBox" class="wiki">Noch kein Gebiet ausgewählt.</div>
	</section>
</main>
</div>
<script>
"use strict";
const API_URL="https://avesmaps.de/api/political-territories-2.php";
const MODULE_VERSION="2026-05-16-political-tree-editor";
let rows=[],root=null,nodeById=new Map(),assignedNode=null,activeNode=null,displayState=new Map();
const $=id=>document.getElementById(id);
const els={tree:$('treeView'),search:$('searchInput'),drop:$('dropZone'),breadcrumb:$('breadcrumb'),wiki:$('wikiBox'),status:$('statusInput'),displayName:$('displayNameInput'),coat:$('coatInput'),minZoom:$('minZoomInput'),maxZoom:$('maxZoomInput'),color:$('colorInput'),opacity:$('opacityInput'),opacityOut:$('opacityOutput'),validFrom:$('validFromInput'),validTo:$('validToInput'),validOpen:$('validOpenInput')};
function text(v){return String(v??'').replace(/\u00a0/g,' ').replace(/\s+/g,' ').trim()}function key(v){return text(v).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/ß/g,'ss').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')}function esc(v){return text(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function num(v,f=null){if(v===''||v===null||v===undefined)return f;const n=Number(v);return Number.isFinite(n)?n:f}
function normalizeRows(items){return items.map(row=>({...row,name:text(row.name),type:text(row.type),status:text(row.status),affiliation_path:Array.isArray(row.affiliation_path)?row.affiliation_path.map(text).filter(Boolean):(row.affiliation_root?[text(row.affiliation_root)]:['ungeklärt']),coat_of_arms_url:text(row.coat_of_arms_url),wiki_url:text(row.wiki_url)})).filter(r=>r.name)}
function createNode(id,label,kind,row=null){return{id,label,kind,row,parent:null,children:[],map:new Map()}}function rowKey(row){return row.wiki_key||row.public_id||row.id||key(row.name)}function buildTree(){nodeById=new Map();const root=createNode('root','Herrschaftsgebiete','root');for(const row of rows){let cur=root,parts=[];for(const part of row.affiliation_path){const label=text(part).replace(/\s*\([^)]*\)\s*/g,' ').trim();if(!label)continue;parts.push(label);const id='path:'+parts.map(key).join('/');if(!cur.map.has(id)){const n=createNode(id,label,'synthetic');n.parent=cur;cur.map.set(id,n);cur.children.push(n)}cur=cur.map.get(id)}const id=rowKey(row);if(!cur.map.has(id)){const n=createNode(id,row.name,'territory',row);n.parent=cur;cur.map.set(id,n);cur.children.push(n)}else{cur.map.get(id).row=row;cur.map.get(id).kind='territory-group'}}sortNode(root);register(root);return root}function sortNode(n){n.children.sort((a,b)=>(a.children.length?0:1)-(b.children.length?0:1)||a.label.localeCompare(b.label,'de'));n.children.forEach(sortNode)}function register(n){if(n.id!=='root')nodeById.set(n.id,n);n.children.forEach(register)}
async function loadData(){els.status.value='Lädt Wiki-Daten …';try{const r=await fetch(API_URL,{headers:{Accept:'application/json'},credentials:'omit'});const p=await r.json();if(!r.ok||!p.ok)throw new Error(p.error||`HTTP ${r.status}`);rows=normalizeRows(p.items||p.territories||[]);root=buildTree();renderTree();els.status.value=`${rows.length} Einträge geladen.`}catch(e){els.tree.innerHTML=`<p class="error">${esc(e.message||e)}</p>`;els.status.value='Fehler beim Laden.'}}
function renderTree(){const q=text(els.search.value).toLowerCase();els.tree.innerHTML='';const ul=document.createElement('ul');renderChildren(root.children.filter(n=>matches(n,q)),ul,0);els.tree.append(ul)}function matches(n,q){if(!q)return true;const own=[n.label,n.row?.type,n.row?.status,n.row?.affiliation_path?.join(' ')].join(' ').toLowerCase().includes(q);return own||n.children.some(c=>matches(c,q))}function renderChildren(children,ul,depth){for(const n of children){const li=document.createElement('li');if(n.children.length){const details=document.createElement('details');details.open=depth>0||text(els.search.value)!=='';const summary=document.createElement('summary');summary.append(renderItem(n));details.append(summary);const childUl=document.createElement('ul');renderChildren(n.children.filter(c=>matches(c,text(els.search.value).toLowerCase())),childUl,depth+1);details.append(childUl);li.append(details)}else li.append(renderItem(n));ul.append(li)}}function renderItem(n){const s=document.createElement('span');s.className='node '+(n.row?'':'synthetic');s.draggable=true;s.dataset.nodeId=n.id;s.textContent='⠿ '+n.label;s.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',n.id);e.dataTransfer.effectAllowed='copy'});s.addEventListener('click',e=>{e.stopPropagation();selectNode(n)});return s}
function pathOf(n){const path=[];let c=n;while(c&&c.id!=='root'){path.unshift(c);c=c.parent}return path}function zoomPreset(len,i){const p={1:[[0,6]],2:[[0,2],[3,6]],3:[[0,2],[3,4],[5,6]],4:[[0,2],[3,4],[5,5],[6,6]],5:[[0,2],[3,3],[4,4],[5,5],[6,6]]};const l=Math.max(1,Math.min(5,len));return p[l][Math.max(0,Math.min(i,l-1))]}
function defaultState(n){const path=pathOf(n),i=path.length-1,z=zoomPreset(path.length,i);return{nodeId:n.id,nodeKey:key(n.label),wikiKey:n.row?.wiki_key||'',rowId:n.row?.id||null,name:n.label,displayName:n.row?.name||n.label,coatOfArmsUrl:n.row?.coat_of_arms_url||'',minZoom:z[0],maxZoom:z[1],color:'#385d72',opacity:.33,validFromBf:num(n.row?.founded_start_bf),validToBf:num(n.row?.dissolved_end_bf),validToOpen:!n.row?.dissolved_text,path:path.map(x=>x.label),pathKeys:path.map(x=>key(x.label)),depth:i}}
function getState(n){if(!displayState.has(n.id))displayState.set(n.id,defaultState(n));return displayState.get(n.id)}function saveActive(){if(!activeNode)return;const old=getState(activeNode);displayState.set(activeNode.id,{...old,displayName:text(els.displayName.value),coatOfArmsUrl:text(els.coat.value),minZoom:num(els.minZoom.value),maxZoom:num(els.maxZoom.value),color:text(els.color.value)||'#385d72',opacity:(num(els.opacity.value,33)||33)/100,validFromBf:num(els.validFrom.value),validToBf:els.validOpen.checked?null:num(els.validTo.value),validToOpen:els.validOpen.checked})}
function applyState(s){els.displayName.value=s.displayName||s.name||'';els.coat.value=s.coatOfArmsUrl||'';els.minZoom.value=s.minZoom??'';els.maxZoom.value=s.maxZoom??'';els.color.value=s.color||'#385d72';els.opacity.value=String(Math.round((s.opacity??.33)*100));syncOpacity();els.validFrom.value=s.validFromBf??'';els.validTo.value=s.validToBf??'';els.validOpen.checked=s.validToOpen!==false;syncValidTo()}function selectNode(n){if(activeNode)saveActive();activeNode=n;if(!assignedNode)assignedNode=n;renderDrop();renderBreadcrumb();applyState(getState(n));renderWiki(n)}function renderDrop(){els.drop.textContent=assignedNode?`Zugewiesen: ${assignedNode.label}`:'Herrschaftsgebiet hierher ziehen'}function renderBreadcrumb(){const path=assignedNode?pathOf(assignedNode):[];els.breadcrumb.innerHTML='';if(!path.length){els.breadcrumb.textContent='Kein Gebiet zugewiesen';return}path.forEach((n,i)=>{const b=document.createElement('button');b.type='button';b.textContent=n.label;b.className=n===activeNode?'active':'';b.onclick=()=>selectNode(n);els.breadcrumb.append(b);if(i<path.length-1)els.breadcrumb.append(' › ')})}function renderWiki(n){const r=n.row;if(!r){els.wiki.innerHTML=`<p>Abgeleiteter Gruppenknoten: ${esc(n.label)}</p>`;return}const coat=r.coat_of_arms_url?`<img class="coat" src="${esc(r.coat_of_arms_url)}" alt="">`:'';const lines=[['Typ',r.type],['Status',r.status],['Zugehörigkeit',r.affiliation_path?.join(' > ')],['Hauptstadt',r.capital_name],['Herrschaftssitz',r.seat_name],['Oberhaupt',r.ruler],['Gründung',r.founded_text],['Auflösung',r.dissolved_text],['Wiki',r.wiki_url]];els.wiki.innerHTML=`${coat}<h3>${esc(r.name)}</h3><dl>${lines.filter(x=>x[1]).map(([k,v])=>`<dt>${esc(k)}</dt><dd>${k==='Wiki'?`<a href="${esc(v)}" target="_blank" rel="noopener noreferrer">${esc(v)}</a>`:esc(v)}</dd>`).join('')}</dl>`}
function assignmentValue(){saveActive();const displays=assignedNode?pathOf(assignedNode).map(n=>getState(n)):[];return{version:MODULE_VERSION,assignedTerritory:assignedNode?{id:assignedNode.id,key:key(assignedNode.label),label:assignedNode.label,wikiKey:assignedNode.row?.wiki_key||'',rowId:assignedNode.row?.id||null,path:pathOf(assignedNode).map(n=>n.label),pathKeys:pathOf(assignedNode).map(n=>key(n.label))}:null,activeDisplayNode:activeNode?{id:activeNode.id,key:key(activeNode.label),label:activeNode.label}:null,displays,source:{assignedRow:assignedNode?.row||null,activeRow:activeNode?.row||null}}}
async function save(){const value=assignmentValue();if(!value.assignedTerritory){els.status.value='Kein Herrschaftsgebiet zugewiesen.';return}els.status.value='Speichere …';try{const r=await fetch(API_URL,{method:'PATCH',headers:{Accept:'application/json','Content-Type':'application/json'},body:JSON.stringify({action:'save_geometry_assignment',...value})});const p=await r.json().catch(()=>({ok:r.ok}));if(!r.ok||p.ok===false)throw new Error(p.error||`HTTP ${r.status}`);els.status.value=p.message||'Gespeichert.'}catch(e){els.status.value=e.message||String(e)}}function syncOpacity(){els.opacityOut.value=`${els.opacity.value}%`;els.opacityOut.textContent=`${els.opacity.value}%`}function syncValidTo(){els.validTo.disabled=els.validOpen.checked;if(els.validOpen.checked)els.validTo.value=''}
els.search.addEventListener('input',renderTree);$('reloadButton').addEventListener('click',loadData);$('saveButton').addEventListener('click',save);$('cancelButton').addEventListener('click',()=>{assignedNode=null;activeNode=null;displayState.clear();renderDrop();renderBreadcrumb();els.wiki.textContent='Noch kein Gebiet ausgewählt.';els.status.value='Zurückgesetzt.'});els.opacity.addEventListener('input',syncOpacity);els.validOpen.addEventListener('change',syncValidTo);els.drop.addEventListener('dragover',e=>{e.preventDefault();els.drop.classList.add('drag')});els.drop.addEventListener('dragleave',()=>els.drop.classList.remove('drag'));els.drop.addEventListener('drop',e=>{e.preventDefault();els.drop.classList.remove('drag');const n=nodeById.get(e.dataTransfer.getData('text/plain'));if(n){assignedNode=n;activeNode=null;displayState.clear();selectNode(n)}});
window.AvesmapsPoliticalTerritoryAssignment={version:MODULE_VERSION,load:loadData,reload:loadData,getValue:assignmentValue,setSelectedTerritory(identifier){const k=key(identifier);for(const n of nodeById.values()){if(key(n.id)===k||key(n.label)===k||key(n.row?.wiki_key)===k||String(n.row?.id||'')===String(identifier)){assignedNode=n;selectNode(n);return true}}return false},clearSelection(){assignedNode=null;activeNode=null;displayState.clear();renderDrop();renderBreadcrumb()},save};
syncOpacity();syncValidTo();loadData();
</script>
</body>
</html>
