<script>
  /* Resolve light/dark exactly like the parent app (js/app/theme-toggle.js): an explicit saved
     choice wins, otherwise follow the OS scheme. Runs before the stylesheet paints so this overlay
     iframe never flashes the wrong theme. Same guard as html/wiki-sync-settlement-editor.html. */
  (function () {
    function isDark() {
      var s = null; try { s = localStorage.getItem("avesmaps-theme"); } catch (e) {}
      if (s === "dark") { return true; }
      if (s === "light") { return false; }
      return !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
    }
    function apply() {
      if (isDark()) { document.documentElement.setAttribute("data-theme", "dark"); }
      else { document.documentElement.removeAttribute("data-theme"); }
    }
    apply();
    if (window.matchMedia) {
      var mq = window.matchMedia("(prefers-color-scheme: dark)");
      if (mq.addEventListener) { mq.addEventListener("change", apply); }
      else if (mq.addListener) { mq.addListener(apply); }
    }
  })();
</script>

<!-- Shared multi-source editor widget (mountFeatureSourceEditor) + its typeahead. Absolute paths
     like the settlement editor: this iframe is fetched with ?v=Date.now(), not through index.html's
     asset-versioning pass. -->
<script src="/js/ui/source-autocomplete.js"></script>
<script src="/js/review/review-feature-sources.js"></script>
<!-- Shared pure powerline topology helpers (same file the live map delegates to). -->
<script src="/js/map-features/powerline-topology.js"></script>
<script>
"use strict";
(function () {

// ---- Small helpers ---------------------------------------------------------------------------
const $ = (id) => document.getElementById(id);
const READ_API = "/api/edit/map/powerlines.php";
const MAP_FEATURES_EDIT_API = "/api/edit/map/features.php";
function esc(s) {
	return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function arraysEqual(a, b) {
	return a.length === b.length && a.every((value, index) => value === b[index]);
}
async function mapFeaturesEditPost(body) {
	const response = await fetch(MAP_FEATURES_EDIT_API, {
		method: "POST",
		credentials: "same-origin",
		headers: { "Content-Type": "application/json" },
		body: JSON.stringify(body),
	});
	let data = null;
	try { data = await response.json(); } catch (e) { /* non-JSON error body */ }
	if (!response.ok || (data && data.ok === false)) {
		const msg = (data && data.error && data.error.message) || (data && data.error) || ("HTTP " + response.status);
		throw new Error(msg);
	}
	return data || {};
}

// ---- State -----------------------------------------------------------------------------------
let segments = [];          // [{public_id,name,from_public_id,to_public_id,show_label,description,wiki_url,wiki_powerline,revision}]
let nodesMap = {};          // { public_id: {name,type,is_nodix} }
let candidates = [];        // [{public_id,name,type}]
let lines = [];             // grouped, see groupLines()
let selectedName = null;
let showDupesOnly = false;
let searchTerm = "";
let pendingSelectName = null;  // set by the host's "Bearbeiten" postMessage before data has loaded
let reorderDraft = null;       // strand node order the user is arranging (▲▼); null = the true stored order

// nodeLookup for the shared pure topology helpers.
function nodeLookup(publicId) {
	const n = nodesMap[publicId];
	if (!n) { return null; }
	return { name: n.name, isCrossing: n.type === "crossing" };
}
function nodeName(publicId) {
	const n = nodesMap[publicId];
	return (n && n.name) ? n.name : (publicId || "?");
}
function nodeIsCrossing(publicId) {
	const n = nodesMap[publicId];
	return !!(n && n.type === "crossing");
}

// ---- Grouping: segments -> lines -------------------------------------------------------------
// Two names count as near-duplicates when their normalized form (lowercased, punctuation and
// whitespace stripped) collides. That catches "Elementares Hexagramm" vs "Elementare Hexagramm"
// and "Elemntarlinie" only partially -- exact typo detection is a separate job; this flags the
// obvious collisions plus any name carrying a URL.
function normName(name) {
	return String(name || "").toLowerCase().replace(/https?:\/\/\S+/g, "").replace(/[^a-z0-9äöüß]/g, "");
}
function levenshtein(a, b) {
	const m = a.length, n = b.length;
	if (m === 0) { return n; }
	if (n === 0) { return m; }
	let prev = Array.from({ length: n + 1 }, (_, i) => i);
	for (let i = 1; i <= m; i++) {
		const cur = [i];
		for (let j = 1; j <= n; j++) {
			const cost = a[i - 1] === b[j - 1] ? 0 : 1;
			cur[j] = Math.min(prev[j] + 1, cur[j - 1] + 1, prev[j - 1] + cost);
		}
		prev = cur;
	}
	return prev[n];
}
function groupLines() {
	const byName = new Map();
	segments.forEach((seg) => {
		const name = String(seg.name || "").trim();
		if (name === "") { return; }
		if (!byName.has(name)) { byName.set(name, []); }
		byName.get(name).push(seg);
	});
	const names = [...byName.keys()];
	// Near-duplicate: two DISTINCT names whose normalized forms are within edit distance 2 (and long
	// enough that the distance is meaningful). Catches "Elementares/Elementare Hexagramm" and
	// "Elemntarlinie/Elementarlinie"; the fix is a rename onto the canonical name (= merge).
	const nearDupe = new Set();
	const norms = names.map(normName);
	for (let i = 0; i < names.length; i++) {
		for (let j = i + 1; j < names.length; j++) {
			const a = norms[i], b = norms[j];
			if (a === "" || b === "" || Math.min(a.length, b.length) < 5) { continue; }
			const d = levenshtein(a, b);
			if (d >= 1 && d <= 2) { nearDupe.add(names[i]); nearDupe.add(names[j]); }
		}
	}
	lines = names.map((name) => {
		const segs = byName.get(name);
		const topo = avesmapsPowerlineTopology(segs, nodeLookup);
		const anchor = segs.map((s) => s.public_id).sort()[0];
		const warnings = [];
		if (/https?:\/\//i.test(name)) { warnings.push("URL im Namen — bereinigen"); }
		if (nearDupe.has(name)) { warnings.push("Beinahe-Dublette — zusammenführen?"); }
		return { name, segments: segs, topology: topo, anchor, warnings };
	}).sort((a, b) => a.name.localeCompare(b.name, "de"));
}
function lineByName(name) {
	return lines.find((l) => l.name === name) || null;
}
function shapeLabel(shape) {
	return shape === "ring" ? "Ring" : shape === "branched" ? "verzweigt" : "Strang";
}

// ---- Column 1: the line list -----------------------------------------------------------------
function spanText(line) {
	const t = line.topology;
	if (!t) { return ""; }
	if (t.endpointIds.length === 2) { return nodeName(t.endpointIds[0]) + " ↔ " + nodeName(t.endpointIds[1]); }
	if (t.isRing) { return "geschlossen"; }
	if (t.endpointIds.length > 0) { return t.endpointIds.length + " Enden"; }
	return "";
}
function renderList() {
	const host = $("plList");
	const term = searchTerm.trim().toLowerCase();
	const visible = lines.filter((l) => {
		if (showDupesOnly && l.warnings.length === 0) { return false; }
		if (term && l.name.toLowerCase().indexOf(term) === -1) { return false; }
		return true;
	});
	if (visible.length === 0) {
		host.innerHTML = '<div class="se-empty">' + (lines.length === 0 ? "Keine Kraftlinien." : "Nichts gefunden.") + "</div>";
		return;
	}
	host.innerHTML = visible.map((l) => {
		const nodeCount = l.topology ? l.topology.adjacency.size : 0;
		const l2 = l.warnings.length > 0
			? '<div class="se-row-l2 warn">⚠ ' + esc(l.warnings[0]) + "</div>"
			: '<div class="se-row-l2 ok">' + nodeCount + " Nodices · " + l.segments.length + " Segmente · " + esc(spanText(l)) + "</div>";
		return '<div class="se-row' + (l.name === selectedName ? " is-selected" : "") + '" data-name="' + esc(l.name) + '">'
			+ '<div class="se-row-text"><div class="se-row-l1"><span class="se-row-name">' + esc(l.name) + '</span>'
			+ '<span class="se-row-type">' + (l.topology ? shapeLabel(l.topology.shape) : "") + "</span></div>"
			+ l2 + "</div></div>";
	}).join("");
	host.querySelectorAll(".se-row").forEach((row) => {
		row.addEventListener("click", () => selectLine(row.getAttribute("data-name")));
	});
}

// ---- Column 2: properties --------------------------------------------------------------------
function selectLine(name) {
	selectedName = name;
	reorderDraft = null;
	renderList();
	renderDetail();
	renderNodes();
}
function fieldSample(line, key) {
	// A line-level scalar: all segments carry the same value, so read the first non-empty.
	for (const s of line.segments) { if (s[key]) { return s[key]; } }
	return "";
}
function renderDetail() {
	const host = $("plDetail");
	const line = lineByName(selectedName);
	if (!line) { host.innerHTML = '<div class="dt-empty">Links eine Kraftlinie wählen.</div>'; return; }
	const showLabel = line.segments.some((s) => s.show_label);
	const description = fieldSample(line, "description");
	const wikiUrl = fieldSample(line, "wiki_url");
	const wiki = line.segments.map((s) => s.wiki_powerline).find((w) => w && typeof w === "object") || {};
	const wikiRow = (k, v) => (v && String(v).trim() !== "") ? '<div class="k">' + esc(k) + '</div><div>' + esc(v) + "</div>" : "";
	const wikiBlock = [wikiRow("Stärke", wiki.staerke), wikiRow("Affinität", wiki.affinitaet), wikiRow("Länge", wiki.laenge), wikiRow("Regionen", wiki.regionen)].join("");
	host.innerHTML =
		'<div class="dt-grp">Identität</div>'
		+ '<div class="dt-grid"><div class="k">Name</div><div>'
			+ '<input type="text" id="plName" maxlength="160" value="' + esc(line.name) + '">'
			+ '<div class="pl-hint">Schreibt auf <b>alle ' + line.segments.length + ' Segmente</b>. Exakt gleicher Name wie eine andere Linie ⇒ <b>beide verschmelzen</b>.</div>'
		+ "</div></div>"
		+ '<div class="dt-check"><input type="checkbox" id="plShowLabel"' + (showLabel ? " checked" : "") + "><span>Name auf der Karte anzeigen</span></div>"
		+ '<div class="dt-grid"><div class="k">Wiki-Link</div><div>'
			+ '<input type="url" id="plWikiUrl" maxlength="500" placeholder="https://de.wiki-aventurica.de/wiki/…" value="' + esc(wikiUrl) + '">'
			+ '<div class="pl-hint">Ausdrücklich gesetzt, nie geraten.' + (wikiUrl ? ' <a class="dt-link" href="' + esc(wikiUrl) + '" target="_blank" rel="noopener">Öffnen ↗</a>' : "") + "</div>"
		+ "</div></div>"
		+ '<div class="dt-grp">Beschreibung</div>'
		+ '<div class="dt-grid stack"><div><textarea id="plDescription" maxlength="2000">' + esc(description) + "</textarea></div></div>"
		+ '<div class="dt-grp">Quellen</div>'
		+ '<div id="plSources"></div>'
		+ (wikiBlock ? '<div class="dt-grp">Aus dem Wiki <span class="dt-badge">Sync · nicht editierbar</span></div><div class="dt-grid">' + wikiBlock + "</div>" : "")
		+ '<div class="dt-actions">'
			+ '<button class="primary" id="plSave">Speichern</button>'
			+ '<button id="plDelete">Linie löschen</button>'
			+ '<span class="dt-msg" id="plSaveMsg"></span>'
		+ "</div>";
	$("plSave").addEventListener("click", saveLine);
	$("plDelete").addEventListener("click", deleteLine);
	// Shared multi-source widget, anchored on the line's canonical segment (smallest public_id).
	if (typeof mountFeatureSourceEditor === "function" && $("plSources")) {
		mountFeatureSourceEditor($("plSources"), "powerline", () => line.anchor, { escape: esc });
	} else if ($("plSources")) {
		$("plSources").innerHTML = '<div class="pl-hint">Quellen-Editor nicht geladen.</div>';
	}
}
function setSaveMsg(text, cls) {
	const el = $("plSaveMsg"); if (!el) { return; }
	el.textContent = text; el.className = "dt-msg" + (cls ? " " + cls : "");
}
async function saveLine() {
	const line = lineByName(selectedName);
	if (!line) { return; }
	const newName = $("plName").value.trim();
	if (newName === "") { setSaveMsg("Name darf nicht leer sein.", "bad"); return; }
	setSaveMsg("Speichert…", "");
	try {
		await mapFeaturesEditPost({
			action: "update_powerline_line",
			current_name: line.name,
			new_name: newName,
			show_label: $("plShowLabel").checked,
			description: $("plDescription").value,
			wiki_url: $("plWikiUrl").value.trim(),
		});
		const merged = newName !== line.name && lines.some((l) => l.name === newName);
		await reload(newName);
		setSaveMsg(merged ? "Gespeichert – mit „" + newName + "“ verschmolzen." : "Gespeichert – auf alle Segmente geschrieben.", "ok");
	} catch (e) {
		setSaveMsg(e.message || "Speichern fehlgeschlagen.", "bad");
	}
}
async function deleteLine() {
	const line = lineByName(selectedName);
	if (!line) { return; }
	if (!window.confirm('„' + line.name + '“ mit allen ' + line.segments.length + " Segmenten löschen?")) { return; }
	setSaveMsg("Löscht…", "");
	try {
		for (const seg of line.segments) {
			await mapFeaturesEditPost({ action: "delete_feature", public_id: seg.public_id });
		}
		selectedName = null;
		await reload(null);
	} catch (e) {
		setSaveMsg(e.message || "Löschen fehlgeschlagen.", "bad");
	}
}

// ---- Column 3: nodes -------------------------------------------------------------------------
function flyBtn(pid) {
	return '<button class="pl-icon-btn" title="Auf Karte zeigen" data-fly="' + esc(pid) + '">◎</button>';
}
function nodeBadge(pid) {
	return nodeIsCrossing(pid) ? '<span class="dt-badge warn">Kreuzung</span>' : '<span class="dt-badge">Nodix</span>';
}
function renderNodes() {
	const host = $("plNodes");
	const line = lineByName(selectedName);
	if (!line || !line.topology) { host.innerHTML = '<div class="dt-empty">Links eine Kraftlinie wählen.</div>'; return; }
	const t = line.topology;
	let html = "";
	if (t.shape === "strand") {
		const trueChain = avesmapsPowerlineOrderedChain(t) || [];
		const chain = (reorderDraft && reorderDraft.length === trueChain.length) ? reorderDraft : trueChain;
		const canReorder = chain.length >= 3;
		const dirty = !!reorderDraft && !arraysEqual(chain, trueChain);
		html += '<div class="pl-topo-note">Strang mit 2 Enden · Reihenfolge = Verlauf.' + (canReorder ? " ▲▼ sortiert um," : "") + ' ✕ entfernt einen Nodix (löscht seine Segmente); „+ Nodix hinzufügen" verlängert die Linie.</div>';
		if (dirty) {
			html += '<div class="pl-reorder-bar"><span class="pl-reorder-lead">Reihenfolge geändert</span>'
				+ '<button class="primary" id="plReorderSave">Speichern</button>'
				+ '<button id="plReorderReset">Zurücksetzen</button>'
				+ '<span class="dt-msg" id="plReorderMsg"></span></div>';
		}
		chain.forEach((pid, i) => {
			const isEnd = i === 0 || i === chain.length - 1;
			if (isEnd) { html += '<div class="pl-end-label">Ende</div>'; }
			html += '<div class="pl-node' + (isEnd ? " is-end" : "") + '">'
				+ '<span class="pl-node-name">' + esc(nodeName(pid)) + "</span>"
				+ nodeBadge(pid)
				+ (canReorder
					? '<button class="pl-icon-btn" title="Nach oben" data-move-up="' + i + '"' + (i === 0 ? " disabled" : "") + ">▲</button>"
						+ '<button class="pl-icon-btn" title="Nach unten" data-move-down="' + i + '"' + (i === chain.length - 1 ? " disabled" : "") + ">▼</button>"
					: "")
				+ flyBtn(pid)
				+ '<button class="pl-icon-btn del" title="Nodix entfernen" data-remove-node="' + esc(pid) + '">✕</button>'
				+ "</div>";
			if (i < chain.length - 1) { html += '<div class="pl-conn"></div>'; }
		});
	} else {
		const note = t.isRing ? "Geschlossener Ring · " + line.segments.length + " Segmente · keine Enden"
			: "Verzweigte Linie · " + t.endpointIds.length + " Enden · als Kantenliste bearbeiten";
		html += '<div class="pl-topo-note">' + note + " ✕ entfernt eine Kante.</div>";
		line.segments.forEach((seg) => {
			html += '<div class="pl-edge"><span class="a">' + esc(nodeName(seg.from_public_id)) + '</span><span class="arw">—</span><span class="a">' + esc(nodeName(seg.to_public_id)) + "</span>"
				+ flyBtn(seg.from_public_id)
				+ '<button class="pl-icon-btn del" title="Kante entfernen" data-remove-seg="' + esc(seg.public_id) + '">✕</button></div>';
		});
	}
	html += renderAddPanel(line);
	host.innerHTML = html;
	wireNodeActions(line);
}
function renderAddPanel(line) {
	const nodeOptions = [...line.topology.adjacency.keys()].map((pid) => '<option value="' + esc(pid) + '">' + esc(nodeName(pid)) + "</option>").join("");
	return '<div class="pl-add">'
		+ '<button class="pl-add-toggle" id="plAddToggle">+ Nodix hinzufügen</button>'
		+ '<div class="pl-add-panel" id="plAddPanel" hidden>'
			+ '<label>Verbinden von<select id="plAddFrom">' + nodeOptions + "</select></label>"
			+ '<label>nach (Nodix-Ort oder Kreuzung)<input type="search" id="plAddSearch" placeholder="suchen …" autocomplete="off"></label>'
			+ '<div class="pl-results" id="plAddResults"></div>'
			+ '<div class="dt-actions"><button class="primary" id="plAddConfirm" disabled>Nodix anfügen</button><button id="plAddCancel">Abbrechen</button><span class="dt-msg" id="plAddMsg"></span></div>'
		+ "</div></div>";
}
let addPick = null;
function wireNodeActions(line) {
	$("plNodes").querySelectorAll("[data-fly]").forEach((b) => b.addEventListener("click", () => flyToNode(b.getAttribute("data-fly"))));
	$("plNodes").querySelectorAll("[data-remove-node]").forEach((b) => b.addEventListener("click", () => removeNode(b.getAttribute("data-remove-node"))));
	$("plNodes").querySelectorAll("[data-remove-seg]").forEach((b) => b.addEventListener("click", () => removeSegment(b.getAttribute("data-remove-seg"))));
	$("plNodes").querySelectorAll("[data-move-up]").forEach((b) => b.addEventListener("click", () => moveNode(parseInt(b.getAttribute("data-move-up"), 10), -1)));
	$("plNodes").querySelectorAll("[data-move-down]").forEach((b) => b.addEventListener("click", () => moveNode(parseInt(b.getAttribute("data-move-down"), 10), 1)));
	const reorderSave = $("plReorderSave");
	if (reorderSave) { reorderSave.addEventListener("click", saveReorder); }
	const reorderReset = $("plReorderReset");
	if (reorderReset) { reorderReset.addEventListener("click", () => { reorderDraft = null; renderNodes(); }); }
	const toggle = $("plAddToggle");
	if (toggle) {
		toggle.addEventListener("click", () => { const p = $("plAddPanel"); p.hidden = !p.hidden; if (!p.hidden) { $("plAddSearch").focus(); } });
		$("plAddCancel").addEventListener("click", () => { $("plAddPanel").hidden = true; });
		addPick = null;
		$("plAddSearch").addEventListener("input", () => renderAddResults(line));
		$("plAddConfirm").addEventListener("click", () => addNode(line));
		renderAddResults(line);
	}
}
function renderAddResults(line) {
	const term = $("plAddSearch").value.trim().toLowerCase();
	const inLine = new Set(line.topology.adjacency.keys());
	const matches = candidates
		.filter((c) => !inLine.has(c.public_id))
		.filter((c) => term === "" ? true : c.name.toLowerCase().indexOf(term) !== -1)
		.slice(0, 30);
	$("plAddResults").innerHTML = matches.length === 0
		? '<div style="padding:5px 7px;color:var(--mut);font-size:11px;">Keine Kandidaten.</div>'
		: matches.map((c) => '<div data-pick="' + esc(c.public_id) + '"' + (addPick === c.public_id ? ' class="is-picked"' : "") + ">" + esc(c.name) + " " + (c.type === "crossing" ? '<span class="dt-badge warn">Kreuzung</span>' : '<span class="dt-badge">Nodix</span>') + "</div>").join("");
	$("plAddResults").querySelectorAll("[data-pick]").forEach((d) => d.addEventListener("click", () => {
		addPick = d.getAttribute("data-pick");
		$("plAddConfirm").disabled = false;
		renderAddResults(line);
	}));
}
async function addNode(line) {
	if (!addPick) { return; }
	const from = $("plAddFrom").value;
	const msg = $("plAddMsg");
	msg.textContent = "Fügt an…"; msg.className = "dt-msg";
	try {
		await mapFeaturesEditPost({ action: "create_powerline", from_public_id: from, to_public_id: addPick, name: line.name });
		await reload(line.name);
	} catch (e) {
		msg.textContent = e.message || "Fehlgeschlagen."; msg.className = "dt-msg bad";
	}
}
async function removeSegment(publicId) {
	if (!window.confirm("Diese Kante entfernen?")) { return; }
	try { await mapFeaturesEditPost({ action: "delete_feature", public_id: publicId }); await reload(selectedName); }
	catch (e) { setSaveMsg(e.message || "Fehlgeschlagen.", "bad"); }
}
async function removeNode(pid) {
	const line = lineByName(selectedName);
	if (!line) { return; }
	const incident = line.segments.filter((s) => s.from_public_id === pid || s.to_public_id === pid);
	if (!window.confirm("„" + nodeName(pid) + "“ entfernen? Löscht " + incident.length + " Segment(e); die Linie kann dabei zerfallen.")) { return; }
	try {
		for (const seg of incident) { await mapFeaturesEditPost({ action: "delete_feature", public_id: seg.public_id }); }
		await reload(selectedName);
	} catch (e) { setSaveMsg(e.message || "Fehlgeschlagen.", "bad"); }
}
// ▲▼ swap two adjacent Nodices of a strand into a tentative order (reorderDraft). Only adjacent swaps,
// so any permutation is reachable step by step and each step is obvious. Nothing is written until
// "Speichern" -- this is a destructive rewire, so it stays staged behind a confirmation.
function moveNode(index, delta) {
	const line = lineByName(selectedName);
	if (!line || !line.topology) { return; }
	const trueChain = avesmapsPowerlineOrderedChain(line.topology) || [];
	const base = (reorderDraft && reorderDraft.length === trueChain.length) ? reorderDraft : trueChain;
	const chain = base.slice();
	const target = index + delta;
	if (index < 0 || index >= chain.length || target < 0 || target >= chain.length) { return; }
	const swap = chain[index]; chain[index] = chain[target]; chain[target] = swap;
	reorderDraft = chain;
	renderNodes();
}
async function saveReorder() {
	const line = lineByName(selectedName);
	if (!line || !line.topology) { return; }
	const trueChain = avesmapsPowerlineOrderedChain(line.topology) || [];
	const order = (reorderDraft && reorderDraft.length === trueChain.length) ? reorderDraft : trueChain;
	const diff = (typeof avesmapsPowerlineReorderDiff === "function") ? avesmapsPowerlineReorderDiff(line.segments, order) : { create: [], remove: [] };
	if (diff.create.length === 0 && diff.remove.length === 0) { reorderDraft = null; renderNodes(); return; }
	if (!window.confirm("Reihenfolge von „" + line.name + "“ ändern?\n\n" + diff.create.length + " Segment(e) werden neu angelegt, " + diff.remove.length + " entfernt.")) { return; }
	const msg = $("plReorderMsg"); if (msg) { msg.textContent = "Speichert…"; msg.className = "dt-msg"; }
	try {
		await mapFeaturesEditPost({ action: "reorder_powerline_line", current_name: line.name, ordered_public_ids: order });
		reorderDraft = null;
		await reload(line.name);
	} catch (e) {
		const failed = $("plReorderMsg");
		if (failed) { failed.textContent = e.message || "Umsortieren fehlgeschlagen."; failed.className = "dt-msg bad"; }
	}
}
function flyToNode(pid) {
	// The editor lives in an iframe; ask the parent app to fly to this map location.
	try {
		if (window.parent && typeof window.parent.avesmapsFlyToLocationPublicId === "function") {
			window.parent.avesmapsFlyToLocationPublicId(pid);
		}
	} catch (e) { /* cross-frame or not available: silent */ }
}

// ---- Ribbon ----------------------------------------------------------------------------------
function wireRibbon() {
	$("plSync").addEventListener("click", async () => {
		const sync = (window.parent && typeof window.parent.startWikiSyncPowerlines === "function") ? window.parent.startWikiSyncPowerlines : null;
		if (!sync) { return; }
		try {
			setStatus("⚡ Kraftlinien werden abgeglichen …");
			const res = await sync();                 // runs the sync in the parent; returns { type, message }
			await reload(selectedName);               // pull the freshly synced wiki fields into the editor
			flashStatus(res && res.message ? res.message : "Kraftlinien abgeglichen.");
		} catch (e) {
			flashStatus("Kraftlinien-Abgleich fehlgeschlagen.");
		}
	});
	$("plDupes").addEventListener("click", () => {
		showDupesOnly = !showDupesOnly;
		$("plDupes").classList.toggle("is-active", showDupesOnly);
		renderList();
	});
	$("plMapFilter").addEventListener("click", () => {
		$("plMapFilter").classList.toggle("is-active");
		// Live map filter is a parent-window concern; wired when the parent exposes it.
	});
	$("plSearch").addEventListener("input", () => { searchTerm = $("plSearch").value; renderList(); });
}

// ---- Load ------------------------------------------------------------------------------------
function setStatus(text) { $("plStatusText").textContent = text; }
function statusCountsText() {
	const dupeCount = lines.filter((l) => l.warnings.length > 0).length;
	return lines.length + " Kraftlinien · " + segments.length + " Segmente" + (dupeCount ? " · " + dupeCount + " Warnungen" : "");
}
// Show a message in the editor's OWN status bar for a few seconds, then fall back to the counts. Used
// for the "Kraftlinien syncen" result so it appears IN the editor -- the panel status sits behind the
// overlay and the owner never sees it there.
let plFlashTimer = null;
function flashStatus(message) {
	setStatus(message);
	if (plFlashTimer) { clearTimeout(plFlashTimer); }
	plFlashTimer = setTimeout(() => { setStatus(statusCountsText()); }, 7000);
}
function ingest(data) {
	reorderDraft = null;  // fresh data supersedes any half-arranged order
	segments = Array.isArray(data.segments) ? data.segments : [];
	nodesMap = (data.nodes && typeof data.nodes === "object") ? data.nodes : {};
	candidates = Array.isArray(data.nodix_candidates) ? data.nodix_candidates : [];
	groupLines();
	const dupeCount = lines.filter((l) => l.warnings.length > 0).length;
	setStatus(statusCountsText());
	$("plDupesInfo").textContent = dupeCount ? dupeCount + " zu prüfen" : "keine gefunden";
	if (pendingSelectName && lineByName(pendingSelectName)) { selectedName = pendingSelectName; pendingSelectName = null; }
	renderList();
	if (selectedName && lineByName(selectedName)) { renderDetail(); renderNodes(); }
	else { selectedName = null; $("plDetail").innerHTML = '<div class="dt-empty">Links eine Kraftlinie wählen.</div>'; $("plNodes").innerHTML = '<div class="dt-empty">Links eine Kraftlinie wählen.</div>'; }
}
async function reload(selectName) {
	if (selectName !== undefined) { selectedName = selectName; }
	await loadData();
}
async function loadData() {
	if (new URLSearchParams(location.search).has("demo")) { ingest(demoData()); return; }
	try {
		const response = await fetch(READ_API, { credentials: "same-origin", headers: { "Accept": "application/json" } });
		const data = await response.json();
		if (!response.ok || data.ok === false) { throw new Error((data.error && data.error.message) || ("HTTP " + response.status)); }
		ingest(data);
	} catch (e) {
		$("plList").innerHTML = '<div class="se-error">Konnte Kraftlinien nicht laden: ' + esc(e.message) + "</div>";
		setStatus("Fehler beim Laden.");
	}
}

// ---- Demo data (?demo=1): renders every path without a backend/login ---------------------------
function demoData() {
	const N = (id, name, type, nodix) => [id, { name, type, is_nodix: !!nodix }];
	const nodes = Object.fromEntries([
		N("gareth", "Gareth", "grossstadt", true), N("k7", "Kreuzung-7", "crossing", false),
		N("kuslik", "Kuslik", "grossstadt", true), N("punin", "Punin", "grossstadt", true),
		N("m", "Nadoret", "stadt", true), N("x", "Mendena", "stadt", true), N("y", "Riva", "stadt", true), N("z", "Festum", "stadt", true), N("k4", "Kreuzung-4", "crossing", false),
		N("a", "Brustlooge", "dorf", true), N("b", "Donnerbach", "dorf", true), N("c", "Aubruch", "dorf", true),
		N("e1", "Elem-A", "dorf", true), N("e2", "Elem-B", "dorf", true),
		N("vin", "Vinsalt", "grossstadt", true), N("bel", "Belhanka", "stadt", true),
	]);
	const seg = (pid, name, from, to, extra) => Object.assign({ public_id: pid, name, from_public_id: from, to_public_id: to, show_label: false, description: "", wiki_url: "", wiki_powerline: null, revision: 1 }, extra || {});
	const segs = [
		seg("s1", "Konzilslinie", "gareth", "k7", { description: "Verbindet die Konzilsstädte des Mittelreichs.", wiki_url: "https://de.wiki-aventurica.de/wiki/Konzilslinie", wiki_powerline: { staerke: "kontinental", laenge: "ca. 3000 Meilen", regionen: "Kosch · Almada" } }),
		seg("s2", "Konzilslinie", "k7", "kuslik"), seg("s3", "Konzilslinie", "kuslik", "punin"),
		seg("f1", "Fächer der Macht", "k4", "m"), seg("f2", "Fächer der Macht", "k4", "x"), seg("f3", "Fächer der Macht", "k4", "y"), seg("f4", "Fächer der Macht", "k4", "z"),
		seg("h1", "Hexenband", "a", "b"), seg("h2", "Hexenband", "b", "c"), seg("h3", "Hexenband", "c", "a"),
		seg("d1", "Elementares Hexagramm", "e1", "e2"), seg("d2", "Elementare Hexagramm", "e1", "e2"),
		seg("u1", "Septima - https://de.wiki-aventurica.de/wiki/Septima", "vin", "bel"),
	];
	return { segments: segs, nodes, nodix_candidates: Object.entries(nodes).filter(([, n]) => n.is_nodix || n.type === "crossing").map(([id, n]) => ({ public_id: id, name: n.name, type: n.type })) };
}

// ---- Boot ------------------------------------------------------------------------------------
function boot() {
	wireRibbon();
	// The host may ask us to jump to a line by name (map popup "Bearbeiten"). Remember it; if the
	// list is already loaded, jump right away.
	window.addEventListener("message", (event) => {
		if (event.origin !== location.origin) { return; }
		const name = event.data && event.data.avesmapsPowerlineSelect;
		if (!name) { return; }
		pendingSelectName = String(name);
		if (lineByName(pendingSelectName)) { selectLine(pendingSelectName); pendingSelectName = null; }
	});
	loadData();
}
if (document.readyState === "loading") { document.addEventListener("DOMContentLoaded", boot); } else { boot(); }

})();
</script>
