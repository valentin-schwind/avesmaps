<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Avesmaps – Herrschaftsgebiete synchronisieren und editieren</title>
<link rel="stylesheet" href="/css/base/fonts.css">
<style>
  :root { --bg:#f4efe7; --panel:#fff9f4; --soft:#fffaf5; --line:#d8c6b2; --line2:#cdb79f; --fg:#2f251c; --mut:#6c5a49; --accent:#235f82; --warn:#b8860b; --bad:#9d3a2e; --ok:#2e7d32; --font-ui:"Faculty Glyphic","Arial",sans-serif; }
  * { box-sizing:border-box; }
  body { margin:0; font:13px/1.45 var(--font-ui); background:var(--bg); color:var(--fg); }
  header { padding:10px 14px; background:var(--panel); border-bottom:1px solid var(--line); }
  h1 { font-size:15px; margin:0 0 8px; color:#3f3428; }
  .controls { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  button { background:#f3ebdf; color:#513c2b; border:1px solid #b99a78; border-radius:5px; padding:5px 10px; cursor:pointer; font:inherit; }
  button:hover { background:#ead9c2; }
  button:disabled { opacity:.5; cursor:default; }
  button.primary { background:#565044; border-color:#5f4f40; color:#fff9f4; }
  button.primary:hover { background:#4a463b; }
  textarea { width:100%; height:54px; background:var(--soft); color:var(--fg); border:1px solid var(--line); border-radius:5px; padding:6px; font:12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; resize:vertical; }
  #status { padding:6px 14px; color:var(--mut); border-bottom:1px solid var(--line); white-space:pre-wrap; }
  .cols { display:flex; height:calc(100vh - 200px); }
  .col { flex:1; overflow:auto; padding:8px; }
  #left { border-right:1px solid var(--line); max-width:46%; }
  .bar { display:flex; gap:6px; align-items:center; margin-bottom:6px; position:sticky; top:0; background:var(--bg); padding-bottom:4px; }
  input[type=search], select { background:var(--soft); color:var(--fg); border:1px solid var(--line); border-radius:5px; padding:4px 6px; font:inherit; }
  input[type=search] { flex:1; }
  .row { display:flex; align-items:center; gap:6px; padding:3px 5px; border-radius:4px; cursor:grab; }
  .row:hover { background:#f0e6d8; }
  .row .nm { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tag { font-size:10px; padding:1px 5px; border-radius:8px; border:1px solid var(--line2); color:var(--mut); }
  .tag.lock { color:var(--accent); border-color:var(--accent); }
  .tag.div { color:var(--warn); border-color:var(--warn); }
  .tag.conf { color:var(--bad); border-color:var(--bad); }
  .tag.gap { color:var(--bad); border-color:var(--bad); }
  .tag.sied { color:#7a4fa0; border-color:#b79fce; }
  .dot { width:8px; height:8px; border-radius:50%; flex:none; }
  .dot.public_domain { background:var(--ok); } .dot.attribution_required { background:var(--warn); } .dot.unknown { background:#b0a392; } .dot.none { background:transparent; }
  ul.tree { list-style:none; margin:0; padding-left:14px; }
  ul.tree li { margin:1px 0; }
  .node { display:inline-flex; align-items:center; gap:5px; padding:2px 6px; border-radius:4px; cursor:grab; }
  .node:hover { background:#f0e6d8; }
  .node.drop { outline:2px dashed var(--accent); }
  .twist { cursor:pointer; color:var(--mut); width:12px; display:inline-block; user-select:none; }
  .muted { color:var(--mut); }
  a.wl { color:var(--mut); text-decoration:none; font-size:11px; padding:0 2px; }
  a.wl:hover { color:var(--accent); }
  .count { color:var(--mut); font-size:11px; }
  #dropRoot, #dropExclude { margin:6px 0; padding:6px; border:1px dashed var(--line2); border-radius:5px; text-align:center; color:var(--mut); }
  #dropExclude { border-color:#c0998f; }
  #dropRoot.drop, #dropExclude.drop { outline:2px dashed var(--accent); }
  .tag.excl { color:#7a4fa0; border-color:#c0998f; }
</style>
</head>
<body>
<header>
  <h1>Avesmaps – Herrschaftsgebiete synchronisieren und editieren <span class="muted">(Crawl → Staging → Modell)</span></h1>
  <textarea id="seeds" spellcheck="false"></textarea>
  <div class="controls" style="margin-top:6px">
    <button class="primary" id="btnCrawl">Crawl starten</button>
    <button id="btnModel">Modell bauen</button>
    <button id="btnLic">Lizenzen</button>
    <button id="btnDiff">Diff</button>
    <button id="btnCache">parent_id Dry-Run</button>
    <button id="btnReload">Modell laden</button>
    <label style="margin-left:12px" title="Andere Kontinente bleiben gesynct, werden nur ausgeblendet"><input type="checkbox" id="aventurienOnly" checked> nur Aventurien</label>
    <span id="busy" class="muted"></span>
  </div>
</header>
<div id="status">Bereit.</div>
<div class="cols">
  <div class="col" id="left">
    <div class="bar">
      <input type="search" id="search" placeholder="Suche Name/wiki_key…">
      <span id="attn" class="count" title="offene Lücken · Konflikte"></span>
      <select id="filter">
        <option value="gap">Offene Lücken</option>
        <option value="conflict">Konflikte (platziert)</option>
        <option value="diverges">Divergenzen</option>
        <option value="locked">Gesperrt</option>
        <option value="siedlung">Stadtstaaten</option>
        <option value="excluded">Aussortiert</option>
        <option value="all">Alle</option>
      </select>
    </div>
    <div id="dropRoot">▶ Hierher ziehen = zur Wurzel machen (Eltern entfernen)</div>
    <div id="dropExclude">✕ Hierher ziehen = aussortieren (kein Herrschaftsgebiet)</div>
    <div id="list"></div>
  </div>
  <div class="col" id="right">
    <div class="bar"><b>Hierarchie-Modell</b> <span id="treeCount" class="count"></span></div>
    <div id="tree"></div>
  </div>
</div>
<script>
const API = '/api/edit/wiki/sync-monitor.php';
const DEFAULT_SEEDS = [
  'Kategorie:Staat','Kategorie:Provinz','Kategorie:Anspruchsgebiet','Kategorie:Bund','Kategorie:Kirchenprovinz','Kategorie:Kolonie',
  'Baronie/Liste','Emirat/Liste','Freiherrschaft/Liste','Fürstentum/Liste','Grafschaft/Liste','Herzogtum/Liste','Jarltum/Liste',
  'Kaiserreich/Liste','Königreich/Liste','Markgrafschaft/Liste','Pfalzgrafschaft/Liste','Reichsmark/Liste','Reichsstadt/Liste',
  'Republik/Liste','Shîkanydad/Liste','Staat/Liste','Sultanat/Liste'
];
const $ = (id) => document.getElementById(id);
$('seeds').value = DEFAULT_SEEDS.join('\n');
let NODES = [], BYKEY = new Map();

async function api(action, opts={}) {
  const method = opts.method || 'GET';
  const init = { method, credentials:'include', cache:'no-store' };
  let url = `${API}?action=${encodeURIComponent(action)}`;
  if (method === 'POST') { init.headers = {'Content-Type':'application/json'}; init.body = JSON.stringify(Object.assign({action}, opts.body||{})); }
  else if (opts.query) { url += '&' + opts.query; }
  const r = await fetch(url, init);
  const t = await r.text();
  let j; try { j = JSON.parse(t); } catch(e) { throw new Error('Ungültige Antwort: '+t.slice(0,200)); }
  if (!r.ok || j.ok === false) throw new Error(j.error || ('HTTP '+r.status));
  return j;
}
function setStatus(msg) { $('status').textContent = msg; }
function busy(on) { $('busy').textContent = on ? '⏳ läuft…' : ''; document.querySelectorAll('header button').forEach(b=>b.disabled=on); }

async function runCrawl() {
  busy(true);
  try {
    const seeds = $('seeds').value.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
    const start = await api('start_run', {method:'POST', body:{seeds}});
    const run = start.run_id;
    setStatus(`Run ${run.slice(0,8)} gestartet: ${start.seeded} Seeds. Crawle…`);
    let guard = 0;
    while (guard++ < 400) {
      const step = await api('crawl_step', {method:'POST', body:{run_id:run, options:{batch_limit:40, step_runtime:20, sleep_ms:120}}});
      const s = step.status;
      setStatus(`Crawl ${run.slice(0,8)}: pending ${s.pending}, done ${s.done}, pages ${s.by_role.page||0}, stored ${step.stored}, errors ${s.error}`);
      if ((s.pending||0) === 0) break;
    }
    setStatus(`Crawl fertig. Baue Modell…`);
    await api('rebuild_model', {method:'POST'});
    await loadModel();
    setStatus(`Crawl + Modell fertig.`);
  } catch(e) { setStatus('Fehler: '+e.message); }
  busy(false);
}

async function runLicenses() {
  busy(true);
  try {
    let guard=0, last;
    do { last = await api('enrich_licenses', {method:'POST', body:{options:{batch_limit:40, sleep_ms:60}}});
      setStatus(`Lizenzen: PD ${last.by_status.public_domain}, CC/GFDL ${last.by_status.attribution_required}, unbekannt ${last.by_status.unknown}, offen ${last.remaining}`);
    } while ((last.remaining||0) > 0 && guard++ < 200);
    await loadModel();
  } catch(e){ setStatus('Fehler: '+e.message); }
  busy(false);
}

async function loadModel() {
  const j = await api('model_tree');
  NODES = j.nodes; BYKEY = new Map(NODES.map(n=>[n.wiki_key, n]));
  $('treeCount').textContent = `${j.count} Knoten`;
  render();
}

function statusTags(n) {
  const t = [];
  if (n.parent_locked) t.push('<span class="tag lock">🔒</span>');
  if (n.diverges) t.push('<span class="tag div" title="Maschine schlägt '+(n.auto_parent_wiki_key||'')+' vor">⚠</span>');
  if (n.has_conflict) t.push('<span class="tag conf" title="konkurrierende Eltern">◆</span>');
  if (n.parent_wiki_key && !n.parent_in_model) t.push('<span class="tag gap" title="Eltern nicht gecrawlt">Lücke</span>');
  if (n.source_origin==='siedlung') t.push('<span class="tag sied">Stadt</span>');
  return t.join('');
}
function licDot(n){ const s=n.license_status||'none'; const t=n.coat_of_arms_attribution||n.coat_of_arms_author||n.license_status||'—'; return `<span class="dot ${s}" title="Wappen-Lizenz: ${esc(t)}"></span>`; }
function wikiLink(n){ return n.wiki_url ? ` <a class="wl" href="${esc(n.wiki_url)}" target="_blank" rel="noopener" draggable="false" title="Wiki-Seite öffnen">↗</a>` : ''; }
function aliasHint(n){ if(!(n.aliases && n.aliases.length)) return ''; const a=n.aliases.slice().sort((x,y)=>x.length-y.length)[0].replace(/-/g,' '); return ` <span class="muted" title="auch bekannt als (Redirect)">≈${esc(a)}</span>`; }
function bfYear(t){ if(!t) return null; const m=String(t).match(/(\d{1,4})\s*(v\.?\s*BF|BF)/i); if(!m) return null; const y=parseInt(m[1],10); return /v\.?\s*BF/i.test(m[2])?-y:y; }
function fmtBF(y){ return y<0 ? (Math.abs(y)+' v.BF') : (y+' BF'); }
function periodLabel(n){
  const f=bfYear(n.founded_text);
  const ongoing=/\b(besteht|heute|gegenwart)\b/i.test(n.dissolved_text||'');
  const d=ongoing?null:bfYear(n.dissolved_text);
  let s='';
  if(f!=null && d!=null) s=fmtBF(f)+'–'+fmtBF(d);
  else if(f!=null && ongoing) s=fmtBF(f)+'–heute';
  else if(f!=null) s='ab '+fmtBF(f);
  else if(d!=null) s='bis '+fmtBF(d);
  else if(ongoing) s='besteht';
  if(!s) return '';
  return ` <span class="count" title="Zeitraum (von/bis)">· ${s}</span>`;
}

function isGap(n){ return !!(n.parent_wiki_key && !n.parent_in_model); }
function aventurienOnly(){ const el=$('aventurienOnly'); return !el || el.checked; }
function isAventurien(n){ return !n.continent || /aventurien/i.test(n.continent); }
function visibleByContinent(n){ return !aventurienOnly() || isAventurien(n); }
function matchesFilter(n, f) {
  if (f==='excluded') return !!n.excluded;
  if (n.excluded) return false;                    // Aussortierte nur im „Aussortiert"-Filter
  if (f==='all') return true;
  if (f==='gap') return isGap(n);                  // Default = echte offene Lücken
  if (f==='diverges') return n.diverges;
  if (f==='conflict') return n.has_conflict;       // platziert, aber Wiki nennt Zweitelternteil
  if (f==='locked') return n.parent_locked;
  if (f==='siedlung') return n.source_origin==='siedlung';
  return true;
}

function renderList() {
  const f = $('filter').value, q = $('search').value.trim().toLowerCase();
  const out = [];
  let shown = 0;
  for (const n of NODES) {
    if (!visibleByContinent(n)) continue;
    if (!matchesFilter(n, f)) continue;
    if (q && !(n.name.toLowerCase().includes(q) || n.wiki_key.toLowerCase().includes(q)
        || (n.aliases||[]).some(a=>a.includes(q)) || (n.affiliation_raw||'').toLowerCase().includes(q))) continue;
    if (shown++ > 600) { out.push('<div class="muted">… mehr (Suche eingrenzen)</div>'); break; }
    const lock = n.parent_locked ? ' <span class="tag lock" title="gesperrt">🔒</span>' : '';
    const exclTag = n.excluded ? ' <span class="tag excl" title="aussortiert – in den Baum/Wurzel ziehen holt zurück">✕ aussortiert</span>' : '';
    const meta = n.excluded ? '' : `${parentLabel(n)}${conflictLabel(n)}`;
    out.push(`<div class="row" draggable="true" data-key="${n.wiki_key}">${licDot(n)}<span class="nm">${esc(n.name)}${periodLabel(n)}${aliasHint(n)}</span>${wikiLink(n)}${meta}${lock}${exclTag}</div>`);
  }
  $('list').innerHTML = out.join('') || '<div class="muted">— keine —</div>';
}

const expanded = new Set();
function renderTree() {
  const hidden = new Set(NODES.filter(n=>n.excluded || !visibleByContinent(n)).map(n=>n.wiki_key));
  const children = new Map();
  const roots = [];
  for (const n of NODES) {
    if (n.excluded || !visibleByContinent(n)) continue;   // aussortiert / anderer Kontinent = nicht im Baum
    const p = (n.parent_wiki_key && n.parent_in_model && !hidden.has(n.parent_wiki_key)) ? n.parent_wiki_key : null;
    if (p) { if(!children.has(p)) children.set(p,[]); children.get(p).push(n); }
    else roots.push(n);
  }
  const build = (n, depth) => {
    const kids = children.get(n.wiki_key) || [];
    const hasKids = kids.length>0;
    const open = expanded.has(n.wiki_key);
    const tw = hasKids ? `<span class="twist" data-tw="${n.wiki_key}">${open?'▾':'▸'}</span>` : '<span class="twist"></span>';
    let html = `<li><span class="node" draggable="true" data-key="${n.wiki_key}" data-drop="${n.wiki_key}">${tw}${licDot(n)}<span>${esc(n.name)}${periodLabel(n)}${aliasHint(n)}</span>${wikiLink(n)}${statusTags(n)}${hasKids?` <span class="count">(${kids.length})</span>`:''}</span>`;
    if (hasKids && open) html += `<ul class="tree">${kids.map(k=>build(k,depth+1)).join('')}</ul>`;
    return html + '</li>';
  };
  roots.sort((a,b)=>a.name.localeCompare(b.name));
  $('tree').innerHTML = `<ul class="tree">${roots.map(r=>build(r,0)).join('')}</ul>`;
}
function render(){
  const vis = NODES.filter(n=>!n.excluded && visibleByContinent(n));
  const gaps = vis.filter(isGap).length;
  const conf = vis.filter(n=>n.has_conflict).length;
  const excl = NODES.filter(n=>n.excluded).length;
  $('attn').textContent = NODES.length ? `${gaps} Lücken · ${conf} Konflikte${excl?` · ${excl} aussortiert`:''}` : '';
  renderList(); renderTree();
}
function parentLabel(n){
  if(!n.parent_wiki_key) return ' <span class="muted">· Wurzel</span>';
  const nm = (BYKEY.get(n.parent_wiki_key)||{}).name || n.parent_wiki_key.replace(/^wiki:/,'');
  if(!n.parent_in_model) return ` <span class="tag gap" title="Eltern referenziert, aber nicht gecrawlt">→ ${esc(nm)}?</span>`;
  return ` <span class="muted">→ ${esc(nm)}</span>`;
}
function conflictLabel(n){
  if(!(n.conflicts && n.conflicts.length)) return '';
  return ` <span class="tag conf" title="strittiger Zweit-Elternteil laut Wiki — nur bestätigen, nicht zwingend ändern">◆ ${esc(n.conflicts[0])}${n.conflicts.length>1?' +'+(n.conflicts.length-1):''}</span>`;
}
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function setParent(childKey, parentKey) {
  if (childKey === parentKey) return;
  busy(true);
  try {
    await api('set_parent', {method:'POST', body:{wiki_key:childKey, parent_wiki_key:parentKey, lock:true}});
    const c = BYKEY.get(childKey);
    setStatus(`Gesetzt: „${c?c.name:childKey}" → Eltern „${parentKey?(BYKEY.get(parentKey)?.name||parentKey):'(Wurzel)'}" (gesperrt).`);
    await loadModel();
  } catch(e){ setStatus('Fehler: '+e.message); }
  busy(false);
}

async function setExcluded(wikiKey, excluded) {
  busy(true);
  try {
    await api('set_excluded', {method:'POST', body:{wiki_key:wikiKey, excluded}});
    const c = BYKEY.get(wikiKey);
    setStatus(excluded ? `„${c?c.name:wikiKey}" aussortiert (aus der Hierarchie genommen, bleibt im Sync).` : `„${c?c.name:wikiKey}" zurückgeholt.`);
    await loadModel();
  } catch(e){ setStatus('Fehler: '+e.message); }
  busy(false);
}

// Drag'n'drop
let dragKey = null;
const dropZone = (t) => t.closest('[data-drop]') || t.closest('#dropRoot') || t.closest('#dropExclude');
document.addEventListener('dragstart', e => { const el=e.target.closest('[data-key]'); if(el){ dragKey=el.dataset.key; e.dataTransfer.effectAllowed='move'; } });
document.addEventListener('dragover', e => { const el=dropZone(e.target); if(el){ e.preventDefault(); el.classList.add('drop'); } });
document.addEventListener('dragleave', e => { const el=dropZone(e.target); if(el) el.classList.remove('drop'); });
document.addEventListener('drop', e => {
  const excl = e.target.closest('#dropExclude');
  const root = e.target.closest('#dropRoot');
  const node = e.target.closest('[data-drop]');
  if (excl){ excl.classList.remove('drop'); e.preventDefault(); if(dragKey) setExcluded(dragKey, true); dragKey=null; return; }
  if (root){ root.classList.remove('drop'); e.preventDefault(); if(dragKey) setParent(dragKey, null); dragKey=null; return; }
  if (node){ node.classList.remove('drop'); e.preventDefault(); const p=node.dataset.drop; if(dragKey && dragKey!==p) setParent(dragKey, p); dragKey=null; }
});
document.addEventListener('click', e => { const tw=e.target.closest('[data-tw]'); if(tw){ const k=tw.dataset.tw; if(expanded.has(k))expanded.delete(k); else expanded.add(k); renderTree(); } });

$('btnCrawl').onclick = runCrawl;
$('btnModel').onclick = async()=>{ busy(true); try{ const r=await api('rebuild_model',{method:'POST'}); setStatus(`Modell: ${r.summary.total} Knoten, ${r.summary.resolved_parents} Eltern aufgelöst, ${r.summary.gap_parents} Lücken, ${r.summary.roots} Wurzeln.`); await loadModel(); }catch(e){setStatus('Fehler: '+e.message);} busy(false); };
$('btnLic').onclick = runLicenses;
$('btnDiff').onclick = async()=>{ busy(true); try{ const d=await api('diff'); setStatus(`Diff (Staging vs Wiki): neu ${d.new}, verschwunden ${d.disappeared}, geändert ${d.changed}.`); }catch(e){setStatus('Fehler: '+e.message);} busy(false); };
$('btnCache').onclick = async()=>{ busy(true); try{ const c=await api('sync_parent_cache',{method:'POST',body:{}}); setStatus(`parent_id Dry-Run: auffüllbar ${c.fillable}, deckungsgleich ${c.already_aligned}, divergent ${c.divergent_existing} (nichts geschrieben).`); }catch(e){setStatus('Fehler: '+e.message);} busy(false); };
$('btnReload').onclick = ()=>loadModel().catch(e=>setStatus('Fehler: '+e.message));
$('search').oninput = renderList;
$('filter').onchange = renderList;
$('aventurienOnly').onchange = render;

loadModel().catch(e=>setStatus('Modell laden fehlgeschlagen: '+e.message));
</script>
</body>
</html>
