<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Avesmaps – Siedlungen zuordnen und editieren</title>
<link rel="stylesheet" href="/css/base/fonts.css">
<style>
  :root { --bg:#f4efe7; --panel:#fff9f4; --soft:#fffaf5; --line:#d8c6b2; --line2:#cdb79f; --fg:#3f3428; --mut:#6c5a49; --accent:#0078a8; --accent-hover:#1a9fd4; --warn:#b8860b; --bad:#9d3a2e; --ok:#2e7d32; --font-ui:"Faculty Glyphic","Arial",sans-serif; }
  * { box-sizing:border-box; }
  body { margin:0; font:13px/1.45 var(--font-ui); background:var(--bg); color:var(--fg); height:100vh; display:flex; flex-direction:column; }
  header { padding:10px 14px; background:var(--panel); border-bottom:1px solid var(--line); }
  /* Alle Steuer-Buttons in EINER Zeile, gleich breite Spalten (wie im Territoriumseditor). */
  .controls { display:grid; grid-auto-flow:column; grid-auto-columns:minmax(0,1fr); gap:6px; align-items:stretch; }
  button { background:#f3ebdf; color:#513c2b; border:1px solid #b99a78; border-radius:5px; padding:5px 10px; cursor:pointer; font:inherit; }
  button:hover { background:#ead9c2; }
  button:disabled { opacity:.5; cursor:default; }
  button.primary { background:#565044; border-color:#5f4f40; color:#fff9f4; }
  button.primary:hover { background:#4a463b; }
  .btn2 { display:flex; flex-direction:column; justify-content:center; align-items:flex-start; text-align:left; min-height:48px; padding:5px 11px; gap:1px; line-height:1.15; }
  .btn2 .t1 { font-size:13px; font-weight:bold; }
  .btn2 .t2 { font-size:10px; color:var(--mut); white-space:nowrap; }
  .btn2.primary .t2 { color:#e9ddcb; }
  #settlementStatus { padding:6px 14px; color:var(--mut); border-bottom:1px solid var(--line); white-space:nowrap; display:flex; align-items:center; gap:14px; }
  #seStatusText { flex:1 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #seContDD { flex:0 0 auto; align-self:center; }
  .cols { display:flex; flex:1 1 auto; min-height:0; }
  .col { flex:1; overflow:hidden; padding:8px; display:flex; flex-direction:column; min-height:0; min-width:0; }
  #seLeft { border-right:1px solid var(--line); max-width:46%; }
  .colhead { margin-bottom:0; padding-bottom:0; flex:0 0 auto; }
  .listhead { font-size:13px; font-weight:bold; margin:0 0 6px; color:#3f3428; }
  .bar { display:flex; gap:6px; align-items:center; margin-bottom:6px; }
  input[type=search] { background:var(--soft); color:var(--fg); border:1px solid var(--line); border-radius:5px; padding:4px 6px; font:inherit; flex:1; }
  #seTree, #seList, #seDetailBody { flex:1 1 auto; overflow:auto; min-height:0; background:#fff; border:1px solid var(--line); border-radius:6px; padding:4px; }
  .dt-empty { color:var(--mut); padding:6px; }
  /* Territorien-Baum (LINKS): read-only Filterbaum mit Tri-State-Checkboxen. */
  #seTree ul { list-style:none; margin:0; padding-left:16px; }
  #seTree > ul.tree-root { padding-left:0; }
  #seTree li.tree-node { margin:1px 0; }
  #seTree .tree-row { display:flex; align-items:center; gap:5px; padding:2px 3px; border-radius:4px; cursor:default; }
  #seTree .tree-row:hover { background:#f3ebdf; }
  #seTree .tree-row.filtered-out { display:none; }
  #seTree .tree-toggle { display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; flex:0 0 auto; cursor:pointer; color:var(--mut); font-size:10px; user-select:none; }
  #seTree .tree-toggle.leaf { visibility:hidden; }
  #seTree .tree-name { flex:1 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #seTree input[type=checkbox] { flex:0 0 auto; cursor:pointer; }
  #seTree ul.tree-children[hidden] { display:none; }
  /* Kontinent-Dropdown rechts in der Statuszeile (Muster #contDD/#contBtn/#contMenu). */
  .dropdown2 { position:relative; }
  .ddbtn { background:#f3ebdf; color:#513c2b; border:1px solid #b99a78; border-radius:5px; padding:5px 10px; cursor:pointer; font:inherit; display:inline-flex; align-items:center; gap:5px; }
  .ddbtn:hover { background:#ead9c2; }
  .ddcaret { font-size:10px; color:var(--mut); }
  .dropdown2 .dd-menu[hidden] { display:none; }
  .dd-menu { position:absolute; z-index:20; top:100%; right:0; margin-top:3px; background:var(--panel); border:1px solid var(--line2); border-radius:6px; padding:6px; min-width:230px; max-height:320px; overflow:auto; box-shadow:0 6px 18px rgba(0,0,0,.18); }
  .dd-menu label { display:block; padding:2px 4px; white-space:nowrap; cursor:pointer; }
  /* Siedlungsliste (MITTE): on_map-Achse als Tab-Leiste + kombinierbare Filterzeile. */
  #seListTabs { display:flex; gap:2px; background:#efe6d9; border:1px solid var(--line); border-radius:6px; padding:2px; margin-bottom:6px; }
  #seListTabs button { flex:1; background:transparent; border:none; border-radius:4px; padding:4px 6px; color:var(--mut); font:inherit; font-size:11px; cursor:pointer; white-space:nowrap; }
  #seListTabs button:hover { background:#e4d7c3; }
  #seListTabs button.is-active { background:var(--soft); color:var(--fg); border:1px solid var(--line); font-weight:bold; }
  #seListFilters { flex-wrap:wrap; }
  #seListFilters input[type=search] { flex:1 1 120px; min-width:90px; }
  .chip-toggle { display:inline-flex; align-items:center; gap:4px; padding:4px 9px; border:1px solid var(--line2); border-radius:12px; font-size:11px; color:var(--mut); background:#f3ebdf; white-space:nowrap; cursor:pointer; }
  .chip-toggle:hover { background:#ead9c2; }
  .chip-toggle.warn { background:#faeeda; border-color:#ef9f27; color:#854f0b; font-weight:bold; }
  .chip-toggle.warn.is-active { background:#f4c869; border-color:#b8860b; color:#4a3300; }
  #seTreeBypassHint { font-size:10px; color:var(--warn); margin:0 0 6px; padding:3px 6px; background:#faeeda; border:1px solid #ef9f27; border-radius:4px; }
  #seTreeBypassHint[hidden] { display:none; }
  /* Siedlungs-Zeilen: zweizeilig, Zeile 2 = Zuordnungsstatus (gruen=zugeordnet, amber=Luecke). */
  .se-row { display:block; padding:4px 6px; border-radius:5px; border:1px solid transparent; cursor:pointer; }
  .se-row:hover { background:#f3ebdf; }
  .se-row.is-selected { background:#dfeaf0; border-color:#9cc3d6; }
  .se-row-l1 { display:flex; align-items:baseline; gap:6px; }
  .se-row-name { font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .se-row-type { font-size:10px; color:var(--mut); margin-left:auto; white-space:nowrap; }
  .se-row-l2 { font-size:10px; margin-top:1px; display:flex; align-items:center; gap:4px; }
  .se-row-l2.ok { color:var(--ok); }
  .se-row-l2.warn { color:var(--warn); }
  .se-empty, .se-loading, .se-error { color:var(--mut); padding:6px; }
  .se-error { color:var(--bad); }
</style>
</head>
<body>
<header>
  <div class="controls">
    <button class="btn2 primary" id="seAssign" title="Ordnet alle Siedlungen ihrem Territorium per Ray-Cast zu"><span class="t1">Siedlungen zuordnen</span><span class="t2">Ray-Cast über alles</span></button>
    <button class="btn2" id="seFilterMap" title="Zeigt auf der Live-Karte nur die aktuelle Auswahl"><span class="t1">Nur Auswahl anzeigen</span><span class="t2">auf der Karte</span></button>
    <button class="btn2" id="seLocalizeCoats" title="Lädt gemeinfreie Wappen lokal herunter"><span class="t1">Wappen lokalisieren</span><span class="t2">gemeinfrei laden</span></button>
  </div>
</header>
<div id="settlementStatus">
  <span id="seStatusText">Bereit.</span>
  <div id="seContDD" class="dropdown2">
    <button type="button" id="seContBtn" class="ddbtn" title="Filtert beide Listen nach Kontinent">Kontinente <span class="ddcaret">▾</span></button>
    <div class="dd-menu" id="seContMenu" hidden></div>
  </div>
</div>
<div class="cols">
  <div class="col" id="seLeft">
    <div class="colhead">
      <h2 class="listhead">Territorien</h2>
      <div class="bar"><input type="search" id="seTreeSearch" placeholder="In Territorien suchen…"></div>
    </div>
    <div id="seTree"></div>
  </div>
  <div class="col" id="seMid">
    <div class="colhead">
      <h2 class="listhead">Siedlungen</h2>
      <div id="seListTabs"></div>
      <div class="bar" id="seListFilters"></div>
      <div id="seTreeBypassHint" hidden>Baum-Auswahl links ist ausgeblendet, solange „Nicht zugeordnet" aktiv ist.</div>
    </div>
    <div id="seList"></div>
  </div>
  <div class="col" id="seRight">
    <div class="colhead">
      <h2 class="listhead">Eigenschaften &amp; Overrides</h2>
    </div>
    <div id="seDetailBody"><div class="dt-empty">In der Mitte eine Siedlung anklicken, um Details zu sehen.</div></div>
  </div>
</div>
<!-- Pure descendant-union helper (tri-state -> territory containment filter); cache-bust like
     the editor HTML itself since this iframe document is fetched with ?v=Date.now() by its host. -->
<script src="/js/map-features/map-features-settlement-territory-assign.js"></script>
<script>
const SETTLEMENT_EDITOR_API = "/api/edit/wiki/settlements.php";
// Same curated model-tree endpoint as territory-wiki-tree.js / review-wiki-sync.js
// (js/territory/territory-wiki-tree.js DEFAULT_API_URL is the read-only wiki-browser
// mirror; the actual hierarchy source is this authed model_tree action). Hierarchy is
// built ONLY from parent_wiki_key here (KERN-INVARIANTE) -- never affiliation_path.
const TERRITORY_MODEL_TREE_API = "/api/edit/wiki/sync-monitor.php?action=model_tree";
function $(id){ return document.getElementById(id); }

// settlementTree = { byKey: Map<wiki_key, node>, roots: node[] }; node = { wiki_key,
// parent_wiki_key, name, children: node[] }. childrenByParent mirrors byKey's parent
// links as parent_wiki_key -> [child wiki_key, ...] for the pure descendantWikiKeys()
// helper (js/map-features/map-features-settlement-territory-assign.js).
let settlementTree = { byKey: new Map(), roots: [] };
let childrenByParent = new Map();
// Explicitly checked territory wiki_keys (tri-state "gewaehlt"). Ancestors of a checked
// node render checked-by-inheritance; the set itself only ever holds explicit picks.
const checkedTerritoryKeys = new Set();

// Same structural hiding as territory-wiki-tree.js isModelNodeHidden(): aussortiert
// (excluded) und Luecken (Eltern nicht im Modell). Church-status filtering is skipped
// here (model_tree rows don't need it for this read-only filter tree; the sibling's
// affiliation_raw/status based church check is a wiki-browser-endpoint.php artifact
// that doesn't apply to model_tree's own affiliation_raw field the same way -- kept
// deliberately minimal for this phase).
function isSettlementTreeNodeHidden(row) {
	if (!row) return false;
	if (row.excluded === true || row.excluded === 1) return true;
	if (row.parent_wiki_key && row.parent_in_model === false) return true;
	return false;
}

// Baut settlementTree + childrenByParent ausschliesslich ueber parent_wiki_key (nie
// affiliation_path). Wurzeln = Knoten ohne (bekannten) parent_wiki_key.
function buildSettlementTerritoryTree(nodes) {
	const byKey = new Map();
	const parentByKey = new Map();
	const order = [];
	for (const row of Array.isArray(nodes) ? nodes : []) {
		const wikiKey = String(row && row.wiki_key || "").trim();
		if (!wikiKey || isSettlementTreeNodeHidden(row)) continue;
		if (byKey.has(wikiKey)) continue; // model_tree already dedupes by wiki_key; defensive only
		const node = { wiki_key: wikiKey, parent_wiki_key: null, name: String(row.name || wikiKey).trim() || wikiKey, children: [] };
		byKey.set(wikiKey, node);
		parentByKey.set(wikiKey, String(row.parent_wiki_key || "").trim() || null);
		order.push(node);
	}
	const nextChildrenByParent = new Map();
	const roots = [];
	for (const node of order) {
		const parentKey = parentByKey.get(node.wiki_key);
		const parentNode = parentKey && byKey.has(parentKey) ? byKey.get(parentKey) : null;
		if (parentNode) {
			node.parent_wiki_key = parentKey;
			parentNode.children.push(node);
			if (!nextChildrenByParent.has(parentKey)) nextChildrenByParent.set(parentKey, []);
			nextChildrenByParent.get(parentKey).push(node.wiki_key);
		} else {
			roots.push(node);
		}
	}
	for (const node of order) {
		node.children.sort((a, b) => a.name.localeCompare(b.name, "de"));
	}
	roots.sort((a, b) => a.name.localeCompare(b.name, "de"));
	return { tree: { byKey, roots }, childrenByParent: nextChildrenByParent };
}

async function loadSettlementTree() {
	const container = $("seTree");
	if (container) container.textContent = "Lade Territorien…";
	try {
		const requestUrl = new URL(TERRITORY_MODEL_TREE_API, window.location.href);
		requestUrl.searchParams.set("_", String(Date.now()));
		const response = await fetch(requestUrl.toString(), {
			method: "GET",
			credentials: "same-origin",
			cache: "no-store",
			headers: { Accept: "application/json", "Cache-Control": "no-cache", Pragma: "no-cache" },
		});
		const payload = await response.json();
		if (!response.ok || !payload || payload.ok !== true) {
			throw new Error((payload && payload.error && payload.error.message) || `HTTP ${response.status}`);
		}
		const built = buildSettlementTerritoryTree(payload.nodes || []);
		settlementTree = built.tree;
		childrenByParent = built.childrenByParent;
		renderSettlementTree();
		// The tree and the settlement list load in parallel (see boot()); if the tree resolves
		// after the settlement list already rendered, refresh the list's "✓ <territory>" labels
		// (territoryDisplayName reads settlementTree.byKey) and re-evaluate the tree containment
		// filter now that ancestor lookups are possible. Harmless no-op if settlementItems is
		// still empty (loadSettlementItems will render once it resolves).
		renderSettlementMid();
	} catch (error) {
		if (container) container.textContent = "Territorien konnten nicht geladen werden: " + (error && error.message ? error.message : String(error));
	}
}

// Ahnen-Kette (root-first ausgeschlossen, nur die Eltern) eines Knotens ueber
// parent_wiki_key -- fuer den Tri-State-Ancestor-Check ("ist ein Vorfahre angehakt?").
function getAncestorKeys(wikiKey) {
	const ancestors = [];
	let cursor = settlementTree.byKey.get(wikiKey) || null;
	const guard = new Set();
	while (cursor && cursor.parent_wiki_key && !guard.has(cursor.parent_wiki_key)) {
		guard.add(cursor.parent_wiki_key);
		ancestors.push(cursor.parent_wiki_key);
		cursor = settlementTree.byKey.get(cursor.parent_wiki_key) || null;
	}
	return ancestors;
}

// Tri-State pro Knoten: "checked" (selbst oder ein Vorfahre angehakt), "indeterminate"
// (nicht checked, aber mind. ein Nachfahre angehakt), sonst "unchecked".
function getNodeTriState(wikiKey) {
	if (checkedTerritoryKeys.has(wikiKey)) return "checked";
	if (getAncestorKeys(wikiKey).some((key) => checkedTerritoryKeys.has(key))) return "checked";
	const descendants = window.AvesmapsSettlementAssign.descendantWikiKeys([wikiKey], childrenByParent);
	descendants.delete(wikiKey);
	for (const descendantKey of descendants) {
		if (checkedTerritoryKeys.has(descendantKey)) return "indeterminate";
	}
	return "unchecked";
}

function refreshAllTriStates() {
	const container = $("seTree");
	if (!container) return;
	for (const checkbox of container.querySelectorAll("input[type=checkbox][data-wiki-key]")) {
		const wikiKey = checkbox.dataset.wikiKey;
		const state = getNodeTriState(wikiKey);
		checkbox.checked = state === "checked";
		checkbox.indeterminate = state === "indeterminate";
	}
}

function onTerritoryCheckboxToggle(wikiKey, checked) {
	if (checked) checkedTerritoryKeys.add(wikiKey);
	else checkedTerritoryKeys.delete(wikiKey);
	refreshAllTriStates();
	// Tree selection changed -> re-run the middle list's containment filter (Phase 4.3 wiring).
	renderSettlementMid();
}

function buildTerritoryTreeNodeElement(node) {
	const listItem = document.createElement("li");
	listItem.className = "tree-node";
	const row = document.createElement("div");
	row.className = "tree-row";
	row.dataset.name = node.name.toLowerCase();

	const hasChildren = node.children.length > 0;
	const toggle = document.createElement("span");
	toggle.className = hasChildren ? "tree-toggle" : "tree-toggle leaf";
	toggle.textContent = hasChildren ? "▾" : "";
	toggle.setAttribute("aria-hidden", "true");
	row.appendChild(toggle);

	const checkbox = document.createElement("input");
	checkbox.type = "checkbox";
	checkbox.dataset.wikiKey = node.wiki_key;
	checkbox.title = "Nach diesem Territorium (und Untergebieten) filtern";
	checkbox.addEventListener("change", () => onTerritoryCheckboxToggle(node.wiki_key, checkbox.checked));
	row.appendChild(checkbox);

	const name = document.createElement("span");
	name.className = "tree-name";
	name.textContent = node.name;
	name.title = node.name;
	row.appendChild(name);

	listItem.appendChild(row);

	let childrenList = null;
	if (hasChildren) {
		childrenList = document.createElement("ul");
		childrenList.className = "tree-children";
		for (const child of node.children) childrenList.appendChild(buildTerritoryTreeNodeElement(child));
		listItem.appendChild(childrenList);
		toggle.addEventListener("click", () => {
			const collapsed = childrenList.hasAttribute("hidden");
			if (collapsed) childrenList.removeAttribute("hidden");
			else childrenList.setAttribute("hidden", "");
			toggle.textContent = collapsed ? "▾" : "▸";
		});
	}
	return listItem;
}

function renderSettlementTree() {
	const container = $("seTree");
	if (!container) return;
	container.innerHTML = "";
	if (settlementTree.roots.length === 0) {
		container.textContent = "Keine Territorien geladen.";
		return;
	}
	const rootList = document.createElement("ul");
	rootList.className = "tree-root";
	for (const rootNode of settlementTree.roots) rootList.appendChild(buildTerritoryTreeNodeElement(rootNode));
	container.appendChild(rootList);
	refreshAllTriStates();
	applyTerritoryTreeSearchFilter();
}

// Filtert sichtbare Zeilen per Namens-Substring (case-insensitive); Baumstruktur bleibt
// stehen (kein Neuaufbau), nur .filtered-out toggeln. Vorfahren eines Treffers bleiben
// sichtbar, damit der Treffer im Kontext auffindbar ist.
function applyTerritoryTreeSearchFilter() {
	const container = $("seTree");
	const searchInput = $("seTreeSearch");
	if (!container || !searchInput) return;
	const query = searchInput.value.trim().toLowerCase();
	const rows = container.querySelectorAll(".tree-row");
	if (!query) {
		for (const row of rows) row.classList.remove("filtered-out");
		return;
	}
	for (const row of rows) {
		const matches = row.dataset.name.includes(query);
		row.classList.toggle("filtered-out", !matches);
		if (matches) {
			// Vorfahren-<ul class=tree-children hidden> aufklappen + sichtbar halten, damit ein
			// Treffer in einem eingeklappten Ast nicht unsichtbar bleibt.
			let ancestorList = row.closest("li.tree-node").parentElement;
			while (ancestorList && ancestorList.classList && ancestorList.classList.contains("tree-children")) {
				ancestorList.removeAttribute("hidden");
				const parentRow = ancestorList.closest("li.tree-node").querySelector(":scope > .tree-row");
				if (parentRow) parentRow.classList.remove("filtered-out");
				const parentToggle = parentRow ? parentRow.querySelector(".tree-toggle") : null;
				if (parentToggle && !parentToggle.classList.contains("leaf")) parentToggle.textContent = "▾";
				ancestorList = ancestorList.closest("li.tree-node") ? ancestorList.closest("li.tree-node").parentElement : null;
			}
		}
	}
}

// Exposed for the LATER middle-list filter task: current explicit selection (copy, not
// the live Set) so callers can't accidentally mutate tree state from outside.
window.settlementEditorGetSelectedTerritoryKeys = () => new Set(checkedTerritoryKeys);

// ===================== MIDDLE column: settlement list =====================
// Mirrors the filter idioms of js/review/review-settlement-list.js (settlementListView tabs,
// type/continent/source filters) but is a lightweight, self-contained reimplementation --
// this editor is a separate iframe document and cannot import that file's module state.

let settlementItems = []; // raw items from settlement_editor_list
let settlementListView = "all"; // "all" | "onmap" | "wiki" (on_map axis, mirrors the sibling's tri-tab)
let selectedPublicId = null;
const settlementSearchState = { value: "" };
const settlementTypeFilter = new Set(); // selected settlement_label values (empty = all)
const settlementContinentFilterMid = new Set(["Aventurien"]); // default: only Aventurien, like the sibling list
const settlementSourceFilter = { value: "" }; // "" = all | "wiki" | "andere" | "keine"
let unassignedOnly = false; // the amber "Nicht zugeordnet" chip -- bypasses the tree filter when on

// Kontinent eines Eintrags; leer -> Aventurien (mirrors settlementItemContinent in the sibling list).
function settlementItemContinent(item) {
	return String(item && item.continent || "").trim() || "Aventurien";
}

// A "real gap": placed on the map but with no territory assignment at all (§3.2 design:
// pure wiki-only settlements are never ray-castable and therefore never count as a gap).
function isSettlementGap(item) {
	return item && item.on_map === true && (item.territory_wiki_key === null || item.territory_wiki_key === undefined);
}

// Tree containment check for one item: visible iff its territory (or an ancestor of it, walked
// via the editor's own getAncestorKeys/parent_wiki_key helper -- NEVER affiliation_path) is one
// of the explicitly checked tree nodes. Mirrors docs/siedlungseditor-design.md §5 (descendant
// union), computed here from the settlement side: "is my territory in checked-or-a-descendant
// of checked?" is equivalent to "is one of (myTerritory, ancestors-of-myTerritory) checked?".
function settlementMatchesTreeSelection(item) {
	if (checkedTerritoryKeys.size === 0) return true;
	const wikiKey = item.territory_wiki_key;
	if (!wikiKey) return false; // unassigned settlements have no territory to match against
	if (checkedTerritoryKeys.has(wikiKey)) return true;
	return getAncestorKeys(wikiKey).some((key) => checkedTerritoryKeys.has(key));
}

function settlementSearchMatch(item) {
	const query = settlementSearchState.value.trim().toLowerCase();
	if (!query) return true;
	return String(item.name || "").toLowerCase().includes(query);
}

function settlementViewMatch(item) {
	if (settlementListView === "onmap") return item.on_map === true;
	if (settlementListView === "wiki") return item.on_map !== true;
	return true;
}

// Basismenge fuer Typ-/Quelle-Zaehler: Kontinent + View-Tab + Suche, aber OHNE Typ/Quelle/Chip/Baum
// selbst (jeder Filter zaehlt seine Optionen relativ zu "allem was OHNE diesen einen Filter uebrig
// bleibt", wie im Territorium-Vorbild review-settlement-list.js settlementBaseFilteredItems()).
function settlementBaseFilteredItems() {
	return settlementItems.filter(
		(item) => settlementContinentFilterMid.has(settlementItemContinent(item)) && settlementViewMatch(item) && settlementSearchMatch(item)
	);
}

function settlementTypeOptions() {
	const order = ["dorf", "kleinstadt", "stadt", "grossstadt", "metropole", "gebaeude"];
	const byLabel = new Map();
	for (const item of settlementBaseFilteredItems()) {
		const label = item.settlement_label || "—";
		if (!byLabel.has(label)) byLabel.set(label, { value: label, label, count: 0, order: order.indexOf(item.settlement_class || "") });
		byLabel.get(label).count += 1;
	}
	return [...byLabel.values()].sort((a, b) => (a.order < 0 ? 99 : a.order) - (b.order < 0 ? 99 : b.order) || a.label.localeCompare(b.label, "de"));
}

const SETTLEMENT_SOURCE_OPTIONS = [
	{ value: "wiki", label: "Wiki" },
	{ value: "andere", label: "Andere" },
	{ value: "keine", label: "Keine" },
];

// Full per-item visibility predicate (task spec §7): continent + on_map-tab + search + type +
// source are always applied; the LAST axis is either the "Nicht zugeordnet" chip (which
// deliberately bypasses the tree selection) or the tree containment filter.
function isSettlementVisible(item) {
	if (!settlementContinentFilterMid.has(settlementItemContinent(item))) return false;
	if (!settlementViewMatch(item)) return false;
	if (!settlementSearchMatch(item)) return false;
	if (settlementTypeFilter.size > 0 && !settlementTypeFilter.has(item.settlement_label || "—")) return false;
	if (settlementSourceFilter.value && item.source_category !== settlementSourceFilter.value) return false;
	if (unassignedOnly) return isSettlementGap(item);
	return settlementMatchesTreeSelection(item);
}

// Live count of gaps under the OTHER active filters (continent/view/search/type/source), used as
// the chip's "(N)" -- independent of unassignedOnly itself and independent of the tree selection
// (the chip's whole point is to bypass the tree), per task spec point 5.
function settlementGapCountUnderOtherFilters() {
	let count = 0;
	for (const item of settlementItems) {
		if (!settlementContinentFilterMid.has(settlementItemContinent(item))) continue;
		if (!settlementViewMatch(item)) continue;
		if (!settlementSearchMatch(item)) continue;
		if (settlementTypeFilter.size > 0 && !settlementTypeFilter.has(item.settlement_label || "—")) continue;
		if (settlementSourceFilter.value && item.source_category !== settlementSourceFilter.value) continue;
		if (isSettlementGap(item)) count += 1;
	}
	return count;
}

function settlementEscape(value) {
	const holder = document.createElement("div");
	holder.textContent = value === null || value === undefined ? "" : String(value);
	return holder.innerHTML;
}

// Territory display name for a settlement's assignment line: prefer the tree's own name lookup
// (same tree the LEFT column renders from) so the label matches what's checked there; fall back
// to the raw wiki_key if the tree hasn't loaded it (e.g. race, or a stale/removed key).
function territoryDisplayName(wikiKey) {
	const node = settlementTree.byKey.get(wikiKey);
	return (node && node.name) || wikiKey;
}

function renderSettlementRowElement(item) {
	const row = document.createElement("div");
	row.className = "se-row" + (item.public_id === selectedPublicId ? " is-selected" : "");
	row.dataset.publicId = item.public_id;

	const line1 = document.createElement("div");
	line1.className = "se-row-l1";
	const name = document.createElement("span");
	name.className = "se-row-name";
	name.textContent = item.name;
	name.title = item.name;
	line1.appendChild(name);
	if (item.settlement_label) {
		const type = document.createElement("span");
		type.className = "se-row-type";
		type.textContent = item.settlement_label;
		line1.appendChild(type);
	}
	row.appendChild(line1);

	const line2 = document.createElement("div");
	if (item.territory_wiki_key) {
		line2.className = "se-row-l2 ok";
		line2.textContent = "✓ " + territoryDisplayName(item.territory_wiki_key);
	} else {
		line2.className = "se-row-l2 warn";
		line2.textContent = "⚠ nicht zugeordnet";
	}
	row.appendChild(line2);

	row.addEventListener("click", () => selectSettlementRow(item.public_id));
	return row;
}

function selectSettlementRow(publicId) {
	selectedPublicId = publicId;
	const list = $("seList");
	if (list) {
		for (const row of list.querySelectorAll(".se-row")) row.classList.toggle("is-selected", row.dataset.publicId === publicId);
	}
	renderSettlementDetail(publicId);
}

// Phase 6: settlement detail panel (RIGHT column). This is intentionally a stub for now --
// building #seDetailBody is a later task. Row selection + highlighting already works above;
// this hook is where the detail phase will fetch/render the "Eigenschaften & Overrides" panel.
function renderSettlementDetail(publicId) {
	// no-op for now
}

function renderSettlementTabs() {
	const host = $("seListTabs");
	if (!host) return;
	const continentScoped = settlementItems.filter((item) => settlementContinentFilterMid.has(settlementItemContinent(item)));
	const onMapCount = continentScoped.filter((item) => item.on_map).length;
	const wikiCount = continentScoped.length - onMapCount;
	const tab = (view, label, count) =>
		`<button type="button" data-settlement-view="${view}" class="${settlementListView === view ? "is-active" : ""}">${label} (${count})</button>`;
	host.innerHTML = tab("all", "Alle", continentScoped.length) + tab("onmap", "Auf Karte", onMapCount) + tab("wiki", "Nur Wiki", wikiCount);
}

function renderSettlementFilters() {
	const host = $("seListFilters");
	if (!host) return;
	// Preserve focus/caret across the innerHTML rebuild below: the search input is re-created on
	// every render (unlike the sibling list's static <input>), so a re-render triggered by an
	// unrelated event (e.g. a tree checkbox toggle) while the user is mid-typing must not drop
	// keyboard focus or the cursor position.
	const searchHadFocus = document.activeElement && document.activeElement.id === "seListSearch";
	const searchSelectionStart = searchHadFocus ? document.activeElement.selectionStart : null;
	const searchSelectionEnd = searchHadFocus ? document.activeElement.selectionEnd : null;
	// Same reasoning for open dropdown menus: don't snap them shut on an unrelated re-render.
	const typeMenuWasOpen = $("seTypeMenu") && !$("seTypeMenu").hidden;
	const sourceMenuWasOpen = $("seSourceMenu") && !$("seSourceMenu").hidden;
	const typeOptions = settlementTypeOptions();
	const typeLabel = settlementTypeFilter.size === 0 ? "Typ" : `Typ (${settlementTypeFilter.size})`;
	const typeMenu = [`<label><input type="checkbox" value="__all__"${settlementTypeFilter.size === 0 ? " checked" : ""} data-type-all> Alle</label>`]
		.concat(typeOptions.map((opt) => `<label><input type="checkbox" value="${settlementEscape(opt.value)}"${settlementTypeFilter.has(opt.value) ? " checked" : ""} data-type-opt> ${settlementEscape(opt.label)} (${opt.count})</label>`))
		.join("");
	const sourceLabel = settlementSourceFilter.value ? "Quelle: " + (SETTLEMENT_SOURCE_OPTIONS.find((o) => o.value === settlementSourceFilter.value)?.label || settlementSourceFilter.value) : "Quelle";
	const sourceMenu = [`<label><input type="radio" name="seSourceFilter" value="__all__"${!settlementSourceFilter.value ? " checked" : ""} data-source-all> Alle</label>`]
		.concat(SETTLEMENT_SOURCE_OPTIONS.map((opt) => `<label><input type="radio" name="seSourceFilter" value="${opt.value}"${settlementSourceFilter.value === opt.value ? " checked" : ""} data-source-opt> ${settlementEscape(opt.label)}</label>`))
		.join("");
	const gapCount = settlementGapCountUnderOtherFilters();

	host.innerHTML =
		`<input type="search" id="seListSearch" placeholder="Name suchen…" value="${settlementEscape(settlementSearchState.value)}">` +
		`<div class="dropdown2" id="seTypeDD"><button type="button" class="ddbtn" id="seTypeBtn">${settlementEscape(typeLabel)} <span class="ddcaret">▾</span></button><div class="dd-menu" id="seTypeMenu" hidden>${typeMenu}</div></div>` +
		`<div class="dropdown2" id="seSourceDD"><button type="button" class="ddbtn" id="seSourceBtn">${settlementEscape(sourceLabel)} <span class="ddcaret">▾</span></button><div class="dd-menu" id="seSourceMenu" hidden>${sourceMenu}</div></div>` +
		`<span class="chip-toggle warn${unassignedOnly ? " is-active" : ""}" id="seUnassignedChip" title="Nur auf der Karte platzierte Siedlungen ohne Territorium; blendet die Baum-Auswahl links aus">⚠ Nicht zugeordnet (${gapCount})</span>`;

	if (typeMenuWasOpen) $("seTypeMenu").hidden = false;
	if (sourceMenuWasOpen) $("seSourceMenu").hidden = false;
	if (searchHadFocus) {
		const searchInput = $("seListSearch");
		if (searchInput) {
			searchInput.focus();
			searchInput.setSelectionRange(searchSelectionStart, searchSelectionEnd);
		}
	}

	$("seListSearch")?.addEventListener("input", (event) => {
		settlementSearchState.value = event.target.value || "";
		renderSettlementMid();
	});
	$("seTypeBtn")?.addEventListener("click", (event) => {
		event.stopPropagation();
		const menu = $("seTypeMenu");
		if (menu) menu.hidden = !menu.hidden;
	});
	$("seSourceBtn")?.addEventListener("click", (event) => {
		event.stopPropagation();
		const menu = $("seSourceMenu");
		if (menu) menu.hidden = !menu.hidden;
	});
	$("seTypeMenu")?.addEventListener("change", (event) => {
		const target = event.target;
		if (target.matches("[data-type-all]")) settlementTypeFilter.clear();
		else if (target.matches("[data-type-opt]")) {
			if (target.checked) settlementTypeFilter.add(target.value);
			else settlementTypeFilter.delete(target.value);
		}
		renderSettlementMid();
	});
	$("seSourceMenu")?.addEventListener("change", (event) => {
		const target = event.target;
		if (target.matches("[data-source-all]")) settlementSourceFilter.value = "";
		else if (target.matches("[data-source-opt]")) settlementSourceFilter.value = target.value;
		renderSettlementMid();
	});
	$("seUnassignedChip")?.addEventListener("click", () => {
		unassignedOnly = !unassignedOnly;
		renderSettlementMid();
	});
}

// Full render: tabs (with their own continent-scoped counts) + filter bar (dropdowns rebuilt with
// fresh option counts, matching the sibling list's "re-render filter menus on every list render"
// pattern) + the row list itself, driven by isSettlementVisible().
function renderSettlementMid() {
	const list = $("seList");
	if (!list) return;
	renderSettlementTabs();
	renderSettlementFilters();

	const bypassHint = $("seTreeBypassHint");
	if (bypassHint) bypassHint.hidden = !(unassignedOnly && checkedTerritoryKeys.size > 0);

	const visible = settlementItems.filter(isSettlementVisible);
	list.innerHTML = "";
	if (visible.length === 0) {
		const empty = document.createElement("div");
		empty.className = "se-empty";
		empty.textContent = "Keine Treffer.";
		list.appendChild(empty);
		return;
	}
	const fragment = document.createDocumentFragment();
	for (const item of visible) fragment.appendChild(renderSettlementRowElement(item));
	list.appendChild(fragment);
}

async function loadSettlementItems() {
	const list = $("seList");
	if (list) {
		list.innerHTML = "";
		const loading = document.createElement("div");
		loading.className = "se-loading";
		loading.textContent = "Lädt…";
		list.appendChild(loading);
	}
	try {
		const requestUrl = new URL(SETTLEMENT_EDITOR_API, window.location.href);
		requestUrl.searchParams.set("action", "settlement_editor_list");
		const response = await fetch(requestUrl.toString(), { method: "GET", credentials: "same-origin" });
		const payload = await response.json();
		if (!response.ok || !payload || payload.ok !== true) {
			throw new Error((payload && payload.error && payload.error.message) || `HTTP ${response.status}`);
		}
		settlementItems = Array.isArray(payload.items) ? payload.items : [];
		renderSettlementMid();
	} catch (error) {
		if (list) {
			list.innerHTML = "";
			const errorEl = document.createElement("div");
			errorEl.className = "se-error";
			errorEl.textContent = "Siedlungen konnten nicht geladen werden: " + (error && error.message ? error.message : String(error));
			list.appendChild(errorEl);
		}
	}
}

// Delegated click handler for the tab bar (elements are re-created on every render).
document.addEventListener("click", (event) => {
	const viewTab = event.target.closest ? event.target.closest("[data-settlement-view]") : null;
	if (viewTab) {
		settlementListView = viewTab.dataset.settlementView || "all";
		renderSettlementMid();
	}
});
// Close open dropdown menus on outside click. Uses closest() against the button (not strict
// target equality) because a click on the button's own <span class=ddcaret> child would
// otherwise be seen as "outside" and re-close the menu the button's own handler just opened.
document.addEventListener("click", (event) => {
	for (const [btnId, menuId] of [["seTypeBtn", "seTypeMenu"], ["seSourceBtn", "seSourceMenu"]]) {
		const menu = $(menuId);
		const btn = $(btnId);
		if (!menu || menu.hidden || !btn) continue;
		const insideButton = event.target.closest ? event.target.closest(`#${btnId}`) : false;
		if (!insideButton && !menu.contains(event.target)) menu.hidden = true;
	}
});

async function boot() {
	const treeSearchInput = $("seTreeSearch");
	if (treeSearchInput) treeSearchInput.addEventListener("input", applyTerritoryTreeSearchFilter);
	await Promise.all([loadSettlementTree(), loadSettlementItems()]);
	/* subsequent phase fills the rest: settlement detail panel (RIGHT column) */
}
boot();
</script>
</body>
</html>
