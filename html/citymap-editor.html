    if (!button) return;
    button.disabled = isBusy;
    const label = button.querySelector(".t1");
    if (label) label.textContent = isBusy ? "Holt …" : "Vorschauen holen";
  }

  // Read-only, no lock, no run -- the same shape as refreshCeSyncedInfo.
  async function refreshCeAutogetInfo() {
    const el = document.getElementById("ceAutogetSub");
    if (!el) return;
    try {
      const res = await fetch("/api/edit/map/citymap-autoget.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ action: "status" }),
      });
      const payload = await res.json().catch(() => null);
      if (!res.ok || !payload || payload.ok !== true) throw new Error(`HTTP ${res.status}`);
      el.textContent = payload.remaining > 0
        ? `${payload.remaining} von ${payload.total} offen`
        : `${payload.total} Karten geprüft`;
    } catch (e) {
      el.textContent = "Status unbekannt";
    }
  }

  async function handleAutogetClick() {
    if (ceAutogetRunning) return;
    let parentWindow;
    try { parentWindow = window.parent; } catch (e) { parentWindow = null; }
    if (!parentWindow || parentWindow === window || typeof parentWindow.startCitymapAutoget !== "function") {
      ceStatus("Nur im eingebetteten Editor verfügbar.", true);
      return;
    }
    if (!window.confirm("Für alle Karten ohne eigenes Vorschaubild ein Bild holen?\n\nWiki-Karten über die MediaWiki-API, Ulisses über die Produkt-API. Verlagscover werden öffentlich sichtbar, eigene Uploads bleiben unangetastet. Der Durchlauf dauert ein bis zwei Minuten und lässt sich fortsetzen.")) {
      return;
    }
    setAutogetBusy(true);
    try {
      const r = await parentWindow.startCitymapAutoget((text) => {
        ceStatus(text);
      });
      // Returns NULL (it does not throw) when a run is already in flight -- the guard is global on
      // purpose. Say so instead of leaving the last progress line standing.
      if (!r) {
        ceStatus("Ein Durchlauf läuft bereits (dieser Tab).");
      } else if (r.busy) {
        ceStatus("Ein Durchlauf läuft bereits (anderer Tab oder Server).");
      } else if (r.stopped) {
        ceStatus("Durchlauf per Not-Aus gestoppt.");
      } else {
        // Report EVERY outcome, not just the wins ("kein stilles Abschneiden", owner). Counted in MAPS,
        // because that is what a reader sees -- the sources are only the bracket.
        const parts = [`${r.sources} Quellen · ${r.ok} Karten mit Vorschau`];
        if (r.no_image) parts.push(`${r.no_image} ohne Seitenbild`);
        if (r.fetch_failed) parts.push(`${r.fetch_failed} nicht erreichbar`);
        if (r.not_an_image) parts.push(`${r.not_an_image} kein Bild`);
        if (r.skipped) parts.push(`${r.skipped} übersprungen (eigenes Bild)`);
        ceStatus(parts.join(" · "));
      }
      await loadList(true);
    } catch (e) {
      ceStatus("Fehlgeschlagen: " + (e && e.message ? e.message : String(e)), true);
    } finally {
      setAutogetBusy(false);
      // Die Kachel zurueck auf ihren Ruhezustand ("N von M offen") -- nach einem Lauf stimmt die beim
      // Oeffnen geholte Zahl nicht mehr. Dieselbe Geste wie refreshCeSyncedInfo nach dem Sync.
      void refreshCeAutogetInfo();
    }
  }

  // ---- wiring ----
  document.getElementById("ceSearch").addEventListener("input", renderList);
  document.getElementById("ceNew").addEventListener("click", newCitymap);
  document.getElementById("ceSave").addEventListener("click", saveStamm);
  // Delete the whole map (irreversible). Confirm first; then loadList(true) sees the map is gone and
  // resets the detail through its own "selected map removed" path -- no separate clearing needed.
  document.getElementById("ceDelete").addEventListener("click", async () => {
    if (!state.selectedId) { return; }
    const item = state.citymaps.find((c) => c.public_id === state.selectedId);
    const title = (item && item.title) || "diese Karte";
    if (!window.confirm(`„${title}“ wirklich endgültig löschen?\n\nEntfernt die Karte samt Orten, Typen und Fundort-Links. Eine Wiki-Karte kommt beim nächsten „Karten syncen“ zurück; eine eigene/manuelle Karte ist dann weg.`)) { return; }
    const stateEl = document.getElementById("ceSaveState");
    stateEl.className = "ce-savebar__state";
    stateEl.textContent = "Löscht …";
    try {
      await citymapPost({ action: "delete_citymap", public_id: state.selectedId });
      const parentWindow = ceParentOverlay();
      if (parentWindow && typeof parentWindow.showFeedbackToast === "function") {
        parentWindow.showFeedbackToast("Karte gelöscht.", "success");
      }
      await loadList(true);
    } catch (e) {
      stateEl.textContent = "Fehler: " + e.message;
      stateEl.className = "ce-savebar__state error";
    }
  });
  // "Verwerfen" drops the edits AND leaves -- same reasoning as the Abenteuer editor: it sits next to a
  // "Speichern" that closes the dialog, and a pair where only one half closes reads as broken. Reset
  // BEFORE closing (the overlay only HIDES this iframe, so a re-open would serve the discarded edits back);
  // finally, because a failed reset must not trap the user in a dialog they asked to leave.
  document.getElementById("ceDiscard").addEventListener("click", async () => {
    try {
      if (state.selectedId) { await selectCitymap(state.selectedId); } else { newCitymap(); }
    } finally {
      const parentWindow = ceParentOverlay();
      if (parentWindow) { parentWindow.closeAvesmapsCitymapEditorOverlay(); }
    }
  });
  document.getElementById("ceEnabledToggle").addEventListener("click", toggleEnabled);
  document.getElementById("cePreviewsToggle").addEventListener("click", togglePreviews);
  document.getElementById("ceSyncBtn").addEventListener("click", handleCeSyncClick);
  document.getElementById("ceLinkCheckBtn").addEventListener("click", handleLinkCheckClick);
  document.getElementById("ceAutogetBtn").addEventListener("click", handleAutogetClick);

  // Delegate on the STABLE container -- the rows are rebuilt by innerHTML.
  document.getElementById("ceListScroll").addEventListener("click", (e) => {
    const b = e.target.closest(".ce-item");
    if (b) selectCitymap(b.dataset.id);
  });
  // Spec §3.6 "Doppelklick öffnet die Karte": single click selects for editing (the sibling editor's
  // convention), double click opens the map itself in a new tab. Reading it as "opens the editor" would
  // be circular -- we are already in the editor.
  document.getElementById("ceListScroll").addEventListener("dblclick", (e) => {
    const b = e.target.closest(".ce-item");
    if (!b) return;
    const c = state.citymaps.find((x) => x.public_id === b.dataset.id);
    const url = c && (c.map_local_url || c.map_url);
    if (url) window.open(url, "_blank", "noopener");
  });

  document.getElementById("ceStammBody").addEventListener("click", (e) => {
    const del = e.target.closest("[data-ce-img-delete]");
    if (del) { deleteImage(del.getAttribute("data-ce-img-delete")); return; }
    const auto = e.target.closest("[data-ce-autoget]");
    if (auto && !auto.disabled) { autogetThumb(); return; }

    // Einen FREMDEN Fundort unterdruecken. Anders als alles andere in dieser Gruppe wirkt das SOFORT
    // (eigene Action, eigene Zeile mit id) -- es gehoert nicht zu „Speichern", weil set_links diese Zeilen
    // gar nicht kennt.
    const suppress = e.target.closest("[data-cl-suppress]");
    if (suppress) {
      suppressForeignLink(Number(suppress.getAttribute("data-cl-suppress")));
      return;
    }

    // „Wo gibt es die Karte?": + Fundort / ▲▼ / ✕. Delegated on the stable #ceStammBody because the rows
    // are rebuilt on every render. Purely local to the state -- nothing is stored until „Speichern".
    const btn = e.target.closest("[data-cl-act]");
    if (!btn) return;
    ceSyncLinksFromDom(); // BEFORE the re-render, or ▲ throws away the URL just typed
    const act = btn.dataset.clAct;
    const rowEl = btn.closest("[data-cl-idx]");
    const idx = rowEl ? Number(rowEl.dataset.clIdx) : -1;
    if (act === "add") {
      state.links.push({ label: "", url: "", is_paid: null });
    } else if (act === "del" && idx >= 0) {
      state.links.splice(idx, 1);
    } else if ((act === "up" || act === "down") && idx >= 0) {
      const to = act === "up" ? idx - 1 : idx + 1;
      if (to < 0 || to >= state.links.length) return;
      state.links.splice(to, 0, state.links.splice(idx, 1)[0]);
    } else {
      return;
    }
    renderLinks();
  });

  // Keep each URL field's ↗ pointing at what the box currently SAYS, not at what was last saved --
  // otherwise you paste a link, click the arrow to check it, and land on the previous one. Also hides
  // the arrow again when the field is cleared. Only http/https is offered: the backend refuses anything
  // else anyway (avesmapsCitymapNormalizeUrl), and a javascript:-URL behind a click is not a link.
  document.getElementById("ceStammBody").addEventListener("input", (e) => {
    const field = e.target && e.target.dataset ? e.target.dataset.cmField : null;
    if (!field) return;
    const anchor = document.querySelector(`[data-ce-open="${field}"]`);
    if (!anchor) return;
    const value = String(e.target.value || "").trim();
    const safe = /^https?:\/\//i.test(value);
    anchor.href = safe ? value : "#";
    anchor.hidden = !safe;
  });

  document.getElementById("ceOrteBody").addEventListener("click", async (e) => {
    const btn = e.target.closest("[data-act]");
    if (!btn) return;
    const act = btn.getAttribute("data-act");
    if (act === "add") { addPlaceRaw(document.getElementById("ceAddName").value); return; }
    if (act === "ac-free") { addPlaceRaw(acQuery); return; }
    if (act === "ac-pick") { addPickedItem(acItems[Number(btn.dataset.idx)]); return; }
    const row = btn.closest("[data-place-id]");
    if (!row) return;
    const placeId = Number(row.dataset.placeId);
    try {
      if (act === "suppress") {
        await citymapPost({ action: "suppress_place", place_id: placeId });
      } else if (act === "resolve") {
        await citymapPost({ action: "resolve_place", place_id: placeId });
      } else if (act === "up" || act === "down") {
        // sort_order SWAP via two set_place calls (same as the adventure editor). Not atomic: if the
        // second fails, both rows hold the same sort_order -- visible and re-fixable, never data loss.
        const approved = (state.detail.places || []).filter((p) => p.status === "approved");
        const idx = approved.findIndex((p) => p.id === placeId);
        const swapWith = act === "up" ? approved[idx - 1] : approved[idx + 1];
        if (!swapWith) return;
        const cur = approved[idx];
        await citymapPost({ action: "set_place", place_id: cur.id, place: { sort_order: swapWith.sort_order } });
        await citymapPost({ action: "set_place", place_id: swapWith.id, place: { sort_order: cur.sort_order } });
      } else { return; }
      await reloadDetail();
    } catch (err) { alert("Fehler: " + err.message); }
  });

  document.getElementById("ceOrteBody").addEventListener("input", (e) => {
    if (e.target.id !== "ceAddName") return;
    acQuery = e.target.value.trim();
    clearTimeout(acTimer);
    if (acQuery.length < 2) { hideAc(); return; }
    acTimer = setTimeout(() => runAcSearch(acQuery), 250);
  });
  document.getElementById("ceOrteBody").addEventListener("keydown", (e) => {
    if (e.target.id !== "ceAddName") return;
    const ac = document.getElementById("ceAc");
    if (e.key === "Escape") { hideAc(); return; }
    if (e.key === "Enter") {
      e.preventDefault();
      if (ac && !ac.hidden && acActive >= 0 && acItems[acActive]) addPickedItem(acItems[acActive]);
      else addPlaceRaw(e.target.value);
      return;
    }
    if (!ac || ac.hidden) return;
    if (e.key === "ArrowDown") { e.preventDefault(); acActive = Math.min(acActive + 1, acItems.length - 1); renderAc(); }
    else if (e.key === "ArrowUp") { e.preventDefault(); acActive = Math.max(acActive - 1, -1); renderAc(); }
  });
  // mousedown, not click: blur would tear the dropdown down before a click could land.
  document.getElementById("ceOrteBody").addEventListener("mousedown", (e) => {
    if (e.target.closest("#ceAc")) e.preventDefault();
  });

  // The overlay HIDES the iframe rather than destroying it, so every (re-)open posts a refresh -- see
  // openAvesmapsCitymapEditorOverlay (js/review/review-settlement-list.js).
  window.addEventListener("message", (e) => {
    if (!e || e.origin !== location.origin || !e.data || e.data.avesmapsCitymapRefresh !== true) return;
    const id = (e.data.selectPublicId || "").trim();
    loadList(true).then(() => { if (id) selectCitymap(id); });
  });

  loadList(false);
  // Fill the sync button's sub-label on open: it answers "is there a dump staged to sync at all?"
  // before the owner presses anything. Best-effort -- a failure just shows "Dump-Status unbekannt".
  void refreshCeSyncedInfo();
  // Fill the autoget sub-label on open: how many maps are still due (read-only, no lock, no run).
  void refreshCeAutogetInfo();
</script>
</body>
</html>
