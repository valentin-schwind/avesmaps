<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Avesmaps – Karten bearbeiten</title>
<script>
  /* Resolve light/dark exactly like the parent app (js/app/theme-toggle.js): an explicit saved choice
     wins, otherwise follow the browser/OS scheme (prefers-color-scheme). Runs before the stylesheet
     paints so this overlay iframe never flashes the wrong theme, and stays in sync if the OS scheme
     changes live while no explicit choice is stored. */
  (function () {
    function isDark() {
      var saved = null;
      try { saved = localStorage.getItem("avesmaps-theme"); } catch (e) {}
      if (saved === "dark") { return true; }
      if (saved === "light") { return false; }
      return !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
    }
    function apply() {
      if (isDark()) { document.documentElement.setAttribute("data-theme", "dark"); }
      else { document.documentElement.removeAttribute("data-theme"); }
    }
    apply();
    if (window.matchMedia) {
      var mq = window.matchMedia("(prefers-color-scheme: dark)");
      if (mq.addEventListener) { mq.addEventListener("change", apply); }
      else if (mq.addListener) { mq.addListener(apply); }
    }
  })();
</script>
<!-- Self-contained editor page (Spec §3.6), loaded as an iframe overlay via
     openAvesmapsCitymapEditorOverlay() with ?v=Date.now() (no ASSET_VERSION bump needed, §7). Links the
     REAL design tokens so the warm/aventurian language is authentic — no hardcoded hex/radius, no blue.
     Pure client on POST /api/edit/map/citymaps.php + /api/edit/map/citymap-image.php.
     Layout mirrors the adventure editor: Liste | Stammdaten | Orte.

     NO token-alias :root here, unlike the older wiki-sync-settlement-editor: that block is a shim for
     pre-existing hardcoded rules, and this page uses var(--color-*) directly. (Spec §3.6 asks for both
     "wie adventure-editor.html" and "Token-Alias-Block" — those contradict each other; the sibling
     editor's actual architecture wins.)

     tokens.css needs no hand-written ?v=: the deploy stamps this reference with a content hash, so it
     busts itself whenever tokens.css changes. See docs/asset-caching-and-versioning.md. -->
<link rel="stylesheet" href="/css/base/fonts.css">
<link rel="stylesheet" href="/css/base/tokens.css">
<style>
  * { box-sizing: border-box; }
  /* Eine Bedienhoehe fuer Suchfeld, Knopf, Eingabe und Auswahl (Spec §4.3): sie stehen staendig
     nebeneinander, und drei verschiedene Hoehen lesen sich als Unfall. Die kompakten Zeilen-Knoepfe
     (.btn--sm/.btn--icon) bleiben bewusst klein -- die sitzen IN einer Zeile, nicht neben dem Suchfeld. */
  :root { --ce-control-h: 32px; }
  /* Scrollbars: this iframe links tokens.css but NOT base.css, so every scroll area in here fell back
     to the browser's default bars while the app around it had the thin warm ones -- the single most
     obvious "this dialog is from somewhere else" tell (owner 2026-07-17: "einheitliche ui z.B. die
     scrollbalken des design templates"). The WebKit pseudo-elements do not inherit, hence `*`.
     Maße wie im Siedlungs- (6cc567db) und Abenteuer-Editor (952fb225): 10px, runder Daumen mit 2px
     Rand in Spurfarbe. Das ist bewusst NICHT der 7px-Wert aus base.css -- die drei Editoren gleichen
     sich untereinander an. Spec §4.6 will am Ende EINEN Block statt drei Kopien; sein Vorschlag
     (editor-shell.css) trägt aber nicht: die Datei kommt über styles.css in die App-Hülle und wird
     von keiner Editor-Seite eingebunden. Dafür bräuchte es ein eigenes Editor-Seiten-Stylesheet. */
  * { scrollbar-width: thin; scrollbar-color: var(--color-scrollbar-thumb) var(--color-scrollbar-track); }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track { background: var(--color-scrollbar-track); }
  *::-webkit-scrollbar-thumb { background: var(--color-scrollbar-thumb); border-radius: 999px; border: 2px solid var(--color-scrollbar-track); }
  *::-webkit-scrollbar-thumb:hover { background: var(--color-scrollbar-thumb-hover); }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Faculty Glyphic", "Arial", sans-serif;
    background: var(--color-page-bg);
    color: var(--color-text);
    font-size: var(--font-size-body);
    display: flex;
    flex-direction: column;
  }
  /* No <h1>: the overlay chrome (political-territory-editor-dialog__header) already carries the heading. */
  a { color: var(--color-link); }

  /* Gitter statt Flex: ALLE Kacheln gleich breit ueber die volle Zeile, wie im Siedlungs- und
     Territorieneditor (Spec §3.3). Loest die linksbuendige Fassung vom 2026-07-17 ab. */
  .ce-header {
    flex: 0 0 auto;
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: minmax(0, 1fr);
    align-items: stretch;
    gap: var(--space-4);
    padding: var(--space-8) var(--space-12);
    border-bottom: 1px solid var(--color-border);
    background: var(--color-panel);
  }
  .ce-btn2 {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
    padding: var(--space-6) var(--space-10);
    background: var(--color-button-soft);
    border: 1px solid var(--color-button-soft-border);
    border-radius: var(--radius-md);
    color: var(--color-button-soft-text);
    font: inherit;
    cursor: pointer;
  }
  .ce-btn2:hover:not(:disabled) { background: var(--color-button-soft-hover); }
  .ce-btn2:disabled { opacity: 0.6; cursor: default; }
  .ce-btn2 .t1 { font-weight: 700; }
  .ce-btn2 .t2 { font-size: var(--font-size-caption); color: var(--color-text-muted); }
  /* The one filled action in this header (AGENTS.md §12: main action filled, the rest soft).
     Mirrors .ae-btn2--primary in adventure-editor.html token for token -- the two sync buttons are
     the same gesture and must not drift apart. */
  .ce-btn2--primary { background: var(--color-button); color: var(--color-button-text); border-color: var(--color-button-border); }
  .ce-btn2--primary:hover:not(:disabled) { background: var(--color-button-hover); box-shadow: var(--shadow-button-hover-strong); }
  .ce-btn2--primary .t2 { color: var(--color-button-text); opacity: .8; }

  /* Statuszeile unter dem Menueband (Spec §3.4), volle Breite, eigener Grund -- Vorbild
     #settlementStatus im Siedlungseditor. Feste Mindesthoehe, weil eine eintreffende Meldung die drei
     Spalten darunter sonst nach unten schiebt; sie ist immer da und sagt im Ruhezustand "Bereit.". */
  .ce-status {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    min-height: 30px;
    padding: var(--space-4) var(--space-12);
    border-bottom: 1px solid var(--color-border);
    background: var(--color-panel-soft);
    color: var(--color-text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ce-status.error { color: var(--color-danger); }

  /* Gitterspuren statt flex:1/2 -- 💣 `flex: 1 1 0` macht die Spalten NICHT gleich breit, sobald eine
     davon eigene Polsterung oder einen Rahmen traegt: box-sizing:border-box hebt die flex-basis auf
     padding+border an statt auf 0. Hier ist es der 1px-Trenner der Liste; gemessen kam sie dadurch auf
     459,33 gegen 457,83/458,84. Spuren werden unabhaengig vom box-sizing der Kinder bemessen, also ist
     minmax(0,1fr) minmax(0,2fr) exakt 1:2. Gleiche Loesung wie im Abenteuer-Editor (952fb225). */
  .ce-body { flex: 1 1 auto; display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 2fr); min-height: 0; }
  .ce-list {
    /* War fest 380px (Owner 2026-07-17: Wiki-Titel sind lang, weil die Quelle Teil des Namens ist --
       "Stadtplan von Al'Anfa (Al'Anfa und der tiefe Süden)" -- und bei 300 kuerzte fast jeder genau
       dort, wo er sich vom Nachbarn zu unterscheiden beginnt). Jetzt ein Drittel wie die anderen
       beiden Spalten (Spec §5). Das Anliegen bleibt erfuellt: im 1400er Dialog sind das ~466px,
       also MEHR als die 380 -- die Titel bekommen Platz, nicht weniger. */
    min-width: 0;
    display: flex;
    flex-direction: column;
    min-height: 0;
    border-right: 1px solid var(--color-border);
    /* Spalten-Innenrand 8/12 wie alle drei Spalten (Spec §3.1a). Vorher trug jedes Kind seinen
       eigenen Rand (0 var(--space-8)), weil die Zeilen randlos durchliefen -- mit schwebenden
       Zeilen ist das nicht mehr noetig, und die Spalte bekommt denselben Rhythmus wie die anderen. */
    padding: var(--space-6) var(--space-10);
  }
  /* Spaltentitel (Spec §3.2: "Jede Spalte traegt einen Titel", §4.1: --font-size-subhead in
     --color-accent-strong). Er steht AUSSERHALB des Scrollbereichs, denn die Panel-Inhalte werden per
     innerHTML neu gebaut -- ein Titel darin waere beim ersten Render weg. Deshalb traegt in den beiden
     Detailspalten ein innerer .ce-panel__scroll die id, und der Titel ist sein Geschwister davor. */
  /* Den Innenrand liefert jetzt die Spalte, nicht der Titel -- sonst stuenden Titel und Inhalt auf
     zwei verschiedenen Kanten (Spec §3.1a). */
  .ce-coltitle {
    flex: 0 0 auto;
    margin: 0 0 var(--space-6);
    font-size: var(--font-size-subhead);
    line-height: var(--leading-snug);
    font-weight: var(--font-weight-bold);
    color: var(--color-accent-strong);
  }
  .ce-coltitle__count { font-size: var(--font-size-caption); font-weight: 400; color: var(--color-text-muted); }
  .ce-list__top { display: flex; gap: var(--space-6); padding: 0 0 var(--space-8); }
  .ce-search {
    flex: 1 1 auto;
    min-height: var(--ce-control-h);
    padding: var(--space-4) var(--space-8);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    background: var(--color-panel);
    color: var(--color-text);
    font: inherit;
  }
  .ce-list__count { margin: 0; padding: 0 0 var(--space-6); font-size: var(--font-size-caption); color: var(--color-text-muted); }
  .ce-list__scroll { flex: 1 1 auto; overflow-y: auto; min-height: 0; }
  /* Schwebende, gerundete Zeile wie .se-row im Vorbild und .ae-item im Abenteuer-Editor. Vorher
     randlos mit Trennlinie unten -- das war der auffaelligste Unterschied der beiden Editoren
     nebeneinander (Spec §3.1a). Der transparente Rahmen haelt die Zeile beim Auswaehlen ruhig:
     er ist immer da und wechselt nur die Farbe, sonst wuerde die Zeile um 2px springen. */
  .ce-item {
    display: flex;
    gap: var(--space-8);
    width: 100%;
    padding: var(--space-2) var(--space-4);
    margin-bottom: 1px;
    border: 1px solid transparent;
    border-radius: var(--radius-md);
    background: transparent;
    color: inherit;
    font: inherit;
    text-align: left;
    cursor: pointer;
  }
  .ce-item:hover { background: var(--color-hover-wash); }
  .ce-item.is-selected { background: var(--color-active-wash); border-color: var(--color-accent); }
  .ce-item.is-draft .ce-item__title { opacity: 0.6; font-style: italic; }
  .ce-item__thumb {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 40px;
    overflow: hidden;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    background: var(--color-panel-muted);
    color: var(--color-text-muted);
  }
  .ce-item__thumb img { width: 100%; height: 100%; object-fit: cover; }
  .ce-item__text { min-width: 0; }
  .ce-item__title { font-weight: 700; }
  .ce-item__l2 { display: block; margin-top: 2px; font-size: var(--font-size-caption); color: var(--color-text-muted); }
  .ce-empty { padding: var(--space-12); color: var(--color-text-muted); }

  /* 2 statt auto: die Detailspalte traegt ZWEI Panels (Stammdaten + Orte), die Liste eines.
     1 : 2 mit je 50 % innen ergibt drei gleich breite Spalten, ohne die Kopfzeile und die
     Speicherleiste auseinanderzureissen -- die spannen bewusst ueber beide Panels (Spec §5). */
  .ce-detail { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  /* Die Ueberschrift der gewaehlten Karte -- Detail-Ueberschrift, also dieselbe Stufe wie die
     Spaltentitel (Spec §4.1), aber in --color-text-strong statt Gold: sie benennt einen Datensatz,
     kein Fach. Vorher trug sie nur font-weight und blieb damit auf Listenzeilen-Groesse. */
  .ce-detail__head {
    flex: 0 0 auto;
    padding: var(--space-6) var(--space-10);
    border-bottom: 1px solid var(--color-border);
    font-size: var(--font-size-subhead);
    line-height: var(--leading-snug);
    font-weight: var(--font-weight-bold);
    color: var(--color-text-strong);
  }
  /* Auch hier Spuren statt flex: der Orte-Trenner ist derselbe 1px-Sockel wie in .ce-body. Vorher stand
     an .ce-panel flex-basis 50 %, waehrend .ce-panel--orte auf 0 uebersteuerte -- zwei verschiedene
     Basen in derselben Zeile, und der freie Rest wurde dann noch einmal gleich verteilt. Ergebnis waren
     nicht Drittel, sondern ein breites Stammdaten- und ein schmales Orte-Panel (gemessen: 673 / 244). */
  .ce-panels { flex: 1 1 auto; display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); min-height: 0; }
  .ce-panel { min-width: 0; min-height: 0; display: flex; flex-direction: column; overflow: hidden;
    padding: var(--space-6) var(--space-10); }
  .ce-detail__head:empty { display: none; }
  /* Das Panel selbst scrollt nicht mehr -- sonst wanderte der Spaltentitel mit dem Inhalt weg.
     Es scrollt der innere Kasten, der auch die id traegt. */
  .ce-panel__scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; }
  .ce-panel--orte { border-left: 1px solid var(--color-border); }
  .ce-placeholder { color: var(--color-text-muted); }

  .ce-grp { margin-bottom: var(--space-16); }
  /* Gruppentitel = versal auf --font-size-caption (Spec §4.1), Wort fuer Wort wie .ae-grp__title im
     Abenteuer-Editor. Vorher fett auf Fliesstextgroesse und damit auf derselben Stufe wie der
     Spaltentitel darueber -- zwei Ebenen, die gleich laut sprachen. */
  .ce-grp__title {
    margin: 0 0 var(--space-8);
    padding-bottom: var(--space-4);
    border-bottom: 1px solid var(--color-divider);
    font-size: var(--font-size-caption);
    text-transform: uppercase;
    letter-spacing: .04em;
    font-weight: var(--font-weight-bold);
    color: var(--color-text-muted);
  }
  .ce-row { display: flex; align-items: center; gap: var(--space-8); margin-bottom: var(--space-6); }
  .ce-row__label { flex: 0 0 130px; color: var(--color-text-muted); }
  /* Follow-the-link affordance next to a URL input. --color-link is the house link colour (never blue,
     AGENTS.md §12); flex: 0 0 auto so it never steals width from the input. */
  .ce-open {
    flex: 0 0 auto;
    padding: 0 var(--space-4);
    color: var(--color-link);
    text-decoration: none;
    font-size: var(--font-size-subhead);
    line-height: 1;
  }
  .ce-open:hover { text-decoration: underline; }
  .ce-open[hidden] { display: none; }
  .ce-input, .ce-select {
    flex: 1 1 auto;
    min-width: 0;
    min-height: var(--ce-control-h);
    padding: var(--space-4) var(--space-6);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    background: var(--color-panel);
    color: var(--color-text);
    font: inherit;
  }
  .ce-input:focus-visible, .ce-select:focus-visible {
    border-color: var(--color-border-strong);
    box-shadow: var(--focus-ring);
    outline: none;
  }
  .ce-hint { font-size: var(--font-size-caption); color: var(--color-text-muted); }
  .ce-warn { font-size: var(--font-size-caption); color: var(--color-warning); }

  /* Multi-select types: plain checkboxes, no chips — the editor is a form, not the reader dialog. */
  .ce-types { display: flex; flex-wrap: wrap; gap: var(--space-4) var(--space-12); }
  .ce-types label { display: inline-flex; align-items: center; gap: var(--space-4); }

  /* Tri-state property: a THREE-way select, never a checkbox. A checkbox cannot express "unknown", and
     collapsing unknown into "no" is exactly the claim §3.1 forbids. */
  .ce-tri { flex: 0 0 130px; }

  /* ---- „Wo gibt es die Karte?" (multi-link spec §6.2): Fundort + URL + kostenpflichtig je Zeile,
     ▲▼, löschen. Same shape as the adventure editor's .ae-xlink, plus the is_paid column -- that column
     IS the feature: the same map is paid in the shop and free on its wiki page. */
  .ce-xlink { display: grid; grid-template-columns: 16px minmax(0, 1fr) minmax(0, 1.4fr) 120px auto;
    align-items: center; gap: var(--space-6); margin-bottom: var(--space-6); }
  .ce-xlink__reorder { display: flex; flex-direction: column; }
  .ce-xlink__reorder button { border: 0; background: transparent; cursor: pointer;
    color: var(--color-text-muted); line-height: 1; padding: 0; font-size: var(--font-size-caption); }
  .ce-xlink__reorder button:hover { color: var(--color-text-strong); }
  .ce-xlink__reorder button:disabled { opacity: .35; cursor: default; }
  .ce-xlink__hint { font-size: var(--font-size-caption); color: var(--color-text-muted);
    margin: 0 0 var(--space-8); }
  .ce-xlink__empty { font-size: var(--font-size-caption); color: var(--color-text-muted); margin: 0; }
  .ce-xlink__add { margin-top: var(--space-8); }
  /* The column headings sit on the same grid as the rows, so a heading can never drift off its column. */
  .ce-xlink__head { display: grid; grid-template-columns: 16px minmax(0, 1fr) minmax(0, 1.4fr) 120px auto;
    gap: var(--space-6); margin-bottom: var(--space-4);
    font-size: var(--font-size-caption); color: var(--color-text-muted); }

  /* Fundorte, die jemand ANDERES verfasst hat (Community/Wiki). Sie stehen unter einer Trennlinie und ohne
     Eingabefelder -- das IST die Aussage "die gehoeren dir nicht". Ein zweiter Kasten drumherum waere
     Rauschen; die Linie genuegt (AGENTS.md §12). */
  .ce-xlink__foreign { display: flex; align-items: center; gap: var(--space-8);
    padding-top: var(--space-6); margin-top: var(--space-6); border-top: 1px solid var(--color-divider); }
  .ce-xlink__foreign + .ce-xlink__foreign { margin-top: 0; }
  .ce-xlink__foreignmain { flex: 1 1 auto; min-width: 0; }
  /* Unterdrueckt = durchgestrichen und blass: die Zeile ist noch da (Tombstone), wirkt aber nicht mehr. */
  .ce-xlink__foreign.is-suppressed .ce-xlink__foreignmain { text-decoration: line-through; opacity: .55; }

  /* Vorschaubild + Karte nebeneinander, Eigenschaften jeweils darunter (Owner-Layout 2026-07-16).
     auto-fit statt fester 2 Spalten: unter ~260px je Spalte stapeln sie von selbst, statt die Selects
     unlesbar zu quetschen. */
  .ce-imgcols {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: var(--space-12);
    margin-bottom: var(--space-16);
  }
  .ce-imgcol {
    min-width: 0;
    padding: var(--space-10);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    background: var(--color-panel);
  }
  .ce-imgcol__preview {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 110px;
    overflow: hidden;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    background: var(--color-panel-muted);
    color: var(--color-text-muted);
  }
  .ce-imgcol__preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .ce-imgcol__origin { margin: var(--space-6) 0 0; }
  /* Der Trenner, der "Eigenschaften darunter" trägt -- eine Linie, nicht noch ein Kasten. */
  .ce-imgcol__props {
    margin-top: var(--space-8);
    padding-top: var(--space-8);
    border-top: 1px solid var(--color-divider);
  }
  /* In der schmalen Spalte braucht das Label weniger Platz als im Formular darunter. */
  .ce-imgcol__props .ce-row__label { flex: 0 0 88px; }
  .ce-img__btns { display: flex; flex-wrap: wrap; gap: var(--space-6); margin-top: var(--space-6); }
  .ce-img__state { margin-top: var(--space-4); font-size: var(--font-size-caption); color: var(--color-text-muted); }
  .ce-img__state.error { color: var(--color-danger); }

  .btn {
    min-height: var(--ce-control-h);
    padding: var(--space-4) var(--space-10);
    border: 1px solid var(--color-button-soft-border);
    border-radius: var(--radius-md);
    background: var(--color-button-soft);
    color: var(--color-button-soft-text);
    font: inherit;
    cursor: pointer;
  }
  .btn:hover { background: var(--color-button-soft-hover); }
  .btn--primary {
    background: var(--color-button);
    border-color: var(--color-button);
    color: var(--color-button-text);
  }
  .btn--primary:hover { background: var(--color-button-hover); }
  /* Die zwei kompakten Varianten nehmen die Bedienhoehe ausdruecklich zurueck: sie sitzen INNERHALB
     einer Zeile (Fundort-, Bild- und Ortszeilen), wo 32px die Zeile aufblaehen wuerden. Die Regel aus
     §4.3 meint die Bedienelemente, die nebeneinander in einer Leiste stehen. */
  .btn--sm { min-height: 0; padding: 2px var(--space-6); font-size: var(--font-size-caption); }
  .btn--danger { color: var(--color-danger); }
  .btn--icon { min-height: 0; padding: 2px var(--space-6); }

  /* Base pill copied token-for-token from html/adventure-editor.html -- the nearest existing component
     (AGENTS.md §12: reuse it as the template, do not re-invent). It had drifted here: --color-border /
     --color-text-muted instead of the dedicated --color-pill* tokens, radius-sm instead of -md, and no
     background at all, so the same badge read differently in the two editors. */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: 1px var(--space-6);
    border: 1px solid var(--color-pill-border);
    border-radius: var(--radius-md);
    background: var(--color-pill);
    color: var(--color-pill-text);
    font-size: var(--font-size-caption);
    line-height: 1.3;
    white-space: nowrap;
  }
  /* 💣 Diese beiden waren gegenueber dem Abenteuer-Editor VERTAUSCHT: dort schrie „manuell" in Gold
     und der Typ blieb still, hier genau umgekehrt. Eine Vokabel darf nicht in zwei Editoren
     Gegensaetzliches betonen. Regel (Spec §3.1b): die AUSNAHME wird betont, die Kategorie nicht --
     „manuell" ist die Ausnahme, der Typ ist eine Einordnung. */
  .pill--kind { border-color: var(--color-border); background: var(--color-panel-muted); color: var(--color-text-muted); }
  .pill--manual { border-color: var(--color-accent); background: var(--color-pill); color: var(--color-accent-strong);
    font-weight: var(--font-weight-bold); }
  /* Autoget = fremdes Bildmaterial, nur intern -> Warnfarbe, damit es sich nie wie ein eigener Upload liest. */
  .pill--auto { border-color: var(--color-warning); background: transparent; color: var(--color-warning); }
  .pill--community { border-color: var(--color-accent); background: var(--color-pill); color: var(--color-accent-strong); }
  /* Wiki-born (origin='wiki'): the sync owns this row and will rewrite it. Same treatment as
     .pill--wiki in the adventure editor -- deliberately the QUIET one. My first cut painted it gold
     (--color-link), which made "came from the wiki" shout louder than "an editor made this", the
     opposite of the truth: wiki is the bulk default here, manual is the exception worth noticing. */
  .pill--wiki { border-color: var(--color-border); background: transparent; color: var(--color-text-muted); }
  /* Warning, not danger (unlike the adventure editor): "unresolved" is the honest fallback for a name
     we have not matched, NOT an error -- the whole point of keeping raw_name (Spec §3.1). */
  .pill--unresolved { border-color: var(--color-warning); background: transparent; color: var(--color-warning); }
  .pill--nowiki { border-color: var(--color-border); background: transparent; }
  .pill--hidden { border-color: var(--color-danger); background: transparent; color: var(--color-danger); }

  .ce-savebar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: var(--space-8);
    padding: var(--space-6) var(--space-10);
    border-top: 1px solid var(--color-border);
    background: var(--color-panel);
  }
  /* No flex-grow: the spacer pushes the buttons right now, so the status only takes what it needs and
     stops sliding around as its text changes. */
  .ce-savebar__state { flex: 0 1 auto; font-size: var(--font-size-caption); color: var(--color-text-muted); }
  .ce-savebar__spacer { flex: 1 1 auto; }
  .ce-savebar__state.error { color: var(--color-danger); }

  .ce-place {
    display: grid;
    grid-template-columns: 44px minmax(0, 1fr) auto;
    gap: var(--space-6);
    align-items: start;
    padding: var(--space-6) 0;
    border-bottom: 1px solid var(--color-divider);
  }
  .ce-place.is-hidden { opacity: 0.55; }
  .ce-place__order { display: flex; align-items: center; gap: 2px; color: var(--color-text-muted); }
  .ce-place__reorder { display: flex; flex-direction: column; }
  .ce-place__reorder button {
    padding: 0 var(--space-2);
    border: none;
    background: transparent;
    color: var(--color-text-muted);
    cursor: pointer;
    line-height: 1;
  }
  .ce-place__reorder button:disabled { opacity: 0.3; cursor: default; }
  .ce-place__name { font-weight: 700; }
  .ce-place__resolved { font-size: var(--font-size-caption); color: var(--color-text-muted); }
  .ce-place__badges { margin-top: 2px; }
  .ce-place__ctl { display: flex; gap: var(--space-4); }

  .ce-add { position: relative; display: flex; gap: var(--space-6); margin-top: var(--space-8); }
  .ce-ac {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    z-index: 5;
    max-height: 220px;
    overflow-y: auto;
    border: 1px solid var(--color-border-strong);
    border-radius: var(--radius-md);
    background: var(--color-panel);
    box-shadow: var(--shadow-dialog);
  }
  .ce-ac__item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-6);
    padding: var(--space-4) var(--space-8);
    cursor: pointer;
  }
  .ce-ac__item.is-active { background: var(--color-active-wash); }
  .ce-ac__free { border-top: 1px solid var(--color-divider); }
</style>
</head>
<body>

<div class="ce-header">
  <button type="button" class="ce-btn2 ce-btn2--primary" id="ceSyncBtn" title="Übernimmt Karten aus dem zuletzt geholten Wiki-Dump override-sicher (Stadtplanindex + Kartenindex). Eigene und Community-Karten bleiben unberührt, entfernte Karten bleiben entfernt. Vorher einmal „Dump holen" im WikiSync-Menüband ausführen.">
    <span class="t1">🚨 Karten syncen</span>
    <span class="t2" id="ceSyncSub">…</span>
  </button>
  <button type="button" class="ce-btn2" id="ceLinkCheckBtn" title="Prüft NUR die Karten-Links auf Erreichbarkeit — Abenteuer und Quellen bleiben unberührt. Höflich: 600ms Pause je Host.">
    <span class="t1">Links prüfen</span>
    <span class="t2" id="ceLinkCheckSub">…</span>
  </button>
  <button type="button" class="ce-btn2" id="ceAutogetBtn" title="Holt für alle Karten ohne eigenes Vorschaubild ein Cover (Wiki über die MediaWiki-API, Ulisses über die Produkt-API). Läuft nach einem Klick sicher durch: ein Server-Riegel lässt nur EINEN Lauf gleichzeitig zu, jeder Schritt hält einen Worker nur ~4 s. Eigene Uploads bleiben unangetastet.">
    <span class="t1">Vorschauen holen</span>
    <span class="t2" id="ceAutogetSub">…</span>
  </button>
  <button type="button" class="ce-btn2" id="cePreviewsToggle" title="Notaus NUR für die Vorschaubilder: aus = die Karten bleiben, aber kein Cover und keine „© Ulisses Spiele“-Fußnote erscheinen öffentlich. Getrennt vom Abenteuer-Cover-Schalter, weil die Erlaubnis nur bis auf Widerruf gilt.">
    <span class="t1" id="cePreviewsLabel">Vorschauen: …</span>
    <span class="t2">öffentliche Anzeige</span>
  </button>
  <button type="button" class="ce-btn2" id="ceEnabledToggle" title="Globaler Notaus für die Kartensammlung: aus = die Karten verschwinden auf der öffentlichen Seite (api/app/citymaps.php liefert eine leere Liste). Die Daten bleiben, der Editor arbeitet weiter.">
    <span class="t1" id="ceEnabledLabel">Kartensammlung: …</span>
    <span class="t2">öffentliche Anzeige</span>
  </button>
</div>

<!-- Statuszeile (Spec §3.4). Sie nimmt auf, was gerade LAEUFT; was ein Knopf im Ruhezustand ueber sich
     zu sagen hat ("Dump: …", "12 von 300 offen"), bleibt in seiner eigenen zweiten Zeile stehen. -->
<div class="ce-status" id="ceStatus" role="status" aria-live="polite">Bereit.</div>

<div class="ce-body">
  <aside class="ce-list">
    <h2 class="ce-coltitle">Karten</h2>
    <div class="ce-list__top">
      <input class="ce-search" id="ceSearch" type="search" placeholder="Karte suchen …" autocomplete="off">
      <button class="btn btn--primary" id="ceNew" title="Neue Karte anlegen">+ Neu</button>
    </div>
    <p class="ce-list__count" id="ceListCount">Lädt…</p>
    <div class="ce-list__scroll" id="ceListScroll"></div>
  </aside>

  <section class="ce-detail">
    <div class="ce-detail__head" id="ceDetailHead">Keine Karte gewählt</div>
    <div class="ce-panels">
      <!-- Die id sitzt am inneren, scrollenden Kasten: renderDetail/renderPlaces schreiben per
           innerHTML hinein, und ein Spaltentitel darin waere beim ersten Render weg. Als Geschwister
           davor ueberlebt er jedes Neuzeichnen. Delegierte Listener und die
           querySelectorAll("#ceStammBody [data-cm-field]")-Sammlung greifen unveraendert. -->
      <div class="ce-panel ce-panel--stamm">
        <h2 class="ce-coltitle">Stammdaten</h2>
        <div class="ce-panel__scroll" id="ceStammBody">
          <p class="ce-placeholder">Links eine Karte wählen oder „+ Neu“.</p>
        </div>
      </div>
      <div class="ce-panel ce-panel--orte">
        <h2 class="ce-coltitle">Orte <span class="ce-coltitle__count" id="ceOrteCount"></span></h2>
        <div class="ce-panel__scroll" id="ceOrteBody">
          <p class="ce-placeholder">—</p>
        </div>
      </div>
    </div>
    <!-- Order copied from the adventure editor's savebar: status LEFT, actions bottom-RIGHT, primary
         last (owner 2026-07-17: "speichern und verwerfen an derselben stelle im footer, unten rechts").
         The status keeps its own slot on the left rather than riding along after the buttons -- it must
         stay readable while the buttons move. -->
    <div class="ce-savebar" id="ceSaveBar" hidden>
      <span class="ce-savebar__state" id="ceSaveState"></span>
      <button class="btn btn--danger" id="ceDelete" hidden title="Diese Karte endgültig löschen (mit Rückfrage)">Löschen</button>
      <span class="ce-savebar__spacer"></span>
      <button class="btn" id="ceDiscard">Verwerfen</button>
      <button class="btn btn--primary" id="ceSave">Speichern</button>
    </div>
  </section>
</div>

<script>
  const CITYMAP_EDIT_API = "/api/edit/map/citymaps.php";
  const CITYMAP_IMAGE_API = "/api/edit/map/citymap-image.php";

  // Mirrors of the ONE server-side definition (api/_internal/app/citymaps.php). The slugs are domain
  // content and must match byte for byte; the labels are German UI. There is no way to derive one from
  // the other at runtime without an extra endpoint, so this is a mirror — but a mirror of a single
  // source, not a fourth independent list (the settlement-image licences are hardcoded in three places
  // with nothing keeping them in sync; that is what §3.3 exists to avoid).
  const LICENSES = [
    { value: "public_domain", label: "Public Domain", free: true },
    { value: "cc0", label: "CC0", free: true },
    { value: "ai_generated", label: "Von uns KI-generiert", free: true },
    { value: "permission_granted", label: "Genehmigung erteilt", free: true },
    { value: "unknown_other", label: "Unbekannt/Sonstiges (nicht öffentlich)", free: false },
  ];
  const TYPE_KEYS = [
    ["ortsplan", "Ortsplan"], ["stadtplan", "Stadtplan"], ["bezirk", "Bezirk"], ["viertel", "Viertel"],
    ["lageplan", "Lageplan"], ["uebersicht", "Übersicht"], ["schauplatz", "Schauplatz"], ["grundriss", "Grundriss"],
    ["befestigungen", "Befestigungen"], ["dungeon", "Dungeon"], ["hoehlen", "Höhlen"], ["krypten", "Krypten"],
    ["katakomben", "Katakomben"], ["schatzkarte", "Schatzkarte"], ["region", "Region"], ["sonstige", "Sonstige"],
  ];
  const ARTS = [["politisch", "Politisch"], ["derographisch", "Derographisch"], ["topologisch", "Topologisch"], ["skizze", "Skizze"]];
  const KIND_LABEL = { settlement: "Siedlung", territory: "Territorium", region: "Region", path: "Weg/Fluss", unresolved: "—" };
  const CE_THUMB_PH_SVG = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2z"/><path d="M9 4v14M15 6v14"/></svg>';

  function licenseIsFree(value) {
    const entry = LICENSES.find((l) => l.value === value);
    return !!(entry && entry.free);
  }

  // HTML escaper safe for BOTH text and (quoted) attribute context — values flow into template strings
  // like value="${ceEscape(v)}", so " and ' MUST be encoded too (a title containing a " would otherwise
  // break out of the attribute).
  function ceEscape(s) {
    return (s == null ? "" : String(s))
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;").replace(/`/g, "&#96;");
  }

  // Die eine Statuszeile unter dem Menueband (Spec §3.4). Sie traegt, was gerade LAEUFT -- Fortschritt,
  // Ergebnis, Fehler. Die zweite Zeile einer Kachel bleibt dagegen ihr Ruhezustand ("Dump: …",
  // "12 von 300 offen"): vorher schrieben beide in dieselbe Stelle, weshalb ein "Sync fehlgeschlagen"
  // in der Kachel stand und 1,5 s spaeter vom Auffrischen des Dump-Datums ueberschrieben wurde -- die
  // Fehlermeldung war weg, bevor sie jemand lesen konnte.
  function ceStatus(text, isError) {
    const el = document.getElementById("ceStatus");
    if (!el) return;
    el.textContent = text;
    el.className = isError ? "ce-status error" : "ce-status";
  }

  // POST helper — Gold-Contract envelope, surfaces error.message.
  async function citymapPost(body) {
    const response = await fetch(CITYMAP_EDIT_API, {
      method: "POST",
      credentials: "same-origin",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const payload = await response.json().catch(() => null);
    if (!response.ok || !payload || payload.ok !== true) {
      throw new Error((payload && payload.error && payload.error.message) || `HTTP ${response.status}`);
    }
    return payload;
  }

  // links = the working copy of the "Wo gibt es die Karte?" list (multi-link spec §6.2). Held in state
  // rather than read off the DOM on demand because ▲▼/✕ re-render the rows: whatever is typed must
  // survive that.
  //
  // foreignLinks = fundorte someone ELSE authored (community/wiki). They are kept in their own field, not
  // merged into `links`, because set_links posts `links` back without ids: anything in there is re-created
  // as 'manual' on save, so a foreign row would duplicate itself. The server already ships them apart
  // (avesmapsCitymapDetailForEdit) -- this just keeps the split.
  const state = { citymaps: [], selectedId: null, detail: null, enabled: true, previewsEnabled: true, dirty: false, links: [], foreignLinks: [] };

  // ---- list ----
  async function loadList(keepSelection) {
    try {
      const payload = await citymapPost({ action: "list" });
      state.citymaps = payload.citymaps || [];
      state.enabled = payload.citymaps_enabled !== false;
      state.previewsEnabled = payload.citymap_previews_enabled !== false;
      setEnabledToggleState();
      setPreviewsToggleState();
      renderList();
      if (!keepSelection || !state.citymaps.some((c) => c.public_id === state.selectedId)) {
        // The selected map is gone (another tab deleted it) -> drop the stale detail rather than
        // showing a form that saves into nothing.
        if (state.selectedId && !state.citymaps.some((c) => c.public_id === state.selectedId)) {
          state.selectedId = null;
          state.detail = null;
          renderDetail();
          renderPlaces();
        }
      }
    } catch (e) {
      document.getElementById("ceListCount").textContent = "Fehler: " + e.message;
    }
  }

  function citymapMatchesSearch(c) {
    const q = (document.getElementById("ceSearch").value || "").trim().toLowerCase();
    return !q || (c.title || "").toLowerCase().includes(q);
  }

  function renderList() {
    const rows = state.citymaps.filter(citymapMatchesSearch);
    document.getElementById("ceListCount").textContent = `${rows.length} von ${state.citymaps.length}`;
    document.getElementById("ceListScroll").innerHTML = rows.length ? rows.map((c) => {
      const draft = c.status !== "approved";
      // Provenance pill. 'manual' stays unlabelled -- it is the norm here, and a pill on every row
      // would be noise. Only the two origins the editor did NOT author announce themselves.
      const community = c.origin === "community"
        ? ` <span class="pill pill--community">Community</span>`
        : (c.origin === "wiki"
          ? ` <span class="pill pill--wiki" title="Aus dem Wiki-Dump übernommen. „Karten syncen“ aktualisiert diese Karte — sobald du sie bearbeitest, gehört sie dir und der Sync lässt sie in Ruhe.">Wiki</span>`
          : "");
      const thumb = c.thumb
        ? `<img src="${ceEscape(c.thumb)}" alt="" loading="lazy" onerror="this.replaceWith(document.createTextNode(''))">`
        : CE_THUMB_PH_SVG;
      const types = (c.types || []).length ? `<span class="pill pill--kind">${ceEscape((c.types || []).length)} Typ(en)</span> ` : "";
      return `<button class="ce-item${c.public_id === state.selectedId ? " is-selected" : ""}${draft ? " is-draft" : ""}" data-id="${ceEscape(c.public_id)}">
        <span class="ce-item__thumb">${thumb}</span>
        <span class="ce-item__text">
          <span class="ce-item__title">${ceEscape(c.title)}</span>
          <span class="ce-item__l2">${types}${c.place_count || 0} Orte${community}${draft ? ` <span class="pill pill--hidden">verborgen</span>` : ""}</span>
        </span></button>`;
    }).join("") : `<p class="ce-empty">Keine Karten.</p>`;
  }

  async function selectCitymap(publicId) {
    state.selectedId = publicId;
    state.dirty = false;
    renderList();
    try {
      state.detail = await citymapPost({ action: "detail", public_id: publicId });
    } catch (e) {
      document.getElementById("ceStammBody").innerHTML = `<p class="ce-placeholder" style="color:var(--color-danger)">Fehler: ${ceEscape(e.message)}</p>`;
      return;
    }
    renderDetail();
    renderPlaces();
  }

  function newCitymap() {
    state.selectedId = null;
    state.detail = null;
    state.dirty = false;
    renderList();
    renderDetail();
    renderPlaces();
  }

  // ---- detail ----
  function ceField(label, name, value, type) {
    return `<div class="ce-row"><span class="ce-row__label">${ceEscape(label)}</span>
      <input class="ce-input" data-cm-field="${name}" type="${type || "text"}" value="${ceEscape(value == null ? "" : value)}"></div>`;
  }

  // Same as ceField, plus a real hyperlink to the target (owner 2026-07-17: "hyperlinks im backend").
  // A URL you can only read and not follow makes you copy-paste it to check anything -- and checking is
  // the whole reason it is on screen. The ↗ is the house marker for off-site links (AGENTS.md §12).
  // Hidden while the field is empty, and kept in sync with what you type (see the input handler), so it
  // always opens what the box SAYS rather than what was last saved.
  function ceUrlField(label, name, value) {
    const v = value == null ? "" : String(value).trim();
    // Same http/https gate as the input handler below. The backend refuses other schemes
    // (avesmapsCitymapNormalizeUrl), but stored data is not a place to trust blindly -- and a
    // javascript:-URL behind a click is not a link.
    const safe = /^https?:\/\//i.test(v);
    return `<div class="ce-row"><span class="ce-row__label">${ceEscape(label)}</span>
      <input class="ce-input" data-cm-field="${name}" type="text" value="${ceEscape(v)}">
      <a class="ce-open" data-ce-open="${name}" href="${safe ? ceEscape(v) : "#"}" target="_blank" rel="noopener noreferrer"
         title="Link in neuem Tab öffnen"${safe ? "" : " hidden"}>↗</a></div>`;
  }

  // Tri-state control (Spec §3.1). A checkbox is deliberately NOT used: it has two states and this data
  // has three, and "unknown" silently becoming "nein" is the exact failure the NULLable column prevents.
  function ceTri(label, name, value) {
    const v = value == null ? "" : (value ? "1" : "0");
    return `<div class="ce-row"><span class="ce-row__label">${ceEscape(label)}</span>
      <select class="ce-select ce-tri" data-cm-field="${name}">
        <option value=""${v === "" ? " selected" : ""}>unbekannt</option>
        <option value="1"${v === "1" ? " selected" : ""}>ja</option>
        <option value="0"${v === "0" ? " selected" : ""}>nein</option>
      </select></div>`;
  }

  function ceSelect(label, name, value, options, placeholder) {
    return `<div class="ce-row"><span class="ce-row__label">${ceEscape(label)}</span>
      <select class="ce-select" data-cm-field="${name}">
        <option value="">${ceEscape(placeholder || "—")}</option>
        ${options.map(([v, l]) => `<option value="${ceEscape(v)}"${value === v ? " selected" : ""}>${ceEscape(l)}</option>`).join("")}
      </select></div>`;
  }

  // ---- „Wo gibt es die Karte?" (multi-link spec §6.2) ----
  // Eine Karte steckt oft an mehreren Stellen: gekauft im F-Shop, frei auf ihrer Wiki-Seite, gespiegelt bei
  // einem Fanprojekt. Der Leser soll sehen wo — und selbst wählen. Blattdaten ohne Wiki-Reconcile: die ganze
  // Liste wird als Array gespeichert (Action set_links), und die Reihenfolge IST die Array-Reihenfolge. ▲▼
  // ist deshalb ein reiner Array-Tausch ohne id-Jonglage. Vorlage: „Weitere Links" im Abenteuer-Editor.
  //
  // Die Felder heissen data-cl-field (NICHT data-cm-field): gatherStamm() sammelt alles mit [data-cm-field]
  // aus #ceStammBody ein, und ein Link-Feld darf dort nicht als citymap-Spalte mitfahren.
  function ceLinkRows() {
    if (!state.links.length) {
      return `<p class="ce-xlink__empty">Noch keine weiteren Fundorte.</p>`;
    }
    const head = `<div class="ce-xlink__head"><span></span><span>Fundort</span><span>URL</span><span>kostenpflichtig</span><span></span></div>`;
    return head + state.links.map((l, i) => `
      <div class="ce-xlink" data-cl-idx="${i}">
        <div class="ce-xlink__reorder">
          <button type="button" data-cl-act="up" title="hoch"${i === 0 ? " disabled" : ""}>▲</button>
          <button type="button" data-cl-act="down" title="runter"${i === state.links.length - 1 ? " disabled" : ""}>▼</button>
        </div>
        <input class="ce-input" data-cl-field="label" placeholder="z. B. „Wiki-Aventurica“" value="${ceEscape(l.label || "")}">
        <input class="ce-input" data-cl-field="url" placeholder="https://…" value="${ceEscape(l.url || "")}">
        <select class="ce-select" data-cl-field="is_paid">
          <option value=""${l.is_paid == null ? " selected" : ""}>unbekannt</option>
          <option value="1"${l.is_paid === true ? " selected" : ""}>ja</option>
          <option value="0"${l.is_paid === false ? " selected" : ""}>nein</option>
        </select>
        <button type="button" class="btn btn--icon btn--danger" data-cl-act="del" title="Fundort entfernen">✕</button>
      </div>`).join("");
  }
  // Fundorte, die NICHT von hier stammen: freigegebene Community-Meldungen und (kuenftig) der Wiki-Sync.
  // Nur lesbar, mit einem Unterdruecken-Knopf -- ohne diese Liste waeren sie fuer den Editor unsichtbar und
  // damit unentfernbar, waehrend der Leser sie sieht.
  //
  // Unterdruecken statt Loeschen entscheidet der Server (avesmapsSuppressCitymapLink): eine geloeschte
  // Wiki-Zeile graebt der naechste Sync wieder aus. Hier steht nur der Knopf.
  function ceForeignLinkRows() {
    if (!state.foreignLinks.length) {
      return "";
    }
    const ORIGIN_LABEL = { community: "Community", wiki: "Wiki" };
    return state.foreignLinks.map((l) => {
      const suppressed = l.status === "suppressed";
      const paid = l.is_paid === true ? "kostenpflichtig" : (l.is_paid === false ? "kostenlos" : "");
      return `<div class="ce-xlink__foreign${suppressed ? " is-suppressed" : ""}">
        <span class="ce-xlink__foreignmain"><a href="${ceEscape(l.url)}" target="_blank" rel="noopener noreferrer"
          title="${ceEscape(l.url)}">${ceEscape(l.label)} ↗</a>${paid ? ` <span class="ce-hint">· ${ceEscape(paid)}</span>` : ""}</span>
        <span class="pill pill--${l.origin === "wiki" ? "wiki" : "community"}">${ceEscape(ORIGIN_LABEL[l.origin] || l.origin)}</span>
        ${suppressed
          ? `<span class="ce-hint">unterdrückt</span>`
          : `<button type="button" class="btn btn--sm btn--danger" data-cl-suppress="${ceEscape(l.id)}">Unterdrücken</button>`}
      </div>`;
    }).join("");
  }

  function ceLinksGroup() {
    return `<div class="ce-grp"><p class="ce-grp__title">Wo gibt es die Karte?</p>
      <p class="ce-xlink__hint">Zusätzlich zum Karten-Link oben: überall sonst, wo dieselbe Karte zu finden ist —
        Shop-Seite, Wiki-Seite, Fanprojekt. Der Leser sieht den Fundort und wählt selbst.
        „kostenpflichtig“ hängt an der ZEILE, nicht an der Karte: derselbe Band ist im Shop bezahlt und
        auf seiner Wiki-Seite frei. „unbekannt“ zeigt dem Leser gar nichts — nie ein erfundenes „frei“.
        Speichern über „Speichern“.</p>
      <div id="ceLinks">${ceLinkRows()}</div>
      <div class="ce-xlink__add"><button type="button" class="btn btn--sm" data-cl-act="add">+ Fundort</button></div>
      <div id="ceForeignLinks">${ceForeignLinkRows()}</div>
    </div>`;
  }
  // Nur die Zeilen neu zeichnen -- ein renderDetail() wuerde die ungespeicherten Stammdaten-Eingaben
  // daneben wegwerfen.
  function renderLinks() {
    const host = document.getElementById("ceLinks");
    if (host) host.innerHTML = ceLinkRows();
    const foreign = document.getElementById("ceForeignLinks");
    if (foreign) foreign.innerHTML = ceForeignLinkRows();
  }
  // Wirkt sofort, ohne „Speichern": diese Zeilen gehoeren dem Melder bzw. dem Sync, nicht der set_links-
  // Liste. Danach das Detail neu laden -- der Server entscheidet, ob die Zeile zum Tombstone wurde oder
  // wirklich verschwand, und diese Antwort raten wir nicht.
  async function suppressForeignLink(linkId) {
    if (!linkId) return;
    try {
      await citymapPost({ action: "suppress_link", link_id: linkId });
      await selectCitymap(state.selectedId);
    } catch (e) {
      const stateEl = document.getElementById("ceSaveState");
      if (stateEl) {
        stateEl.textContent = "Fehler: " + e.message;
        stateEl.className = "ce-savebar__state error";
      }
    }
  }

  // Getipptes aus den Inputs zurueck in den State holen. Muss VOR jedem Re-Render und vor dem Speichern
  // laufen, sonst verliert ein ▲ die gerade eingegebene URL.
  function ceSyncLinksFromDom() {
    document.querySelectorAll("#ceLinks [data-cl-idx]").forEach((row) => {
      const link = state.links[Number(row.dataset.clIdx)];
      if (!link) return;
      const label = row.querySelector('[data-cl-field="label"]');
      const url = row.querySelector('[data-cl-field="url"]');
      const paid = row.querySelector('[data-cl-field="is_paid"]');
      if (label) link.label = label.value;
      if (url) link.url = url.value;
      // "" is UNKNOWN and must stay null -- the tri-state rule this whole feature turns on (§3.1).
      if (paid) link.is_paid = paid.value === "" ? null : paid.value === "1";
    });
  }

  // One image COLUMN: preview + actions on top, properties below a divider (owner layout, 2026-07-16).
  // The two columns sit side by side in .ce-imgcols and stack below ~260px.
  //
  // The upload control appears only for a FREE licence (§3.3) — and it gates on the SAVED licence, not on
  // whatever the select currently shows: uploading against an unsaved choice would store a file the server
  // then hides, which looks like a broken upload.
  function ceImageGroup(slot, title, v) {
    const isThumb = slot === "thumb";
    const licenseField = isThumb ? "thumb_license" : "map_license";
    const noteField = isThumb ? "thumb_license_note" : "map_license_note";
    const localUrl = (isThumb ? v.thumb_local_url : v.map_local_url) || "";
    // The Autoget crawl is EDITOR-ONLY (owner decision): it stands in as the preview here so an
    // unclassified map is recognisable, but api/app/citymaps.php never selects it. Our own upload wins.
    const autoUrl = isThumb ? (v.thumb_auto_url || "") : "";
    const shownUrl = localUrl || autoUrl;
    const isAuto = !localUrl && !!autoUrl;
    const savedLicense = v[licenseField] || "unknown_other";
    const free = licenseIsFree(savedLicense);
    const savedLicenseLabel = (LICENSES.find((l) => l.value === savedLicense) || {}).label || savedLicense;

    const preview = shownUrl
      ? `<img src="${ceEscape(shownUrl)}" alt="" onerror="this.replaceWith(document.createTextNode(''))">`
      : CE_THUMB_PH_SVG;
    const uploadBtn = free
      ? `<label class="btn btn--sm" for="ceFile_${slot}" style="cursor:pointer">Hochladen…</label>
         <input type="file" id="ceFile_${slot}" accept="image/png,image/jpeg,image/webp,image/gif" hidden>`
      : "";
    // Autoget needs a page to crawl; without a Karten-Link there is nothing to look at.
    const autoBtn = isThumb
      ? `<button type="button" class="btn btn--sm" data-ce-autoget="1"${v.map_url ? "" : " disabled"} title="Sucht auf der Seite des Karten-Links ein Vorschaubild (og:image). Bleibt im Editor — es ist fremdes Bildmaterial und erscheint nie öffentlich.">⤓ Autoget</button>`
      : "";
    const deleteBtn = localUrl
      ? `<button type="button" class="btn btn--sm btn--danger" data-ce-img-delete="${slot}">Entfernen</button>`
      : (isAuto ? `<button type="button" class="btn btn--sm btn--danger" data-ce-img-delete="thumb_auto">Entfernen</button>` : "");

    const originLine = isAuto
      ? `<span class="pill pill--auto" title="Von der Karten-Link-Seite geholt. Verlässt den Editor nie.">Autoget · nur intern</span>`
      : (localUrl ? `<span class="pill pill--manual">eigener Upload</span>` : `<span class="ce-hint">kein eigenes Bild</span>`);

    return `<div class="ce-imgcol"><p class="ce-grp__title">${ceEscape(title)}</p>
      <div class="ce-imgcol__preview">${preview}</div>
      <div class="ce-imgcol__origin">${originLine}</div>
      <div class="ce-img__btns">${autoBtn}${uploadBtn}${deleteBtn}</div>
      <div class="ce-img__state" id="ceImgState_${slot}"></div>
      <div class="ce-imgcol__props">
        ${ceSelect("Lizenz", licenseField, savedLicense, LICENSES.map((l) => [l.value, l.label]), "—")}
        ${ceField("Notiz (intern)", noteField, v[noteField])}
        ${free ? "" : `<p class="ce-warn">Upload erst bei freier Lizenz (aktuell: ${ceEscape(savedLicenseLabel)}). Lizenz setzen und speichern.</p>`}
        <p class="ce-hint">${isThumb
          ? "Die Notiz verlässt den Editor nie. Nur eine freie Lizenz zeigt die Vorschau öffentlich."
          : "Der externe Karten-Link wird immer angezeigt — nur das eigene Bild hängt an der Lizenz."}</p>
      </div>
    </div>`;
  }

  function renderDetail() {
    const head = document.getElementById("ceDetailHead");
    const body = document.getElementById("ceStammBody");
    document.getElementById("ceSaveBar").hidden = false;
    // "Löschen" only for an existing map -- a brand-new, unsaved one has nothing to delete yet.
    document.getElementById("ceDelete").hidden = !state.selectedId;
    // Fresh working copy per render -- never the server objects themselves, so an abandoned edit cannot
    // leak into state.detail. A new map has none, and clearing here is what stops the previously opened
    // map's links from riding along into it.
    state.links = ((state.detail && state.detail.links) || []).map((l) => ({
      label: l.label || "", url: l.url || "", is_paid: l.is_paid == null ? null : !!l.is_paid,
    }));
    // Fremde Fundorte: NICHT in state.links mischen (siehe den Kommentar am State). Sie werden nur
    // gelesen, deshalb reicht die Serverliste unveraendert -- es gibt nichts, was ein Re-Render verlieren
    // koennte.
    state.foreignLinks = (state.detail && state.detail.foreign_links) || [];
    if (!state.detail) {
      head.textContent = "Neue Karte";
      body.innerHTML = `<div class="ce-grp"><p class="ce-grp__title">Identität</p>
        ${ceField("Titel *", "title", "")}
        ${ceUrlField("Karten-Link (extern) *", "map_url", "")}
        <p class="ce-hint">Titel und Quelle sind Pflicht, alles andere optional. Nicht Erfasstes bleibt „unbekannt“ und wird dem Leser gar nicht erst gezeigt.</p>
      </div>`;
      setOrteCount("");
      document.getElementById("ceOrteBody").innerHTML = `<p class="ce-placeholder">Erst speichern, dann Orte zuordnen.</p>`;
      return;
    }
    const v = state.detail.citymap;
    const types = state.detail.types || [];
    head.textContent = v.title;
    const parentOptions = state.citymaps
      .filter((c) => c.public_id !== v.public_id)
      .map((c) => [c.public_id, c.title]);
    body.innerHTML =
      `<div class="ce-grp"><p class="ce-grp__title">Identität</p>
        ${ceField("Titel *", "title", v.title)}
        ${ceUrlField("Karten-Link (extern) *", "map_url", v.map_url)}
        ${ceField("Linktext", "map_url_label", v.map_url_label)}
        ${ceField("Urheber", "author", v.author)}
        ${ceField("Verlag", "publisher", v.publisher)}
        <p class="ce-hint">„Urheber“ ist, wer die Karte gezeichnet hat (Ina Kramer). „Verlag“ ist, wer den Band gedruckt hat (Ulisses, Fanpro, Schmidt Spiele) — im Wiki die Zeile „Erschienen bei“. Der Sync holt ihn von der Buchseite.</p>
        ${ceField("Notiz", "note", v.note)}
        ${ceSelect("Übergeordnete Karte", "parent_public_id", v.parent_public_id, parentOptions, "— keine —")}
        ${ceSelect("Sichtbarkeit", "status", v.status, [["approved", "sichtbar"], ["suppressed", "verborgen"]], "sichtbar")}
      </div>` +
      // Autoget liest den Karten-Link aus der Gruppe DARUEBER (siehe den Knopf in ceImageGroup): die
      // Reihenfolge ist die Erklaerung. Stand dieser Kasten oben, war die Kausalitaet unsichtbar.
      `<div class="ce-imgcols">` + ceImageGroup("thumb", "Vorschaubild", v) + ceImageGroup("map", "Karte (eigenes Bild)", v) + `</div>` +
      `${ceLinksGroup()}
      <div class="ce-grp"><p class="ce-grp__title">Einordnung</p>
        ${ceSelect("Art", "art", v.art, ARTS, "— unbekannt —")}
        ${ceField("Gültig ab (BF)", "valid_from_bf", v.valid_from_bf, "number")}
        ${ceField("Gültig bis (BF)", "valid_to_bf", v.valid_to_bf, "number")}
        ${ceField("Format", "format", v.format)}
        ${ceField("Breite (px)", "width_px", v.width_px, "number")}
        ${ceField("Höhe (px)", "height_px", v.height_px, "number")}
        <p class="ce-hint">Breite/Höhe füllen sich beim Karten-Upload von selbst.</p>
        <p class="ce-hint">„Format“ ist die Größe des gedruckten Blatts, wie das Wiki sie schreibt: „A2“ oder „33,5x25,5“. Das ist kein Zahlenfeld — Breite/Höhe sind Pixel eines Scans, das Wiki nennt Zentimeter.</p>
      </div>
      <div class="ce-grp"><p class="ce-grp__title">Eigenschaften</p>
        ${ceTri("farbig", "is_color", v.is_color)}
        ${ceTri("mehrstöckig", "is_multilevel", v.is_multilevel)}
        ${ceTri("beschriftet (Legende)", "is_labeled", v.is_labeled)}
        ${ceTri("offiziell", "is_official", v.is_official)}
        ${ceTri("Spoiler (Spielinhalte)", "is_spoiler", v.is_spoiler)}
        ${ceTri("kostenpflichtig", "is_paid", v.is_paid)}
        ${ceTri("mit Maßstab", "has_scale", v.has_scale)}
        <p class="ce-hint">„unbekannt“ ist eine gültige Antwort und keine Lücke: der Leser sieht die Eigenschaft dann gar nicht, statt ein erfundenes „nein“.</p>
        <p class="ce-hint">„mit Maßstab“ ist eine Ja/Nein-Frage, weil die Wiki-Spalte „Maßstab“ genau das enthält. Wo ein Maßstab ausgeschrieben dasteht („1:12.750.000“), steht er zusätzlich in der Notiz — er sagt mehr als ein „ja“.</p>
      </div>
      <div class="ce-grp"><p class="ce-grp__title">Typ (Mehrfachauswahl)</p>
        <div class="ce-types">${TYPE_KEYS.map(([k, l]) =>
          `<label><input type="checkbox" data-ce-type="${ceEscape(k)}"${types.includes(k) ? " checked" : ""}> ${ceEscape(l)}</label>`).join("")}</div>
      </div>
      `;

    // "Verwandte Karten" is HIDDEN here (owner 2026-07-17: "das ist zu viel und brauchen wir gerade
    // nicht"). It rendered one checkbox per OTHER map -- fine at a dozen maps, unusable once the wiki
    // sync brought 419: a wall of hundreds of checkboxes between you and everything below it.
    //
    // HIDDEN, NOT REMOVED. citymap_related, its set_related endpoint and the reader-side display are
    // untouched, so existing links keep working and nothing needs migrating. To bring it back, restore
    // this block AND the set_related call in saveStamm() -- they belong together, see the note there.

    // Upload inputs are created by innerHTML -> wire them after the body is in the DOM.
    ["thumb", "map"].forEach((slot) => {
      const input = document.getElementById("ceFile_" + slot);
      if (input) input.addEventListener("change", () => uploadImage(slot, input));
    });
  }

  // gatherStamm sweeps [data-cm-field] out of #ceStammBody. The prefix is load-bearing: a bare
  // data-field would let any future control in this panel ride along as a citymap column.
  function gatherStamm() {
    const out = {};
    document.querySelectorAll("#ceStammBody [data-cm-field]").forEach((el) => {
      out[el.getAttribute("data-cm-field")] = el.value;
    });
    return out;
  }

  async function saveStamm() {
    const stateEl = document.getElementById("ceSaveState");
    ceSyncLinksFromDom(); // whatever is typed but not yet ▲▼'d back into state would be lost otherwise
    const values = gatherStamm();
    if (!(values.title || "").trim()) {
      stateEl.textContent = "Ein Titel ist erforderlich.";
      stateEl.className = "ce-savebar__state error";
      return;
    }
    stateEl.className = "ce-savebar__state";
    stateEl.textContent = "Speichert …";
    try {
      const citymap = Object.assign({}, values);
      if (state.selectedId) citymap.public_id = state.selectedId;
      const saved = await citymapPost({ action: "upsert_citymap", citymap });
      // Types are their own whole-list action; only send them for an existing map (a fresh one has no
      // controls rendered yet).
      //
      // NO set_related HERE, and that is load-bearing, not an oversight: set_related REPLACES the whole
      // list, and with the "Verwandte Karten" checkboxes hidden (see renderStamm) the querySelectorAll
      // would find nothing and send an empty list -- silently wiping every existing link on the next
      // save. Hiding the UI and dropping this call belong together; restore both or neither.
      if (state.detail) {
        const types = Array.prototype.map.call(document.querySelectorAll("[data-ce-type]:checked"), (el) => el.getAttribute("data-ce-type"));
        await citymapPost({ action: "set_types", public_id: saved.public_id, types });
        // Same whole-list contract as set_types, and AFTER the upsert: set_links addresses the map by
        // public_id. An empty array legitimately clears the list. Unlike set_related this call is safe to
        // make unconditionally, because the controls it reads are RENDERED whenever state.detail is set --
        // it can therefore never mistake "no UI" for "no links".
        await citymapPost({ action: "set_links", public_id: saved.public_id, links: state.links });
      }
      state.dirty = false;
      stateEl.textContent = "Gespeichert.";
      // Close on save (owner 2026-07-17: "beim speichern zugehen"). NOT before this point: an error
      // above must leave the dialog open with its message, or the edit vanishes with no explanation.
      //
      // The confirmation moves to a toast in the PARENT window, because "Gespeichert." in a savebar
      // that is about to disappear is a message nobody can read. Failing that (editor opened
      // standalone), fall back to reloading the list in place -- the old behaviour.
      closeAfterSave("Karte gespeichert.");
    } catch (e) {
      stateEl.textContent = "Fehler: " + e.message;
      stateEl.className = "ce-savebar__state error";
    }
  }

  // The parent window IF this page runs inside the editor overlay -- null when it is open standalone
  // (/html/citymap-editor.html), where there is no overlay to close. Both "Speichern" and "Verwerfen"
  // ask through here.
  function ceParentOverlay() {
    let parentWindow;
    try { parentWindow = window.parent; } catch (e) { return null; }
    if (!parentWindow || parentWindow === window || typeof parentWindow.closeAvesmapsCitymapEditorOverlay !== "function") {
      return null;
    }
    return parentWindow;
  }

  // Close the surrounding overlay and report through the parent's toast. Returns false when there is
  // no parent to close (standalone /html/citymap-editor.html), so the caller can stay put.
  function closeAfterSave(message) {
    const parentWindow = ceParentOverlay();
    if (!parentWindow) {
      void loadList(true); // standalone: no overlay to close, so at least refresh the list
      return false;
    }
    if (typeof parentWindow.showFeedbackToast === "function") {
      parentWindow.showFeedbackToast(message, "success");
    }
    parentWindow.closeAvesmapsCitymapEditorOverlay();
    return true;
  }

  // ---- images ----
  function imgState(slot, text, isError) {
    const el = document.getElementById("ceImgState_" + slot);
    if (el) { el.textContent = text; el.className = "ce-img__state" + (isError ? " error" : ""); }
  }

  async function imagePost(formData) {
    // No Content-Type header: the browser must set the multipart boundary itself.
    const res = await fetch(CITYMAP_IMAGE_API, { method: "POST", credentials: "same-origin", body: formData });
    const payload = await res.json().catch(() => null);
    if (!res.ok || !payload || payload.ok !== true) {
      throw new Error((payload && payload.error && payload.error.message) || `HTTP ${res.status}`);
    }
    return payload;
  }

  async function uploadImage(slot, input) {
    if (!state.selectedId) { imgState(slot, "Bitte zuerst die Karte speichern.", true); input.value = ""; return; }
    const file = input.files && input.files[0];
    if (!file) return;
    imgState(slot, "Wird hochgeladen …", false);
    try {
      const fd = new FormData();
      fd.append("public_id", state.selectedId);
      fd.append("slot", slot);
      fd.append("image", file);
      await imagePost(fd);
      await selectCitymap(state.selectedId);
    } catch (e) {
      imgState(slot, "Fehler: " + e.message, true);
    } finally {
      input.value = "";
    }
  }

  async function deleteImage(slot) {
    if (!state.selectedId) return;
    // The Autoget preview lives in its own column, so it deletes under its own slot -- the status line is
    // still the thumb's, that is the box the editor is looking at.
    const stateSlot = slot === "thumb_auto" ? "thumb" : slot;
    imgState(stateSlot, "Wird entfernt …", false);
    try {
      const fd = new FormData();
      fd.append("public_id", state.selectedId);
      fd.append("slot", slot);
      fd.append("mode", "delete");
      await imagePost(fd);
      await selectCitymap(state.selectedId);
    } catch (e) {
      imgState(stateSlot, "Fehler: " + e.message, true);
    }
  }

  // Autoget: the server crawls the map's own page (map_url, read from the DB — never sent from here) for
  // an og:image and stores it as the EDITOR-ONLY preview. It is somebody else's picture, so it never
  // reaches the public payload regardless of the licence set here.
  async function autogetThumb() {
    if (!state.selectedId) { imgState("thumb", "Bitte zuerst die Karte speichern.", true); return; }
    imgState("thumb", "Sucht ein Vorschaubild auf der Karten-Seite …", false);
    try {
      const fd = new FormData();
      fd.append("public_id", state.selectedId);
      fd.append("slot", "thumb");
      fd.append("mode", "autoget");
      const payload = await imagePost(fd);
      await selectCitymap(state.selectedId);
      // selectCitymap re-rendered the body, so the status node is a new one -> set it afterwards.
      imgState("thumb", payload.source ? "Gefunden: " + payload.source : "Vorschaubild geholt.", false);
    } catch (e) {
      imgState("thumb", "Fehler: " + e.message, true);
    }
  }

  // ---- places ----
  function placeRow(p, isFirst, isLast) {
    const kind = p.target_kind || "unresolved";
    const hidden = p.status !== "approved";
    const resolved = kind === "unresolved"
      ? `<span class="pill pill--unresolved">nicht aufgelöst</span> Rohname bleibt erhalten`
      : `→ ${ceEscape(KIND_LABEL[kind] || kind)}${p.target_wiki_key ? ` <code>${ceEscape(p.target_wiki_key)}</code>` : ` <span class="pill pill--nowiki" title="Dieser Ort ist ein Karteneintrag ohne Wiki-Verknüpfung — völlig in Ordnung.">ohne Wiki-Eintrag</span>`}`;
    // Three origins, three labels. The old two-way ternary would have labelled a wiki place "manuell"
    // -- wrong, and exactly the kind of quiet lie that makes an editor distrust the whole column.
    const origin = p.origin === "community"
      ? `<span class="pill pill--community">Community</span>`
      : (p.origin === "wiki"
        ? `<span class="pill pill--wiki" title="Aus dem Wiki-Dump. Wird vom Karten-Sync gepflegt.">Wiki</span>`
        : `<span class="pill pill--manual">manuell</span>`);
    return `<div class="ce-place${hidden ? " is-hidden" : ""}" data-place-id="${p.id}">
      <div class="ce-place__order"><span>${p.sort_order}</span>
        <div class="ce-place__reorder">
          <button data-act="up" title="hoch"${isFirst ? " disabled" : ""}>▲</button>
          <button data-act="down" title="runter"${isLast ? " disabled" : ""}>▼</button></div></div>
      <div>
        <div class="ce-place__name">${ceEscape(p.raw_name)}</div>
        <div class="ce-place__resolved">${resolved}</div>
        <div class="ce-place__badges">${origin}${hidden ? ` <span class="pill pill--hidden">unterdrückt</span>` : ""}</div></div>
      <div class="ce-place__ctl">
        ${kind === "unresolved" ? `<button class="btn btn--sm" data-act="resolve" title="Erneut auflösen">↻</button>` : ""}
        <button class="btn btn--icon btn--danger" data-act="suppress" title="Entfernen">✕</button></div></div>`;
  }

  // Der Zaehler sitzt im Spaltentitel, nicht mehr in einer eigenen Ueberschrift im Inhalt: sonst
  // stuenden "Orte" (Spaltentitel) und "Orte (3)" (Gruppentitel) unmittelbar uebereinander.
  function setOrteCount(text) {
    const el = document.getElementById("ceOrteCount");
    if (el) el.textContent = text;
  }

  function renderPlaces() {
    const body = document.getElementById("ceOrteBody");
    if (!state.detail) {
      setOrteCount("");
      body.innerHTML = `<p class="ce-placeholder">Erst speichern, dann Orte zuordnen.</p>`;
      return;
    }
    const approved = (state.detail.places || []).filter((p) => p.status === "approved");
    const suppressed = (state.detail.places || []).filter((p) => p.status !== "approved");
    setOrteCount(`(${approved.length})`);
    body.innerHTML = `
      ${approved.map((p, i) => placeRow(p, i === 0, i === approved.length - 1)).join("") || `<p class="ce-placeholder">Noch kein Ort zugeordnet.</p>`}
      ${suppressed.length ? `<details style="margin-top:var(--space-8)"><summary class="ce-hint">${suppressed.length} unterdrückt</summary>${suppressed.map((p) => placeRow(p, true, true)).join("")}</details>` : ""}
      <div class="ce-add">
        <input class="ce-input" id="ceAddName" autocomplete="off" placeholder="Ort suchen oder Namen eingeben …">
        <button class="btn btn--primary" data-act="add">+ Ort</button>
        <div class="ce-ac" id="ceAc" hidden></div></div>
      <p class="ce-hint" style="margin-top:var(--space-8)">Eine Karte kann an Siedlung, Territorium, Region und Weg hängen. Territorien wirken auf den ganzen Unterbaum.</p>`;
  }

  async function reloadDetail() {
    if (!state.selectedId) return;
    state.detail = await citymapPost({ action: "detail", public_id: state.selectedId });
    renderPlaces();
    await loadList(true);
  }

  // ---- Ort autocomplete (docs/abenteuer-editor-p3-autocomplete.md, Approach A) ----
  let acItems = [], acActive = -1, acQuery = "", acTimer = null, acAbort = null;

  function hideAc() {
    const ac = document.getElementById("ceAc");
    if (ac) ac.hidden = true;
    acActive = -1;
  }

  function renderAc() {
    const ac = document.getElementById("ceAc");
    if (!ac) return;
    const rows = acItems.map((it, idx) =>
      `<div class="ce-ac__item${idx === acActive ? " is-active" : ""}" data-act="ac-pick" data-idx="${idx}">
        <span>${ceEscape(it.name)}</span>
        <span class="pill pill--kind">${ceEscape(it.type_label || it.feature_subtype || "")}</span></div>`).join("");
    ac.innerHTML = rows + `<div class="ce-ac__item ce-ac__free${acActive === -1 ? " is-active" : ""}" data-act="ac-free">
        <span>„<b>${ceEscape(acQuery)}</b>“ als freien Ort hinzufügen</span><span class="pill">Freitext</span></div>`;
    ac.hidden = false;
  }

  async function runAcSearch(q) {
    if (acAbort) acAbort.abort();
    acAbort = new AbortController();
    try {
      const r = await fetch("/api/app/map-search.php?limit=8&q=" + encodeURIComponent(q), { credentials: "same-origin", signal: acAbort.signal });
      const j = await r.json().catch(() => null);
      acItems = (j && j.ok === true ? (j.results || []) : []).filter((x) => x.kind !== "powerline").slice(0, 8);
    } catch (e) { if (e && e.name === "AbortError") return; acItems = []; }
    acActive = acItems.length ? 0 : -1;
    renderAc();
  }

  // Map a map-search hit to a citymap target_kind (powerlines are filtered out upstream).
  // EVERY label subtype is a landscape ("region" here), not just the one literally named "region":
  // the subtype is the landscape category (gebirge, wald, kontinent, ... -- 19 of them), so pinning it
  // to "region" dropped Regengebirge and Aventurien back into the name-resolution fallback, where the
  // server filtered them out too and they stayed unresolved forever (owner report 2026-07-17).
  function mapSearchKind(it) {
    if (it.kind === "location") return "settlement";
    if (it.kind === "region" && it.feature_subtype === "political_territory") return "territory";
    if (it.kind === "label") return "region";
    if (it.kind === "path") return "path";
    return "";
  }

  async function addPlaceRaw(raw) {
    raw = (raw || "").trim();
    hideAc();
    if (!raw || !state.selectedId) return;
    try {
      // add_place resolves server-side in the same call (it also fills the territory path), so there is
      // no follow-up resolve here.
      await citymapPost({ action: "add_place", citymap_public_id: state.selectedId, place: { raw_name: raw } });
      await reloadDetail();
      const inp = document.getElementById("ceAddName");
      if (inp) { inp.value = ""; inp.focus(); }
    } catch (err) { alert("Fehler: " + err.message); }
  }

  // Approach A: a picked suggestion is an EXACT entity -> store target_kind + target_public_id directly
  // (the backend backfills wiki_key + territory_path from the id). No name resolution -> works even for
  // non-wiki-linked entities. Unknown kind / no id -> fall back to the name flow.
  async function addPickedItem(item) {
    hideAc();
    if (!state.selectedId || !item) return;
    const kind = mapSearchKind(item);
    if (!kind || !item.public_id) { addPlaceRaw(item.name); return; }
    try {
      await citymapPost({ action: "add_place", citymap_public_id: state.selectedId,
        place: { raw_name: item.name, target_kind: kind, target_public_id: item.public_id } });
      await reloadDetail();
      const inp = document.getElementById("ceAddName");
      if (inp) { inp.value = ""; inp.focus(); }
    } catch (err) { alert("Fehler: " + err.message); }
  }

  // ---- kill switch ----
  function setEnabledToggleState() {
    const label = document.getElementById("ceEnabledLabel");
    if (label) label.textContent = state.enabled ? "Kartensammlung: AN" : "Kartensammlung: AUS";
  }

  async function toggleEnabled() {
    const next = !state.enabled;
    try {
      await citymapPost({ action: "set_citymaps_enabled", enabled: next });
      state.enabled = next;
      setEnabledToggleState();
    } catch (e) { alert("Fehler: " + e.message); }
  }

  // The narrower switch: preview PICTURES only. Off leaves the maps and their links alone but takes every
  // cover -- and the "© Ulisses Spiele" credit with it -- off the public side. Separate from the whole-
  // collection switch above and from the adventures' cover switch, because the Ulisses permission holds
  // "nur bis auf Widerruf" (NOTICE.md) and a revocation should be answerable per surface.
  function setPreviewsToggleState() {
    const label = document.getElementById("cePreviewsLabel");
    if (label) label.textContent = state.previewsEnabled ? "Vorschauen: AN" : "Vorschauen: AUS";
  }

  async function togglePreviews() {
    const next = !state.previewsEnabled;
    try {
      await citymapPost({ action: "set_citymap_previews_enabled", enabled: next });
      state.previewsEnabled = next;
      setPreviewsToggleState();
    } catch (e) { alert("Fehler: " + e.message); }
  }

  // ---- Wiki-Sync (citymaps) ----
  // Delegates to window.parent.startWikiSyncCitymapsSync() -- the SAME sync_citymaps client loop that
  // lives in js/review/review-wiki-sync.js, so there is exactly one sync_citymaps loop in the app, not
  // a second copy here. Mirrors handleAeSyncClick in html/adventure-editor.html. Requires a prior
  // "Dump holen" (WikiSync-Menüband) -- an empty staging catalog just yields 0 processed, which is why
  // the sub-label reports the STAGING state rather than a last-sync time: "nichts im Dump" and "sync
  // failed" must not look the same.
  let ceSyncRunning = false;

  function formatCitymapStagedText(raw) {
    const trimmed = String(raw || "").trim();
    if (trimmed === "") return "Kein Dump geholt";
    const parsed = new Date(trimmed.replace(" ", "T"));
    if (Number.isNaN(parsed.getTime())) return `Dump: ${trimmed}`;
    return `Dump: ${parsed.toLocaleString("de-DE", { dateStyle: "medium", timeStyle: "short" })}`;
  }

  // Read-only, no lock (the same GET the ribbon's synced-status refresh uses).
  async function refreshCeSyncedInfo() {
    const el = document.getElementById("ceSyncSub");
    if (!el) return;
    try {
      const url = new URL("/api/edit/wiki/dump.php", window.location.href);
      url.searchParams.set("action", "last_synced");
      url.searchParams.set("_", String(Date.now()));
      const res = await fetch(url.toString(), { method: "GET", credentials: "same-origin", cache: "no-store" });
      const payload = await res.json().catch(() => null);
      if (!res.ok || !payload || payload.ok !== true) throw new Error(`HTTP ${res.status}`);
      // citymap_staged, not citymap: this label answers "is there a dump to sync?", not "when did I
      // last sync?" -- the ribbon button shows the latter. See avesmapsWikiDumpSyncKindLastSynced.
      el.textContent = formatCitymapStagedText(payload.synced && payload.synced.citymap_staged);
    } catch (e) {
      el.textContent = "Dump-Status unbekannt";
    }
  }

  function setCeSyncBusy(isBusy) {
    ceSyncRunning = isBusy;
    const button = document.getElementById("ceSyncBtn");
    if (!button) return;
    button.disabled = isBusy;
    const label = button.querySelector(".t1");
    if (label) label.textContent = isBusy ? "Synchronisiert…" : "🚨 Karten syncen";
  }

  async function handleCeSyncClick() {
    if (ceSyncRunning) return;
    let parentWindow;
    try { parentWindow = window.parent; } catch (e) { parentWindow = null; }
    if (!parentWindow || parentWindow === window || typeof parentWindow.startWikiSyncCitymapsSync !== "function") {
      ceStatus("Syncen ist nur im eingebetteten Editor verfügbar.", true);
      return;
    }
    setCeSyncBusy(true);
    ceStatus("Karten werden übernommen …");
    try {
      await parentWindow.startWikiSyncCitymapsSync();
      ceStatus("Sync abgeschlossen.");
      await loadList(); // new/updated maps should show up in the left list right away
    } catch (e) {
      ceStatus("Sync fehlgeschlagen: " + (e && e.message ? e.message : String(e)), true);
    } finally {
      setCeSyncBusy(false);
      setTimeout(() => { void refreshCeSyncedInfo(); }, 1500);
    }
  }

  // ---- Link check (citymaps only) ----
  // Delegates to window.parent.startLinkCheck('citymap') -- the SAME loop the ribbon drives, so there is
  // exactly one link-check loop in the app. The scope keeps this button on map links: adventures and the
  // source catalogue have their own buttons in their own editors. Progress arrives through the callback
  // we hand in; polling would only queue behind the running step.
  let ceLinkCheckRunning = false;

  function setLinkCheckBusy(isBusy) {
    ceLinkCheckRunning = isBusy;
    const button = document.getElementById("ceLinkCheckBtn");
    if (!button) return;
    button.disabled = isBusy;
    const label = button.querySelector(".t1");
    if (label) label.textContent = isBusy ? "Prüft …" : "Links prüfen";
  }

  async function handleLinkCheckClick() {
    if (ceLinkCheckRunning) return;
    let parentWindow;
    try { parentWindow = window.parent; } catch (e) { parentWindow = null; }
    const statusEl = document.getElementById("ceLinkCheckSub");
    if (!parentWindow || parentWindow === window || typeof parentWindow.startLinkCheck !== "function") {
      ceStatus("Nur im eingebetteten Editor verfügbar.", true);
      return;
    }
    setLinkCheckBusy(true);
    ceStatus("Links werden geprüft …");
    try {
      // Fortschritt in die Statuszeile; die Kachel behaelt ihre Bilanz (sie ist der Ruhezustand
      // "wie steht es um die Links?" und hat sonst keinen Schreiber).
      const result = await parentWindow.startLinkCheck("citymap", (text) => {
        ceStatus(text);
      });
      // startLinkCheck returns NULL (it does not throw) when another scope's run is already in flight --
      // the guard is global on purpose. Say so instead of leaving the last progress line standing.
      if (!result) {
        ceStatus("Eine andere Prüfung läuft bereits.");
      } else if (result.status) {
        const bilanz = `${result.status.online} online · ${result.status.dead} tot · ${result.status.unchecked} unbekannt`;
        if (statusEl) statusEl.textContent = bilanz;
        ceStatus("Prüfung abgeschlossen: " + bilanz);
      }
    } catch (e) {
      ceStatus("Fehlgeschlagen: " + (e && e.message ? e.message : String(e)), true);
    } finally {
      setLinkCheckBusy(false);
    }
  }

  // ---- Preview autoget (all maps) ----
  // Delegates to window.parent.startCitymapAutoget -- the loop lives in the parent
  // (js/review/review-citymap-autoget.js) for the same reason the link check does: this editor is an
  // iframe, and the run must outlive its own status line. Progress arrives through the callback we hand
  // in; polling would only queue behind the running step.
  let ceAutogetRunning = false;

  function setAutogetBusy(isBusy) {
    ceAutogetRunning = isBusy;
    const button = document.getElementById("ceAutogetBtn");
