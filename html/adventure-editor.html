<script>
  /* Resolve light/dark exactly like the parent app (js/app/theme-toggle.js): an explicit saved choice
     wins, otherwise follow the browser/OS scheme (prefers-color-scheme). Runs before the stylesheet
     paints so this overlay iframe never flashes the wrong theme, and stays in sync if the OS scheme
     changes live while no explicit choice is stored. */
  (function () {
    function isDark() {
      var saved = null;
      try { saved = localStorage.getItem("avesmaps-theme"); } catch (e) {}
      if (saved === "dark") { return true; }
      if (saved === "light") { return false; }
      return !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
    }
    function apply() {
      if (isDark()) { document.documentElement.setAttribute("data-theme", "dark"); }
      else { document.documentElement.removeAttribute("data-theme"); }
    }
    apply();
    if (window.matchMedia) {
      var mq = window.matchMedia("(prefers-color-scheme: dark)");
      if (mq.addEventListener) { mq.addEventListener("change", apply); }
      else if (mq.addListener) { mq.addListener(apply); }
    }
  })();
</script>
<!-- Self-contained editor page (Phase 3 / P2), loaded as an iframe overlay via
     openAvesmapsAdventureEditorOverlay() with ?v=Date.now() (no ASSET_VERSION). Links the REAL design
     tokens so the warm/aventurian language is authentic — no hardcoded hex/radius/spacing, no blue. Pure
     client on the LIVE P1 endpoints (POST /api/edit/map/adventures.php). Layout C: Liste | Stammdaten | Orte. -->
<link rel="stylesheet" href="/css/base/fonts.css">
<link rel="stylesheet" href="/css/base/tokens.css">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font: var(--font-size-body)/var(--leading-normal) var(--font-ui);
    color: var(--color-text);
    background: var(--color-panel);
    display: flex; flex-direction: column;
  }

  /* ---- shell ---------------------------------------------------------------------------------- */
  .ae-header {
    flex: 0 0 auto; display: flex; align-items: center; gap: var(--space-10);
    padding: var(--space-10) var(--space-16);
    background: var(--color-panel-soft); border-bottom: 1px solid var(--color-border);
  }
  .ae-header__spacer { flex: 1 1 auto; }
  /* Zweizeiliger Button (Label + kleine Statuszeile) wie #seSyncen im Siedlungseditor -- gleiches
     Muster, hier aber ueber die echten Tokens statt hartkodierter Hex-Werte (kein eigenes :root noetig,
     diese Seite bindet tokens.css bereits direkt ein). Der Dialog-Rahmen zeigt den Editor-Titel schon
     im H2 der Ueberschrift (siehe openAvesmapsAdventureEditorOverlay) -- ein zweiter H1 hier waere doppelt.
     Gilt fuer beide Header-Buttons: Sync (primary) UND den Cover-Kill-Switch (soft, .is-off = Warnung). */
  .ae-btn2 {
    display: flex; flex-direction: column; align-items: flex-start; text-align: left;
    gap: 1px; line-height: var(--leading-tight); font: inherit; cursor: pointer;
    border-radius: var(--radius-md); padding: var(--space-4) var(--space-12);
    background: var(--color-button-soft); color: var(--color-button-soft-text); border: 1px solid var(--color-button-soft-border);
  }
  .ae-btn2:hover { background: var(--color-button-soft-hover); }
  .ae-btn2:disabled { opacity: .6; cursor: default; }
  .ae-btn2 .t1 { font-size: var(--font-size-body); font-weight: var(--font-weight-bold); }
  .ae-btn2 .t2 { font-size: var(--font-size-caption); color: var(--color-text-muted); white-space: nowrap; }
  .ae-btn2--primary { background: var(--color-button); color: var(--color-button-text); border-color: var(--color-button-border); }
  .ae-btn2--primary:hover { background: var(--color-button-hover); box-shadow: var(--shadow-button-hover-strong); }
  .ae-btn2--primary .t2 { color: var(--color-button-text); opacity: .8; }
  .ae-btn2.is-off { background: color-mix(in srgb, var(--color-danger) 14%, transparent);
    border-color: var(--color-danger); color: var(--color-danger); }
  .ae-btn2.is-off .t2 { color: var(--color-danger); }

  .ae-body { flex: 1 1 auto; min-height: 0; display: flex; }

  /* ---- left column: adventure list ------------------------------------------------------------ */
  .ae-list {
    flex: 1 1 0; min-width: 240px; display: flex; flex-direction: column;
    border-right: 1px solid var(--color-border); background: var(--color-panel-soft); padding: var(--space-10);
  }
  .ae-list__top { display: flex; gap: var(--space-6); margin-bottom: var(--space-8); }
  .ae-search {
    flex: 1 1 auto; min-width: 0; font: inherit; color: var(--color-text);
    background: var(--color-panel); border: 1px solid var(--color-border);
    border-radius: var(--radius-md); padding: var(--space-4) var(--space-8);
  }
  .ae-search::placeholder { color: var(--color-placeholder); }
  .ae-search:focus-visible { outline: none; border-color: var(--color-border-strong); box-shadow: var(--focus-ring); }
  .ae-list__count { font-size: var(--font-size-caption); color: var(--color-text-muted); margin: 0 0 var(--space-6); }
  .ae-list__scroll { flex: 1 1 auto; overflow: auto; min-height: 0; margin: calc(-1 * var(--space-2)); padding: var(--space-2); }

  /* ---- list filters (Typ / DSA-Version / Jahr / Cover / F-Shop / Region / Ort) ----------------- */
  .ae-filters { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4) var(--space-8);
    margin-bottom: var(--space-8); padding: var(--space-6) var(--space-8); background: var(--color-panel-muted);
    border: 1px solid var(--color-border); border-radius: var(--radius-md); }
  /* label + control on ONE line (space is tight); the control fills the rest of the cell, not full width */
  .ae-filter { display: flex; flex-direction: row; align-items: center; gap: var(--space-6); min-width: 0; }
  .ae-filter--wide { grid-column: 1 / -1; }
  .ae-filter__lbl { flex: 0 0 auto; white-space: nowrap; font-size: var(--font-size-caption); color: var(--color-text-muted); }
  .ae-filters .ae-select, .ae-filters .ae-search { flex: 1 1 auto; min-width: 0; width: 100%;
    padding: var(--space-2) var(--space-6); font-size: var(--font-size-small); }
  .ae-ac-wrap { position: relative; flex: 1 1 auto; min-width: 0; }
  .ae-year { display: flex; align-items: center; gap: var(--space-4); flex: 0 0 auto; }
  .ae-year__in { width: 58px; min-width: 0; font: inherit; font-size: var(--font-size-small); color: var(--color-text);
    background: var(--color-panel); border: 1px solid var(--color-border); border-radius: var(--radius-md);
    padding: var(--space-2) var(--space-6); }
  .ae-year__in:focus-visible { outline: none; border-color: var(--color-border-strong); box-shadow: var(--focus-ring); }
  .ae-year span { color: var(--color-text-muted); }
  .ae-filters .ae-ac { left: 0; right: 0; }
  .ae-filter__chip { margin-top: var(--space-4); display: flex; align-items: center; gap: var(--space-4); }
  .ae-filter__chip[hidden] { display: none; }
  .ae-filter__chipx { border: 0; background: transparent; cursor: pointer; color: var(--color-text-muted);
    font-size: var(--font-size-small); line-height: 1; padding: 0 2px; }
  .ae-filter__chipx:hover { color: var(--color-danger); }
  .ae-filter__reset { grid-column: 1 / -1; justify-self: end; border: 0; background: transparent; cursor: pointer;
    color: var(--color-link); font-size: var(--font-size-caption); padding: 0; }
  .ae-filter__reset:hover { text-decoration: underline; }

  .ae-item {
    display: flex; align-items: center; gap: var(--space-8); width: 100%; text-align: left; cursor: pointer; font: inherit;
    background: transparent; border: 1px solid transparent; border-radius: var(--radius-md);
    padding: var(--space-4) var(--space-8); margin-bottom: 1px; line-height: var(--leading-tight);
  }
  .ae-item:hover { background: var(--color-hover-wash); }
  .ae-item.is-selected { background: var(--color-active-wash); border-color: var(--color-border-strong); }
  .ae-item__thumb {
    flex: 0 0 auto; width: 32px; height: 45px; border: 1px solid var(--color-border);
    border-radius: var(--radius-sm); overflow: hidden; background: var(--color-panel-muted);
    display: flex; align-items: center; justify-content: center; color: var(--color-text-muted);
  }
  .ae-item__thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ae-item__thumb svg { width: 14px; height: 14px; }
  .ae-item__text { min-width: 0; flex: 1 1 auto; }
  .ae-item__l1 { display: flex; align-items: baseline; gap: var(--space-6); }
  .ae-item__title { font-weight: var(--font-weight-bold); color: var(--color-text-strong);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ae-item__l2 { display: flex; align-items: center; gap: var(--space-6); margin-top: 1px;
    font-size: var(--font-size-caption); color: var(--color-text-muted); }
  .ae-item.is-draft .ae-item__title { color: var(--color-text-muted); font-style: italic; }
  .ae-empty { color: var(--color-text-muted); padding: var(--space-8); }

  /* ---- detail column (layout C: head on top, Stammdaten | Orte side by side) ------------------- */
  .ae-detail { flex: 2 1 0; min-width: 0; display: flex; flex-direction: column; }
  .ae-detail__head {
    flex: 0 0 auto; display: flex; align-items: flex-start; gap: var(--space-10);
    padding: var(--space-12) var(--space-16); border-bottom: 1px solid var(--color-border); min-height: 40px;
  }
  .ae-detail__head-main { flex: 1 1 auto; min-width: 0; }
  .ae-detail__title { margin: 0; font-size: var(--font-size-subhead); color: var(--color-text-strong);
    font-weight: var(--font-weight-bold); }
  .ae-detail__meta { margin-top: var(--space-2); font-size: var(--font-size-caption); color: var(--color-text-muted);
    display: flex; flex-wrap: wrap; gap: var(--space-6); align-items: center; }

  .ae-panels { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: row; }
  .ae-panel { flex: 1 1 50%; min-width: 0; min-height: 0; overflow: auto; padding: var(--space-12) var(--space-16); }
  .ae-panel--stamm { border-right: 1px solid var(--color-border); }
  .ae-placeholder { color: var(--color-text-muted); padding: var(--space-16); }

  /* ---- form field groups ---------------------------------------------------------------------- */
  .ae-grp { margin: 0 0 var(--space-16); }
  .ae-grp__title {
    font-size: var(--font-size-caption); text-transform: uppercase; letter-spacing: .04em;
    font-weight: var(--font-weight-bold); color: var(--color-text-muted);
    padding-bottom: var(--space-6); margin: 0 0 var(--space-10);
    border-bottom: 1px solid var(--color-divider);
  }
  .ae-fields { display: grid; grid-template-columns: minmax(0, 1fr); gap: var(--space-10) var(--space-12); }
  .ae-field { display: flex; flex-direction: column; gap: var(--space-4); min-width: 0; }
  .ae-field.is-wide { grid-column: 1 / -1; }
  .ae-field > label { font-size: var(--font-size-caption); color: var(--color-text-muted);
    display: flex; align-items: center; gap: var(--space-6); }
  .ae-input, .ae-select {
    font: inherit; color: var(--color-text); background: var(--color-panel);
    border: 1px solid var(--color-border); border-radius: var(--radius-md);
    padding: var(--space-4) var(--space-8); width: 100%;
  }
  .ae-input:focus-visible, .ae-select:focus-visible { outline: none; border-color: var(--color-border-strong); box-shadow: var(--focus-ring); }
  .ae-check { display: flex; align-items: center; gap: var(--space-6); font-size: var(--font-size-small); color: var(--color-text); }
  .ae-check input { accent-color: var(--color-check-accent); width: 15px; height: 15px; }

  /* ---- badges / pills ------------------------------------------------------------------------- */
  .pill { display: inline-flex; align-items: center; gap: var(--space-2); font-size: var(--font-size-caption);
    line-height: 1.3; padding: 1px var(--space-6); border-radius: var(--radius-md); white-space: nowrap;
    border: 1px solid var(--color-pill-border); background: var(--color-pill); color: var(--color-pill-text); }
  .pill--kind { border-color: var(--color-border); background: var(--color-panel-muted); color: var(--color-text-muted); }
  .pill--start { border-color: var(--color-accent-strong); background: var(--color-active-wash);
    color: var(--color-accent-strong); font-weight: var(--font-weight-bold); }
  .pill--manual { border-color: var(--color-accent); background: var(--color-pill); color: var(--color-accent-strong);
    font-weight: var(--font-weight-bold); }
  .pill--wiki { border-color: var(--color-border); background: transparent; color: var(--color-text-muted); }
  .pill--unresolved { border-color: var(--color-danger); background: transparent; color: var(--color-danger); }
  .pill--nowiki { border-color: var(--color-border); background: transparent; color: var(--color-text-muted); }
  .start-toggle.is-on { background: var(--color-active-wash); border-color: var(--color-accent-strong);
    color: var(--color-accent-strong); font-weight: var(--font-weight-bold); }
  .ae-suppressed-wrap[hidden] { display: none; }
  .badge-manual { font-size: var(--font-size-caption); color: var(--color-accent-strong);
    border: 1px solid var(--color-accent); border-radius: var(--radius-sm); padding: 0 var(--space-4);
    cursor: help; font-weight: var(--font-weight-bold); }

  /* ---- buttons -------------------------------------------------------------------------------- */
  .btn { font: inherit; cursor: pointer; border-radius: var(--radius-md); padding: var(--space-4) var(--space-12);
    background: var(--color-button-soft); color: var(--color-button-soft-text); border: 1px solid var(--color-button-soft-border); }
  .btn:hover { background: var(--color-button-soft-hover); }
  .btn--primary { background: var(--color-button); color: var(--color-button-text); border-color: var(--color-button-border); }
  .btn--primary:hover { background: var(--color-button-hover); box-shadow: var(--shadow-button-hover-strong); }
  .btn--sm { padding: 2px var(--space-8); font-size: var(--font-size-caption); }
  .btn--icon { padding: 2px var(--space-6); font-size: var(--font-size-small); }
  .btn--danger { color: var(--color-danger); border-color: var(--color-border); background: transparent; }
  .btn--danger:hover { background: color-mix(in srgb, var(--color-danger) 12%, transparent); }

  /* ---- Cover-Block (Vorschau + eigenes Cover laden / Wiki-Cover neu ziehen) -------------------- */
  .ae-cover { display: flex; gap: var(--space-12); align-items: flex-start; }
  .ae-cover__preview { width: 96px; height: 135px; flex: 0 0 auto; border: 1px solid var(--color-border);
    border-radius: var(--radius-sm); overflow: hidden; background: var(--color-panel-muted);
    display: flex; align-items: center; justify-content: center; }
  .ae-cover__preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ae-cover__ph { font-size: var(--font-size-caption); color: var(--color-text-muted); }
  .ae-cover__side { display: flex; flex-direction: column; gap: var(--space-6); min-width: 0; flex: 1; }
  .ae-cover__origin { font-size: var(--font-size-caption); color: var(--color-text-muted);
    display: flex; align-items: center; gap: var(--space-6); }
  .ae-cover__url { font-size: var(--font-size-caption); color: var(--color-text-muted); word-break: break-all; }
  .ae-cover__btns { display: flex; gap: var(--space-6); flex-wrap: wrap; }
  .ae-cover__btns .btn { font-size: var(--font-size-caption); }
  .ae-cover__state { font-size: var(--font-size-caption); color: var(--color-text-muted); min-height: 1.2em; }
  .ae-cover__state.error { color: var(--color-danger); }

  /* ---- Shop-Links preview chips (Ulisses / F-Shop / DNB / Wiki, priority order) ---------------- */
  .ae-links-preview { display: flex; flex-wrap: wrap; gap: var(--space-6); margin-bottom: var(--space-10); }
  .ae-linkchip { display: inline-flex; align-items: center; font-size: var(--font-size-caption);
    padding: 2px var(--space-8); border-radius: var(--radius-md); border: 1px solid var(--color-border);
    background: var(--color-panel-muted); color: var(--color-link); text-decoration: none; }
  .ae-linkchip:hover { border-color: var(--color-border-strong); text-decoration: underline; }
  .ae-linkchip.is-active { border-color: var(--color-accent-strong); background: var(--color-active-wash);
    color: var(--color-accent-strong); font-weight: var(--font-weight-bold); }

  /* ---- Orte (places) -------------------------------------------------------------------------- */
  .ae-orte__head { display: flex; align-items: center; gap: var(--space-8); margin-bottom: var(--space-8); }
  .ae-orte__head h3 { margin: 0; font-size: var(--font-size-caption); text-transform: uppercase; letter-spacing: .04em;
    font-weight: var(--font-weight-bold); color: var(--color-text-muted); }
  .ae-orte__hint { font-size: var(--font-size-caption); color: var(--color-text-muted); }
  .ae-orte__invariant { font-size: var(--font-size-caption); color: var(--color-accent-strong);
    display: inline-flex; align-items: center; gap: var(--space-4); }
  .ae-add { display: flex; gap: var(--space-6); align-items: center; margin-bottom: var(--space-10);
    padding: var(--space-8); background: var(--color-panel-soft); border: 1px solid var(--color-border);
    border-radius: var(--radius-md); position: relative; }
  .ae-add .ae-input { flex: 1 1 auto; }
  /* P3 Ort-autocomplete dropdown */
  .ae-ac { position: absolute; left: var(--space-8); right: var(--space-8); top: calc(100% - var(--space-4)); z-index: 30;
    background: var(--color-panel); border: 1px solid var(--color-border-strong); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-panel); overflow-y: auto; max-height: 320px; }
  .ae-ac[hidden] { display: none; }
  .ae-ac__item { display: flex; align-items: center; gap: var(--space-8); padding: var(--space-6) var(--space-10);
    cursor: pointer; border-bottom: 1px solid var(--color-divider); }
  .ae-ac__item:last-child { border-bottom: none; }
  .ae-ac__item.is-active, .ae-ac__item:hover { background: var(--color-hover-wash); }
  .ae-ac__name { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: var(--color-text-strong); }
  .ae-ac__name b { color: var(--color-accent-strong); }
  .ae-ac__free { color: var(--color-text-muted); font-size: var(--font-size-caption); background: var(--color-panel-soft); }
  .ae-ac__free .ae-ac__name { color: var(--color-text-muted); }
  .ae-ac__free .ae-ac__name b { color: var(--color-text); }
  .ae-place {
    display: grid; grid-template-columns: 22px minmax(0, 1fr) auto; align-items: center; gap: var(--space-8);
    padding: var(--space-8); border: 1px solid var(--color-border); border-radius: var(--radius-md);
    background: var(--color-panel); margin-bottom: var(--space-6);
  }
  .ae-place.is-start { border-color: var(--color-accent-strong); background: var(--color-panel-soft); }
  .ae-place.is-suppressed { opacity: .6; }
  .ae-place__order { display: flex; flex-direction: column; align-items: center; gap: 1px; color: var(--color-text-muted); }
  .ae-place__order .ord-num { font-size: var(--font-size-caption); }
  .ae-place__reorder { display: flex; flex-direction: column; }
  .ae-place__reorder button { border: 0; background: transparent; cursor: pointer; color: var(--color-text-muted);
    line-height: 1; padding: 0; font-size: 10px; }
  .ae-place__reorder button:hover { color: var(--color-text-strong); }
  .ae-place__reorder button:disabled { opacity: .35; cursor: default; }
  .ae-place__main { min-width: 0; }
  .ae-place__name { font-weight: var(--font-weight-bold); color: var(--color-text-strong);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ae-place.is-suppressed .ae-place__name { text-decoration: line-through; }
  .ae-place__resolved { font-size: var(--font-size-caption); color: var(--color-text-muted); margin-top: 2px;
    display: flex; flex-wrap: wrap; gap: var(--space-6); align-items: center; }
  .ae-place__badges { display: flex; align-items: center; gap: var(--space-4); flex-wrap: wrap; margin-top: 3px; }
  .ae-place__ctl { display: flex; align-items: center; gap: var(--space-4); flex: 0 0 auto; }

  /* ---- save bar ------------------------------------------------------------------------------- */
  .ae-savebar { flex: 0 0 auto; display: flex; align-items: center; gap: var(--space-10);
    padding: var(--space-8) var(--space-16); border-top: 1px solid var(--color-border); background: var(--color-panel-soft); }
  .ae-savebar[hidden] { display: none; } /* author display:flex would otherwise beat the hidden attribute */
  .ae-savebar .ae-spacer { flex: 1 1 auto; }
  .ae-savebar .saved { font-size: var(--font-size-caption); color: var(--color-success); }
  .ae-savebar .error { font-size: var(--font-size-caption); color: var(--color-danger); }
</style>

<body>
  <div class="ae-header">
    <span class="ae-header__spacer"></span>
    <button type="button" class="ae-btn2" id="aeCoversToggle" aria-pressed="false"
      title="Notfall-Aus: blendet ALLE Abenteuer-Cover im öffentlichen Frontend aus (Platzhalter). Die Bilder bleiben intern gespeichert; dieser Editor zeigt sie weiter.">
      <span class="t1">🖼️ Cover</span>
      <span class="t2" id="aeCoversToggleLabel">…</span>
    </button>
    <button type="button" class="ae-btn2 ae-btn2--primary" id="aeSyncBtn" title="Übernimmt Abenteuer aus dem zuletzt geholten Wiki-Dump override-sicher (Katalog + Orte + Cover). Vorher einmal „Dump holen" im WikiSync-Menüband ausführen.">
      <span class="t1">🚨 Abenteuer syncen</span>
      <span class="t2" id="aeHeaderSub">Letzte Sync: wird geladen…</span>
    </button>
    <button type="button" class="ae-btn2" id="aeLinkCheckBtn" title="Prüft NUR die Links der Abenteuer (Shoplinks, Wiki-Seiten) auf Erreichbarkeit — Karten und Quellen bleiben unberührt. Höflich: 600ms Pause je Host, ein voller Durchlauf dauert entsprechend.">
      <span class="t1">🔗 Links prüfen</span>
      <span class="t2" id="aeLinkCheckSub">…</span>
    </button>
  </div>

  <div class="ae-body">
    <aside class="ae-list">
      <div class="ae-list__top">
        <input class="ae-search" id="aeSearch" type="search" placeholder="Abenteuer suchen …">
        <button class="btn btn--primary" id="aeNew" title="Neues Abenteuer anlegen">+ Neu</button>
      </div>
      <div class="ae-filters" id="aeFilters">
        <div class="ae-filter">
          <label class="ae-filter__lbl" for="aeFType">Typ</label>
          <select class="ae-select" id="aeFType"></select>
        </div>
        <div class="ae-filter">
          <label class="ae-filter__lbl" for="aeFEdition">DSA-Version</label>
          <select class="ae-select" id="aeFEdition"></select>
        </div>
        <div class="ae-filter">
          <label class="ae-filter__lbl" for="aeFCover">Cover</label>
          <select class="ae-select" id="aeFCover">
            <option value="">alle</option>
            <option value="yes">hat Cover</option>
            <option value="no">fehlt</option>
          </select>
        </div>
        <div class="ae-filter">
          <label class="ae-filter__lbl" for="aeFShop">F-Shop</label>
          <select class="ae-select" id="aeFShop">
            <option value="">alle</option>
            <option value="yes">ja</option>
            <option value="no">nein</option>
          </select>
        </div>
        <div class="ae-filter ae-filter--wide">
          <label class="ae-filter__lbl">Jahr (BF)</label>
          <div class="ae-year">
            <input class="ae-year__in" id="aeFYearFrom" type="number" inputmode="numeric" placeholder="von">
            <span>–</span>
            <input class="ae-year__in" id="aeFYearTo" type="number" inputmode="numeric" placeholder="bis">
          </div>
        </div>
        <div class="ae-filter ae-filter--wide">
          <label class="ae-filter__lbl" for="aeFRegion">Region</label>
          <select class="ae-select" id="aeFRegion"><option value="">alle</option></select>
        </div>
        <div class="ae-filter ae-filter--wide">
          <label class="ae-filter__lbl" for="aeFOrt">Ort (genau)</label>
          <div class="ae-ac-wrap">
            <input class="ae-search" id="aeFOrt" type="search" autocomplete="off" placeholder="Ort suchen …">
            <div class="ae-ac" id="aeFOrtAc" hidden></div>
          </div>
          <div class="ae-filter__chip" id="aeFOrtChip" hidden></div>
        </div>
        <button type="button" class="ae-filter__reset" id="aeFReset">Filter zurücksetzen</button>
      </div>
      <p class="ae-list__count" id="aeListCount">Lädt…</p>
      <div class="ae-list__scroll" id="aeListScroll"></div>
    </aside>

    <section class="ae-detail">
      <div class="ae-detail__head" id="aeDetailHead"></div>
      <div class="ae-panels">
        <div class="ae-panel ae-panel--stamm" id="aeStammBody">
          <p class="ae-placeholder">Abenteuer links wählen oder neu anlegen.</p>
        </div>
        <div class="ae-panel ae-panel--orte" id="aeOrteBody">
          <p class="ae-placeholder">Noch kein Abenteuer gewählt.</p>
        </div>
      </div>
      <div class="ae-savebar" id="aeSaveBar" hidden>
        <span class="saved" id="aeSaveState"></span>
        <span class="ae-spacer"></span>
        <button class="btn" id="aeDiscard">Verwerfen</button>
        <button class="btn btn--primary" id="aeSave">Stammdaten speichern</button>
      </div>
    </section>
  </div>

<script>
  const ADVENTURE_EDIT_API = "/api/edit/map/adventures.php";
  const WIKI_SYNC_DUMP_API = "/api/edit/wiki/dump.php";

  // POST helper — mirrors settlementDetailPost: Gold-Contract envelope, surfaces error.message.
  async function adventurePost(body) {
    const response = await fetch(ADVENTURE_EDIT_API, {
      method: "POST",
      credentials: "same-origin",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const payload = await response.json().catch(() => null);
    if (!response.ok || !payload || payload.ok !== true) {
      throw new Error((payload && payload.error && payload.error.message) || `HTTP ${response.status}`);
    }
    return payload;
  }

  // HTML escaper safe for BOTH text and (quoted) attribute context — the values flow into template
  // strings like value="${aeEscape(v)}" / data-raw="${aeEscape(v)}", so " and ' MUST be encoded too
  // (textContent->innerHTML would leave quotes raw -> attribute-breakout XSS on e.g. a title with a ").
  function aeEscape(s) {
    return (s == null ? "" : String(s))
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;")
      .replace(/`/g, "&#96;");
  }

  // ============ data layer (P2) ============
  const PRODUCT_TYPES = ["gruppenabenteuer", "soloabenteuer", "kurzabenteuer", "szenario", "anthologie", "kampagne"];
  const PRODUCT_TYPE_LABEL = { gruppenabenteuer: "Gruppenabenteuer", soloabenteuer: "Soloabenteuer",
    kurzabenteuer: "Kurzabenteuer", szenario: "Szenario", anthologie: "Anthologie", kampagne: "Kampagne" };
  const EDITIONS = ["", "DSA1", "DSA2", "DSA3", "DSA4", "DSA5"];
  const KIND_LABEL = { settlement: "Siedlung", territory: "Territorium", region: "Region", path: "Weg", unresolved: "—" };

  // Left-list filters (all AND-combined with the title search). ortId = an exact target_public_id picked from
  // the map-search autocomplete; region = a raw_name of a region/territory place (coarse area filter).
  const EMPTY_FILTERS = { type: "", edition: "", yearFrom: "", yearTo: "", cover: "", fshop: "", region: "", ortId: "", ortName: "" };
  const state = { adventures: [], selectedId: null, detail: null, filters: Object.assign({}, EMPTY_FILTERS) };

  // List-thumbnail placeholder (kein Cover) — mirrors AVESMAPS_ADV_COVER_PH_SVG (map-features-place-extras.js),
  // dieselbe Bild-Silhouette wie im Frontend-Streifen/-Dialog, nur kleiner fuer die dichte Editor-Liste.
  const AE_COVER_PH_SVG = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="m4 16 5-4 4 3 3-2 4 3"/></svg>';

  // ---- left list (list action) ----
  async function loadList() {
    try {
      const res = await adventurePost({ action: "list" });
      state.adventures = res.adventures || [];
      if (typeof res.covers_enabled === "boolean") setCoversToggleState(res.covers_enabled);
      populateRegionFilter();
      renderList();
    } catch (e) {
      document.getElementById("aeListCount").textContent = "Fehler: " + e.message;
    }
  }

  // Cover kill switch (owner "emergency off"). Reflects/flips the GLOBAL public-frontend cover display;
  // the editor itself always keeps showing covers so admins can moderate. aria-pressed = kill-switch engaged.
  function setCoversToggleState(enabled) {
    state.coversEnabled = enabled;
    const btn = document.getElementById("aeCoversToggle");
    const label = document.getElementById("aeCoversToggleLabel");
    if (btn) { btn.setAttribute("aria-pressed", enabled ? "false" : "true"); btn.classList.toggle("is-off", !enabled); }
    if (label) label.textContent = enabled ? "An" : "AUS";
  }
  async function toggleCovers() {
    const next = !state.coversEnabled;
    const btn = document.getElementById("aeCoversToggle");
    if (btn) btn.disabled = true;
    try {
      const res = await adventurePost({ action: "set_covers_enabled", enabled: next });
      setCoversToggleState(typeof res.covers_enabled === "boolean" ? res.covers_enabled : next);
    } catch (e) {
      alert("Cover-Umschaltung fehlgeschlagen: " + e.message);
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  // True when an adventure passes EVERY active filter (AND-combined) plus the title search.
  function adventureMatchesFilters(a) {
    const f = state.filters;
    const q = (document.getElementById("aeSearch").value || "").trim().toLowerCase();
    if (q && !((a.title || "").toLowerCase().includes(q))) return false;
    if (f.type && a.product_type !== f.type) return false;
    if (f.edition && (a.edition || "") !== f.edition) return false;
    if (f.yearFrom !== "" && (a.bf_year == null || a.bf_year < Number(f.yearFrom))) return false;
    if (f.yearTo !== "" && (a.bf_year == null || a.bf_year > Number(f.yearTo))) return false;
    if (f.cover === "yes" && !a.has_cover) return false;
    if (f.cover === "no" && a.has_cover) return false;
    if (f.fshop === "yes" && !a.has_fshop) return false;
    if (f.fshop === "no" && a.has_fshop) return false;
    if (f.region && !(a.places || []).some((p) => (p.kind === "region" || p.kind === "territory") && p.name === f.region)) return false;
    if (f.ortId && !(a.places || []).some((p) => p.public_id && p.public_id === f.ortId)) return false;
    return true;
  }
  function renderList() {
    const rows = state.adventures.filter(adventureMatchesFilters);
    document.getElementById("aeListCount").textContent = `${rows.length} von ${state.adventures.length}`;
    document.getElementById("aeListScroll").innerHTML = rows.length ? rows.map((a) => {
      const draft = a.status !== "approved";
      const manual = a.origin === "manual" ? ` · <span class="pill pill--manual">manuell</span>` : "";
      const thumb = a.cover_url
        ? `<img src="${aeEscape(a.cover_url)}" alt="" loading="lazy" onerror="this.replaceWith(document.createTextNode(''))">`
        : AE_COVER_PH_SVG;
      return `<button class="ae-item${a.public_id === state.selectedId ? " is-selected" : ""}${draft ? " is-draft" : ""}" data-id="${aeEscape(a.public_id)}">
        <span class="ae-item__thumb">${thumb}</span>
        <span class="ae-item__text">
          <span class="ae-item__l1"><span class="ae-item__title">${aeEscape(a.title)}</span></span>
          <span class="ae-item__l2"><span class="pill pill--kind">${aeEscape(a.product_type)}</span> ${aeEscape(a.bf_label || "—")} · ${a.place_count || 0} Orte${manual}</span>
        </span></button>`;
    }).join("") : `<p class="ae-empty">Keine Abenteuer.</p>`;
  }

  // Region dropdown = distinct raw_names of region/territory places across all adventures (coarse area filter).
  function populateRegionFilter() {
    const names = new Set();
    state.adventures.forEach((a) => (a.places || []).forEach((p) => {
      if ((p.kind === "region" || p.kind === "territory") && p.name) names.add(p.name);
    }));
    const sel = document.getElementById("aeFRegion");
    const cur = state.filters.region;
    sel.innerHTML = ['<option value="">alle</option>'].concat(
      Array.from(names).sort((x, y) => x.localeCompare(y, "de")).map((n) =>
        `<option value="${aeEscape(n)}"${n === cur ? " selected" : ""}>${aeEscape(n)}</option>`)
    ).join("");
    if (cur && !names.has(cur)) { state.filters.region = ""; sel.value = ""; }
  }

  // ---- selection / new ----
  async function selectAdventure(publicId) {
    state.selectedId = publicId;
    renderList();
    try {
      state.detail = await adventurePost({ action: "detail", public_id: publicId });
    } catch (e) {
      document.getElementById("aeStammBody").innerHTML = `<p class="ae-placeholder" style="color:var(--color-danger)">Fehler: ${aeEscape(e.message)}</p>`;
      return;
    }
    renderDetail();
    renderPlaces();
  }
  function newAdventure() {
    state.selectedId = null;
    state.detail = null;
    renderList();
    renderDetail();
    renderPlaces();
  }

  // ---- detail / Stammdaten (detail + upsert_adventure) ----
  function aeField(label, field, value, origins, opts) {
    opts = opts || {};
    const manual = origins && origins[field] === "manual"
      ? ` <span class="badge-manual" title="Manuell gesetzt — ein Wiki-Sync fasst dieses Feld nicht mehr an.">manuell</span>` : "";
    if (opts.checkbox) {
      return `<div class="ae-field${opts.wide ? " is-wide" : ""}"><label class="ae-check"><input type="checkbox" data-field="${field}"${value ? " checked" : ""}> ${aeEscape(label)}${manual}</label></div>`;
    }
    let control;
    if (opts.select) {
      const cur = value == null ? "" : String(value);
      control = `<select class="ae-select" data-field="${field}">${opts.select.map((o) =>
        `<option${o === cur ? " selected" : ""}>${aeEscape(o)}</option>`).join("")}</select>`;
    } else {
      control = `<input class="ae-input" data-field="${field}"${opts.number ? ' type="number"' : ""} value="${aeEscape(value)}">`;
    }
    return `<div class="ae-field${opts.wide ? " is-wide" : ""}"><label>${aeEscape(label)}${manual}</label>${control}</div>`;
  }
  function renderDetail() {
    const d = state.detail;
    const head = document.getElementById("aeDetailHead");
    const body = document.getElementById("aeStammBody");
    document.getElementById("aeSaveBar").hidden = false;
    const st = document.getElementById("aeSaveState");
    st.textContent = ""; st.className = "saved";
    if (!d) {
      head.innerHTML = `<div class="ae-detail__head-main"><h2 class="ae-detail__title">Neues Abenteuer</h2>
        <div class="ae-detail__meta">Noch nicht gespeichert</div></div>`;
    } else {
      const originLabel = d.origin === "manual" ? "Manuell" : "Wiki";
      head.innerHTML = `<div class="ae-detail__head-main">
        <h2 class="ae-detail__title">${aeEscape(d.title || "—")}</h2>
        <div class="ae-detail__meta"><span class="pill pill--kind">${aeEscape(d.product_type)}</span>
          <span>${aeEscape([d.edition, d.bf_label].filter(Boolean).join(" · "))}</span>
          <span class="pill pill--wiki">Quelle: ${originLabel}</span>
          ${d.wiki_key ? `<span>wiki_key: <code>${aeEscape(d.wiki_key)}</code></span>` : ""}</div></div>`;
    }
    const v = d || {};
    const o = (d && d.field_origins) || {};
    body.innerHTML = `
      ${aeCoverGroup(v, o)}
      <div class="ae-grp"><p class="ae-grp__title">Identität</p><div class="ae-fields">
        ${aeField("Titel *", "title", v.title || "", o, { wide: true })}
        ${aeField("Produkttyp", "product_type", v.product_type || "gruppenabenteuer", o, { select: PRODUCT_TYPES })}
        ${aeField("Regelsystem", "edition", v.edition || "", o, { select: EDITIONS })}
        ${aeField("Offizielles Produkt", "is_official", v.is_official !== false, o, { checkbox: true })}
        ${aeField("Serie / Reihe", "series", v.series || "", o)}
      </div></div>
      <div class="ae-grp"><p class="ae-grp__title">Datierung &amp; Einordnung</p><div class="ae-fields">
        ${aeField("BF-Jahr", "bf_year", v.bf_year == null ? "" : v.bf_year, o, { number: true })}
        ${aeField("BF-Label", "bf_label", v.bf_label || "", o)}
        ${aeField("Genre", "genre", v.genre || "", o)}
        ${aeField("Komplexität (SL)", "complexity_gm", v.complexity_gm || "", o)}
        ${aeField("Komplexität (Spieler)", "complexity_pl", v.complexity_pl || "", o)}
        ${aeField("Autoren", "authors", v.authors || "", o, { wide: true })}
      </div></div>
      <div class="ae-grp"><p class="ae-grp__title">Wiki &amp; F-Shop</p><div class="ae-fields">
        ${aeField("Wiki-URL", "wiki_url", v.wiki_url || "", o, { wide: true })}
        ${aeField("F-Shop-Code", "fshop_code", v.fshop_code || "", o)}
        ${aeField("Cover-URL", "cover_url", v.cover_url || "", o)}
      </div></div>
      ${aeLinksGroup(v, o)}`;
    // Cover actions (upload / re-fetch) need a saved adventure -> wired after the body is in the DOM.
    const coverFile = document.getElementById("aeCoverFile");
    if (coverFile) coverFile.addEventListener("change", () => aeUploadCover(coverFile));
    const coverRefetch = document.getElementById("aeCoverRefetch");
    if (coverRefetch) coverRefetch.addEventListener("click", aeRefetchCover);
  }

  // Shop/reference links in click priority (Owner): Ulisses e-book -> F-Shop -> Deutsche Nationalbibliothek
  // -> the wiki page. Ulisses + F-Shop are stored (link_ulisses/link_fshop, wiki-sync-filled, editable here);
  // DNB is derived from the ISBN (else the title), the wiki page from wiki_url -> both always available.
  function aeShopLinks(v) {
    const links = [];
    const ulisses = (v.link_ulisses || "").trim();
    const fshop = (v.link_fshop || "").trim();
    const isbn = (v.isbn || "").trim();
    const title = (v.title || "").trim();
    const wiki = (v.wiki_url || "").trim() || (title ? "https://de.wiki-aventurica.de/wiki/" + encodeURIComponent(title) : "");
    if (ulisses) links.push({ label: "Ulisses eBook", url: ulisses });
    if (fshop) links.push({ label: "F-Shop", url: fshop });
    if (wiki) links.push({ label: "Wiki", url: wiki });
    const q = isbn || title;
    if (q) links.push({ label: "DNB", url: "https://portal.dnb.de/opac/simpleSearch?query=" + encodeURIComponent(q) });
    return links;
  }
  function aeLinksGroup(v, o) {
    const links = aeShopLinks(v);
    const preview = links.length
      ? links.map((l, i) => `<a class="ae-linkchip${i === 0 ? " is-active" : ""}" href="${aeEscape(l.url)}" target="_blank" rel="noopener" title="${aeEscape(l.url)}">${i === 0 ? "▶ " : ""}${aeEscape(l.label)} ↗</a>`).join("")
      : `<span class="ae-cover__ph">keine Links</span>`;
    return `<div class="ae-grp"><p class="ae-grp__title">Shop-Links · Klick-Priorität: Ulisses → F-Shop → Wiki → DNB</p>
      <div class="ae-links-preview">${preview}</div>
      <div class="ae-fields">
        ${aeField("Ulisses eBook-URL", "link_ulisses", v.link_ulisses || "", o, { wide: true })}
        ${aeField("F-Shop-URL", "link_fshop", v.link_fshop || "", o, { wide: true })}
        ${aeField("ISBN (für DNB)", "isbn", v.isbn || "", o)}
        ${aeField("Enthalten in (Sammelprodukt)", "contained_in", v.contained_in || "", o, { wide: true })}
      </div></div>`;
  }

  // The "Cover" group: preview + origin badge + "eigenes Cover laden" (upload -> manual override) +
  // "Wiki-Cover neu ziehen" (re-pull from staging -> wiki origin). The plain "Cover-URL" field in the
  // "Wiki & F-Shop" group stays as a fallback. bf_year etc. are unaffected.
  function aeCoverGroup(v, o) {
    const coverUrl = v.cover_url || "";
    const origin = o && o.cover_url;
    const badge = origin === "manual"
      ? `<span class="pill pill--manual">manuell</span>`
      : (origin === "wiki" ? `<span class="pill pill--wiki">Wiki-Sync</span>` : "—");
    const preview = coverUrl
      ? `<img src="${aeEscape(coverUrl)}" alt="Cover" onerror="this.replaceWith(document.createTextNode(''))">`
      : `<span class="ae-cover__ph">kein Cover</span>`;
    const refetch = v.wiki_key
      ? `<button type="button" class="btn btn--sm" id="aeCoverRefetch">Wiki-Cover neu ziehen</button>`
      : "";
    return `<div class="ae-grp"><p class="ae-grp__title">Cover</p>
      <div class="ae-cover">
        <div class="ae-cover__preview">${preview}</div>
        <div class="ae-cover__side">
          <div class="ae-cover__origin">Herkunft: ${badge}</div>
          <div class="ae-cover__url">${coverUrl ? aeEscape(coverUrl) : "—"}</div>
          <div class="ae-cover__btns">
            <label class="btn btn--sm" for="aeCoverFile" style="cursor:pointer">Eigenes Cover laden…</label>
            <input type="file" id="aeCoverFile" accept="image/png,image/jpeg,image/webp,image/gif" hidden>
            ${refetch}
          </div>
          <div class="ae-cover__state" id="aeCoverState"></div>
        </div>
      </div></div>`;
  }

  // POST a FormData (multipart upload OR the refetch form) to the cover endpoint; throws on a non-ok body.
  const ADVENTURE_COVER_API = "/api/edit/map/adventure-cover.php";
  async function aeCoverPost(formData) {
    const res = await fetch(ADVENTURE_COVER_API, { method: "POST", credentials: "same-origin", body: formData });
    const payload = await res.json().catch(() => null);
    if (!res.ok || !payload || payload.ok !== true) {
      throw new Error((payload && payload.error && payload.error.message) || `HTTP ${res.status}`);
    }
    return payload;
  }
  function aeCoverState(text, isError) {
    const el = document.getElementById("aeCoverState");
    if (el) { el.textContent = text; el.className = "ae-cover__state" + (isError ? " error" : ""); }
  }
  async function aeUploadCover(input) {
    if (!state.selectedId) { aeCoverState("Bitte zuerst das Abenteuer speichern.", true); input.value = ""; return; }
    const file = input.files && input.files[0];
    if (!file) return;
    aeCoverState("Cover wird hochgeladen …", false);
    try {
      const fd = new FormData();
      fd.append("public_id", state.selectedId);
      fd.append("cover", file);
      await aeCoverPost(fd);
      await selectAdventure(state.selectedId); // re-render detail with the new cover
    } catch (e) {
      aeCoverState("Fehler: " + e.message, true);
    } finally {
      input.value = "";
    }
  }
  async function aeRefetchCover() {
    if (!state.selectedId) { aeCoverState("Bitte zuerst das Abenteuer speichern.", true); return; }
    aeCoverState("Wiki-Cover wird gezogen …", false);
    try {
      const fd = new FormData();
      fd.append("public_id", state.selectedId);
      fd.append("mode", "refetch");
      await aeCoverPost(fd);
      await selectAdventure(state.selectedId);
    } catch (e) {
      aeCoverState("Fehler: " + e.message, true);
    }
  }
  function gatherStamm() {
    const out = {};
    document.querySelectorAll("#aeStammBody [data-field]").forEach((el) => {
      out[el.dataset.field] = el.type === "checkbox" ? el.checked : el.value;
    });
    if (state.selectedId) out.public_id = state.selectedId;
    return out;
  }
  async function saveStammdaten() {
    const adventure = gatherStamm();
    const st = document.getElementById("aeSaveState");
    if (!adventure.title || !String(adventure.title).trim()) { st.textContent = "Titel fehlt."; st.className = "error"; return; }
    try {
      const { public_id } = await adventurePost({ action: "upsert_adventure", adventure });
      await loadList();
      await selectAdventure(public_id);
      const st2 = document.getElementById("aeSaveState");
      st2.textContent = "✓ gespeichert"; st2.className = "saved";
    } catch (e) {
      st.textContent = "Fehler: " + e.message; st.className = "error";
    }
  }

  // ---- Orte (places) ----
  function placeRow(p, isFirst, isLast) {
    const start = p.role === "start";
    const kind = p.target_kind || "unresolved";
    const resolved = kind === "unresolved"
      ? `<span class="pill pill--unresolved">nicht aufgelöst</span> Rohname bleibt erhalten`
      : `→ ${aeEscape(KIND_LABEL[kind] || kind)}${p.target_wiki_key ? ` <code>${aeEscape(p.target_wiki_key)}</code>` : ` <span class="pill pill--nowiki" title="Dieser Ort ist ein Karteneintrag ohne Wiki-Verknüpfung — völlig in Ordnung.">ohne Wiki-Eintrag</span>`}`;
    const origin = p.origin === "manual" ? `<span class="pill pill--manual">manuell</span>` : `<span class="pill pill--wiki">Wiki</span>`;
    return `<div class="ae-place${start ? " is-start" : ""}" data-place-id="${p.id}">
      <div class="ae-place__order"><span class="ord-num">${p.sort_order}</span>
        <div class="ae-place__reorder">
          <button data-act="up" title="hoch"${isFirst ? " disabled" : ""}>▲</button>
          <button data-act="down" title="runter"${isLast ? " disabled" : ""}>▼</button></div></div>
      <div class="ae-place__main">
        <div class="ae-place__name">${aeEscape(p.raw_name)}</div>
        <div class="ae-place__resolved">${resolved}</div>
        <div class="ae-place__badges">${kind !== "unresolved" ? `<span class="pill pill--kind">${aeEscape(KIND_LABEL[kind] || kind)}</span> ` : ""}${origin}</div></div>
      <div class="ae-place__ctl">
        ${kind === "unresolved" ? `<button class="btn btn--sm" data-act="resolve" title="Erneut auflösen">↻ Auflösen</button>` : ""}
        <button class="btn btn--sm start-toggle${start ? " is-on" : ""}" data-act="start" title="Startort umschalten (mehrere möglich)">${start ? "★ Startort" : "☆ Start"}</button>
        <button class="btn btn--icon btn--danger" data-act="suppress" title="Entfernen">✕</button></div></div>`;
  }
  function renderPlaces() {
    const body = document.getElementById("aeOrteBody");
    if (!state.detail) { body.innerHTML = `<p class="ae-placeholder">Erst ein Abenteuer speichern, dann Orte zuordnen.</p>`; return; }
    const all = state.detail.places || [];
    const approved = all.filter((p) => p.status === "approved");
    const suppressed = all.filter((p) => p.status === "suppressed");
    body.innerHTML = `
      <div class="ae-orte__head"><h3>Orte (${approved.length})</h3>
        <span class="ae-orte__invariant" title="Startorte oben; nie automatisch umsortieren — nur manuell per ▲▼.">★ Startorte oben · manuell ordenbar (▲▼)</span>
        <span style="flex:1"></span>
        ${suppressed.length ? `<button class="btn btn--sm" data-act="toggle-sup">unterdrückte anzeigen (${suppressed.length})</button>` : ""}</div>
      <div class="ae-add">
        <input class="ae-input" id="aeAddName" autocomplete="off" placeholder="Ort suchen oder Wiki-Titel eingeben …">
        <button class="btn btn--primary" data-act="add">+ Ort</button>
        <div class="ae-ac" id="aeAc" hidden></div></div>
      <p class="ae-orte__hint" style="margin:0 0 var(--space-8)">★ = beginnt hier (Spoiler-frei) · übrige = spielt hier (Spoiler) · mehrere Startorte möglich · neuer Ort wird automatisch aufgelöst</p>
      ${approved.length ? approved.map((p, i) => placeRow(p, i === 0, i === approved.length - 1)).join("")
        : `<p class="ae-orte__hint">Noch keine Orte — oben hinzufügen.</p>`}
      <div class="ae-suppressed-wrap" hidden>${suppressed.map((p) =>
        `<div class="ae-place is-suppressed" data-place-id="${p.id}">
          <div class="ae-place__order"><span class="ord-num">—</span></div>
          <div class="ae-place__main"><div class="ae-place__name">${aeEscape(p.raw_name)}</div>
            <div class="ae-place__resolved">Wiki-Ort entfernt · ein Re-Sync fügt ihn nicht wieder hinzu</div>
            <div class="ae-place__badges"><span class="pill pill--kind">${aeEscape(KIND_LABEL[p.target_kind] || p.target_kind)}</span> <span class="pill">unterdrückt</span></div></div>
          <div class="ae-place__ctl"><button class="btn btn--sm" data-act="restore" data-raw="${aeEscape(p.raw_name)}" data-kind="${aeEscape(p.target_kind || "")}">↺ Zurückholen</button></div></div>`).join("")}</div>`;
  }

  async function reloadDetail() {
    state.detail = await adventurePost({ action: "detail", public_id: state.selectedId });
    renderDetail();
    renderPlaces();
    await loadList();
  }

  // ---- event wiring ----
  document.getElementById("aeSearch").addEventListener("input", renderList);
  document.getElementById("aeNew").addEventListener("click", newAdventure);
  document.getElementById("aeSave").addEventListener("click", saveStammdaten);
  document.getElementById("aeDiscard").addEventListener("click", () => { if (state.selectedId) selectAdventure(state.selectedId); else newAdventure(); });
  document.getElementById("aeListScroll").addEventListener("click", (e) => {
    const b = e.target.closest(".ae-item"); if (!b) return;
    selectAdventure(b.dataset.id);
  });

  // ---- list filters: init selects, wire controls, Ort autocomplete ----
  function initFilterSelects() {
    document.getElementById("aeFType").innerHTML = ['<option value="">alle Typen</option>'].concat(
      PRODUCT_TYPES.map((t) => `<option value="${aeEscape(t)}">${aeEscape(PRODUCT_TYPE_LABEL[t] || t)}</option>`)
    ).join("");
    document.getElementById("aeFEdition").innerHTML =
      EDITIONS.map((ed) => `<option value="${aeEscape(ed)}">${ed ? aeEscape(ed) : "alle"}</option>`).join("");
  }
  function syncSimpleFilters() {
    state.filters.type = document.getElementById("aeFType").value;
    state.filters.edition = document.getElementById("aeFEdition").value;
    state.filters.yearFrom = document.getElementById("aeFYearFrom").value.trim();
    state.filters.yearTo = document.getElementById("aeFYearTo").value.trim();
    state.filters.cover = document.getElementById("aeFCover").value;
    state.filters.fshop = document.getElementById("aeFShop").value;
    state.filters.region = document.getElementById("aeFRegion").value;
    renderList();
  }
  function renderOrtChip() {
    const chip = document.getElementById("aeFOrtChip");
    if (state.filters.ortId) {
      chip.hidden = false;
      chip.innerHTML = `<span class="pill pill--kind">${aeEscape(state.filters.ortName)}</span>`
        + `<button type="button" class="ae-filter__chipx" id="aeFOrtClear" title="Ort-Filter entfernen">×</button>`;
    } else { chip.hidden = true; chip.innerHTML = ""; }
  }
  initFilterSelects();
  renderOrtChip();
  ["aeFType", "aeFEdition", "aeFCover", "aeFShop", "aeFRegion"].forEach((id) =>
    document.getElementById(id).addEventListener("change", syncSimpleFilters));
  ["aeFYearFrom", "aeFYearTo"].forEach((id) =>
    document.getElementById(id).addEventListener("input", syncSimpleFilters));
  document.getElementById("aeFReset").addEventListener("click", () => {
    state.filters = Object.assign({}, EMPTY_FILTERS);
    ["aeFType", "aeFEdition", "aeFCover", "aeFShop", "aeFRegion"].forEach((id) => { document.getElementById(id).value = ""; });
    document.getElementById("aeFYearFrom").value = "";
    document.getElementById("aeFYearTo").value = "";
    document.getElementById("aeFOrt").value = "";
    renderOrtChip();
    renderList();
  });
  document.getElementById("aeFOrtChip").addEventListener("click", (e) => {
    if (!e.target.closest("#aeFOrtClear")) return;
    state.filters.ortId = ""; state.filters.ortName = "";
    renderOrtChip();
    renderList();
  });

  // Ort filter autocomplete — its OWN instance (independent of the place-adding one at aeAddName). A pick sets
  // an exact target_public_id; the list then keeps only adventures whose approved places include that id.
  let fOrtItems = [], fOrtActive = -1, fOrtTimer = null, fOrtAbort = null;
  function fOrtHide() { const ac = document.getElementById("aeFOrtAc"); ac.hidden = true; ac.innerHTML = ""; fOrtItems = []; fOrtActive = -1; }
  function fOrtRender() {
    const ac = document.getElementById("aeFOrtAc");
    if (!fOrtItems.length) { fOrtHide(); return; }
    ac.innerHTML = fOrtItems.map((it, idx) =>
      `<div class="ae-ac__item${idx === fOrtActive ? " is-active" : ""}" data-fort-idx="${idx}">
        <span class="ae-ac__name">${aeEscape(it.name)}</span>
        <span class="pill pill--kind">${aeEscape(it.type_label || it.feature_subtype || it.kind || "")}</span></div>`).join("");
    ac.hidden = false;
  }
  async function fOrtSearch(q) {
    if (fOrtAbort) fOrtAbort.abort();
    fOrtAbort = new AbortController();
    try {
      const r = await fetch("/api/app/map-search.php?limit=8&q=" + encodeURIComponent(q), { credentials: "same-origin", signal: fOrtAbort.signal });
      const j = await r.json().catch(() => null);
      fOrtItems = (j && j.ok === true ? (j.results || []) : []).filter((x) => x.kind !== "powerline" && x.public_id).slice(0, 8);
    } catch (e) { if (e && e.name === "AbortError") return; fOrtItems = []; }
    fOrtActive = fOrtItems.length ? 0 : -1;
    fOrtRender();
  }
  function fOrtPick(it) {
    if (!it || !it.public_id) return;
    state.filters.ortId = String(it.public_id);
    state.filters.ortName = it.name || "";
    fOrtHide();
    document.getElementById("aeFOrt").value = "";
    renderOrtChip();
    renderList();
  }
  document.getElementById("aeFOrt").addEventListener("input", (e) => {
    const q = e.target.value.trim();
    clearTimeout(fOrtTimer);
    if (q.length < 2) { fOrtHide(); return; }
    fOrtTimer = setTimeout(() => fOrtSearch(q), 250);
  });
  document.getElementById("aeFOrt").addEventListener("keydown", (e) => {
    if (document.getElementById("aeFOrtAc").hidden) return;
    if (e.key === "ArrowDown") { e.preventDefault(); fOrtActive = Math.min(fOrtItems.length - 1, fOrtActive + 1); fOrtRender(); }
    else if (e.key === "ArrowUp") { e.preventDefault(); fOrtActive = Math.max(0, fOrtActive - 1); fOrtRender(); }
    else if (e.key === "Enter") { e.preventDefault(); if (fOrtItems[fOrtActive]) fOrtPick(fOrtItems[fOrtActive]); }
    else if (e.key === "Escape") { fOrtHide(); }
  });
  document.getElementById("aeFOrt").addEventListener("blur", () => setTimeout(fOrtHide, 150));
  document.getElementById("aeFOrtAc").addEventListener("mousedown", (e) => {
    const row = e.target.closest("[data-fort-idx]"); if (!row) return;
    e.preventDefault();
    fOrtPick(fOrtItems[Number(row.dataset.fortIdx)]);
  });

  document.getElementById("aeOrteBody").addEventListener("click", async (e) => {
    const btn = e.target.closest("[data-act]"); if (!btn) return;
    const act = btn.dataset.act;
    if (act === "toggle-sup") {
      const wrap = document.querySelector(".ae-suppressed-wrap");
      const show = wrap.hasAttribute("hidden");
      wrap.toggleAttribute("hidden", !show);
      btn.textContent = show ? btn.textContent.replace("anzeigen", "ausblenden") : btn.textContent.replace("ausblenden", "anzeigen");
      return;
    }
    if (!state.selectedId) { alert("Erst ein Abenteuer speichern/wählen."); return; }
    // Add paths (button, autocomplete pick, or free-text row) run their own add+resolve+reload (P3).
    if (act === "add" || act === "ac-free") { addPlaceRaw(document.getElementById("aeAddName").value); return; }
    if (act === "ac-pick") { const it = acItems[Number(btn.dataset.idx)]; if (it) addPickedItem(it); return; }
    const rowEl = btn.closest("[data-place-id]");
    const placeId = rowEl ? Number(rowEl.dataset.placeId) : null;
    try {
      if (act === "resolve") {
        await adventurePost({ action: "resolve_place", place_id: placeId });
      } else if (act === "start") {
        const on = btn.classList.contains("is-on");
        await adventurePost({ action: "set_place", place_id: placeId, place: { role: on ? "play" : "start" } });
      } else if (act === "suppress") {
        await adventurePost({ action: "suppress_place", place_id: placeId });
      } else if (act === "restore") {
        const place = { raw_name: btn.dataset.raw };
        if (btn.dataset.kind && btn.dataset.kind !== "unresolved" && btn.dataset.kind !== "") place.target_kind = btn.dataset.kind;
        await adventurePost({ action: "add_place", adventure_public_id: state.selectedId, place });
      } else if (act === "up" || act === "down") {
        const approved = (state.detail.places || []).filter((p) => p.status === "approved");
        const idx = approved.findIndex((p) => p.id === placeId);
        const swapWith = act === "up" ? approved[idx - 1] : approved[idx + 1];
        if (!swapWith) return;
        const cur = approved[idx];
        await adventurePost({ action: "set_place", place_id: cur.id, place: { sort_order: swapWith.sort_order } });
        await adventurePost({ action: "set_place", place_id: swapWith.id, place: { sort_order: cur.sort_order } });
      }
      await reloadDetail();
    } catch (err) { alert("Fehler: " + err.message); }
  });

  // ---- P3: Ort-autocomplete (suggestions from the public map-search.php) ----
  let acItems = [], acActive = -1, acQuery = "", acTimer = null, acAbort = null;

  function hideAc() {
    const ac = document.getElementById("aeAc");
    if (ac) { ac.hidden = true; ac.innerHTML = ""; }
    acItems = []; acActive = -1;
  }
  function acHighlight(name, q) {
    const i = q ? name.toLowerCase().indexOf(q.toLowerCase()) : -1;
    if (i < 0) return aeEscape(name);
    return aeEscape(name.slice(0, i)) + "<b>" + aeEscape(name.slice(i, i + q.length)) + "</b>" + aeEscape(name.slice(i + q.length));
  }
  function renderAc() {
    const ac = document.getElementById("aeAc"); if (!ac) return;
    const rows = acItems.map((it, idx) =>
      `<div class="ae-ac__item${idx === acActive ? " is-active" : ""}" data-act="ac-pick" data-idx="${idx}">
        <span class="ae-ac__name">${acHighlight(it.name, acQuery)}</span>
        <span class="pill pill--kind">${aeEscape(it.type_label || it.feature_subtype || "")}</span></div>`).join("");
    const free = `<div class="ae-ac__item ae-ac__free${acActive === -1 ? " is-active" : ""}" data-act="ac-free">
        <span class="ae-ac__name">„<b>${aeEscape(acQuery)}</b>" als freien Ort hinzufügen</span>
        <span class="pill">Freitext</span></div>`;
    ac.innerHTML = rows + free;
    ac.hidden = false;
  }
  async function runAcSearch(q) {
    if (acAbort) acAbort.abort();
    acAbort = new AbortController();
    try {
      const r = await fetch("/api/app/map-search.php?limit=8&q=" + encodeURIComponent(q), { credentials: "same-origin", signal: acAbort.signal });
      const j = await r.json().catch(() => null);
      acItems = (j && j.ok === true ? (j.results || []) : []).filter((x) => x.kind !== "powerline").slice(0, 8);
    } catch (e) { if (e && e.name === "AbortError") return; acItems = []; }
    acActive = acItems.length ? 0 : -1;
    renderAc();
  }
  function acMove(delta) {
    const ac = document.getElementById("aeAc"); if (!ac || ac.hidden) return;
    acActive = Math.max(-1, Math.min(acItems.length - 1, acActive + delta));
    renderAc();
  }
  async function addPlaceRaw(raw) {
    raw = (raw || "").trim();
    hideAc();
    if (!raw || !state.selectedId) return;
    try {
      const { place_id } = await adventurePost({ action: "add_place", adventure_public_id: state.selectedId, place: { raw_name: raw } });
      try { await adventurePost({ action: "resolve_place", place_id }); } catch (_) { /* best-effort */ }
      await reloadDetail();
      const inp = document.getElementById("aeAddName");
      if (inp) inp.focus();
    } catch (err) { alert("Fehler: " + err.message); }
  }

  // Map a map-search hit to an adventure target_kind (powerlines are filtered out upstream).
  function mapSearchKind(it) {
    if (it.kind === "location") return "settlement";
    if (it.kind === "region" && it.feature_subtype === "political_territory") return "territory";
    if (it.kind === "label" && it.feature_subtype === "region") return "region";
    if (it.kind === "path") return "path";
    return "";
  }
  // Approach A: a picked suggestion is an EXACT entity -> store target_kind + target_public_id directly
  // (the backend backfills wiki_key + territory_path from the id). No name-resolution -> works even for
  // non-wiki-linked entities like "Thalhaus". Unknown kind / no id -> fall back to the name flow.
  async function addPickedItem(item) {
    hideAc();
    if (!state.selectedId || !item) return;
    const kind = mapSearchKind(item);
    if (!kind || !item.public_id) { addPlaceRaw(item.name); return; }
    try {
      await adventurePost({ action: "add_place", adventure_public_id: state.selectedId,
        place: { raw_name: item.name, target_kind: kind, target_public_id: item.public_id } });
      await reloadDetail();
      const inp = document.getElementById("aeAddName");
      if (inp) inp.focus();
    } catch (err) { alert("Fehler: " + err.message); }
  }

  // Delegated on the stable Orte container (its innerHTML is rebuilt on every render).
  document.getElementById("aeOrteBody").addEventListener("input", (e) => {
    if (e.target.id !== "aeAddName") return;
    acQuery = e.target.value.trim();
    if (acTimer) clearTimeout(acTimer);
    if (acQuery.length < 2) { hideAc(); return; }
    acTimer = setTimeout(() => runAcSearch(acQuery), 250);
  });
  document.getElementById("aeOrteBody").addEventListener("keydown", (e) => {
    if (e.target.id !== "aeAddName") return;
    if (e.key === "ArrowDown") { e.preventDefault(); acMove(1); }
    else if (e.key === "ArrowUp") { e.preventDefault(); acMove(-1); }
    else if (e.key === "Enter") { e.preventDefault();
      if (acActive >= 0 && acItems[acActive]) addPickedItem(acItems[acActive]);
      else addPlaceRaw(document.getElementById("aeAddName").value); }
    else if (e.key === "Escape") { hideAc(); }
  });
  document.addEventListener("click", (e) => { if (!e.target.closest(".ae-add")) hideAc(); });

  // ---- Wiki-Sync (adventures) ----
  // Delegates to window.parent.startWikiSyncAdventuresSync() -- the SAME sync_adventures client
  // loop the WikiSync ribbon's "Abenteuer" tab drives (js/review/review-wiki-sync.js) -- so there
  // is exactly one sync_adventures loop in the app, not a second copy here. Mirrors
  // handleSeSyncenClick/refreshSeSyncedInfo in html/wiki-sync-settlement-editor.html. Requires a
  // prior "Dump holen" (WikiSync-Menüband) -- an empty staging catalog just yields 0 processed.
  let aeSyncRunning = false;
  let aeSyncedInfoPollTimer = null;

  function formatAdventureLastSyncedText(raw) {
    const trimmed = String(raw || "").trim();
    if (trimmed === "") return "Letzte Sync: nie";
    const parsed = new Date(trimmed.replace(" ", "T"));
    if (Number.isNaN(parsed.getTime())) return `Letzte Sync: ${trimmed}`;
    return `Letzte Sync: ${parsed.toLocaleString("de-DE", { dateStyle: "medium", timeStyle: "short" })}`;
  }

  // Read-only, no lock (same GET the ribbon's own synced-status refresh uses).
  async function fetchAdventureLastSynced() {
    const url = new URL(WIKI_SYNC_DUMP_API, window.location.href);
    url.searchParams.set("action", "last_synced");
    url.searchParams.set("_", String(Date.now()));
    const res = await fetch(url.toString(), { method: "GET", credentials: "same-origin", cache: "no-store" });
    const payload = await res.json().catch(() => null);
    if (!res.ok || !payload || payload.ok !== true) {
      throw new Error((payload && payload.error && payload.error.message) || `HTTP ${res.status}`);
    }
    return (payload.synced && payload.synced.adventure) || null;
  }

  async function refreshAeSyncedInfo() {
    const el = document.getElementById("aeHeaderSub");
    if (!el) return;
    try {
      el.textContent = formatAdventureLastSyncedText(await fetchAdventureLastSynced());
    } catch (e) {
      el.textContent = "Letzte Sync: Fehler beim Laden";
    }
  }

  function setAeSyncBusy(isBusy) {
    aeSyncRunning = isBusy;
    const button = document.getElementById("aeSyncBtn");
    if (!button) return;
    button.disabled = isBusy;
    const label = button.querySelector(".t1");
    if (label) label.textContent = isBusy ? "Synchronisiert…" : "🚨 Abenteuer syncen";
  }

  async function handleAeSyncClick() {
    if (aeSyncRunning) return;
    let parentWindow;
    try { parentWindow = window.parent; } catch (e) { parentWindow = null; }
    const statusEl = document.getElementById("aeHeaderSub");
    if (!parentWindow || parentWindow === window || typeof parentWindow.startWikiSyncAdventuresSync !== "function") {
      if (statusEl) statusEl.textContent = "Syncen ist nur im eingebetteten Editor verfügbar.";
      return;
    }
    setAeSyncBusy(true);
    if (statusEl) statusEl.textContent = "Abenteuer werden übernommen …";
    // Poll the "Letzte Sync" label while the loop runs in the OTHER document (it can't call
    // back into this iframe directly); the parent's own ribbon shows the live progress/totals.
    if (aeSyncedInfoPollTimer) clearInterval(aeSyncedInfoPollTimer);
    aeSyncedInfoPollTimer = setInterval(() => { void refreshAeSyncedInfo(); }, 4000);
    try {
      await parentWindow.startWikiSyncAdventuresSync();
      if (statusEl) statusEl.textContent = "Sync abgeschlossen.";
      await loadList(); // new/updated adventures should show up in the left list right away
    } catch (e) {
      if (statusEl) statusEl.textContent = "Sync fehlgeschlagen: " + (e && e.message ? e.message : String(e));
    } finally {
      setAeSyncBusy(false);
      if (aeSyncedInfoPollTimer) { clearInterval(aeSyncedInfoPollTimer); aeSyncedInfoPollTimer = null; }
      setTimeout(() => { void refreshAeSyncedInfo(); }, 1500);
    }
  }

  // ---- Link check (adventures only) ----
  // Delegates to window.parent.startLinkCheck('adventure') -- the SAME loop the ribbon drives, so there
  // is exactly one link-check loop in the app (mirrors handleAeSyncClick above). The scope keeps this
  // button on adventure links: maps and the source catalogue have their own buttons in their own editors.
  // Progress arrives through the callback we hand in; polling would only queue behind the running step.
  let aeLinkCheckRunning = false;

  function setAeLinkCheckBusy(isBusy) {
    aeLinkCheckRunning = isBusy;
    const button = document.getElementById("aeLinkCheckBtn");
    if (!button) return;
    button.disabled = isBusy;
    const label = button.querySelector(".t1");
    if (label) label.textContent = isBusy ? "Prüft …" : "🔗 Links prüfen";
  }

  async function handleAeLinkCheckClick() {
    if (aeLinkCheckRunning) return;
    let parentWindow;
    try { parentWindow = window.parent; } catch (e) { parentWindow = null; }
    const statusEl = document.getElementById("aeLinkCheckSub");
    if (!parentWindow || parentWindow === window || typeof parentWindow.startLinkCheck !== "function") {
      if (statusEl) statusEl.textContent = "Nur im eingebetteten Editor verfügbar.";
      return;
    }
    setAeLinkCheckBusy(true);
    try {
      const result = await parentWindow.startLinkCheck("adventure", (text) => {
        if (statusEl) statusEl.textContent = text;
      });
      if (statusEl && result && result.status) {
        statusEl.textContent = `${result.status.online} online · ${result.status.dead} tot · ${result.status.unchecked} ungeprüft`;
      }
    } catch (e) {
      if (statusEl) statusEl.textContent = "Fehlgeschlagen: " + (e && e.message ? e.message : String(e));
    } finally {
      setAeLinkCheckBusy(false);
    }
  }

  document.getElementById("aeSyncBtn").addEventListener("click", handleAeSyncClick);
  document.getElementById("aeLinkCheckBtn").addEventListener("click", handleAeLinkCheckClick);
  document.getElementById("aeCoversToggle").addEventListener("click", toggleCovers);
  void refreshAeSyncedInfo();

  // Pre-selection from the parent (WikiSync adventure picker): a same-origin postMessage jumps to an
  // adventure by public_id. selectAdventure fetches the detail by id, so it works even before loadList resolves.
  window.addEventListener("message", (e) => {
    if (!e || e.origin !== location.origin || !e.data || typeof e.data.avesmapsAdvSelect !== "string") return;
    const id = e.data.avesmapsAdvSelect.trim();
    if (id) selectAdventure(id);
  });

  loadList();
</script>
</body>
</html>
